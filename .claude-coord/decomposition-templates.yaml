# Decomposition Templates
# Pattern-based task breakdown for common development workflows
# Each template defines subtasks with dependencies and specialist hints

templates:
  # OAuth/Authentication Integration
  - pattern: "(?i)(google|github|microsoft|okta|facebook|auth0).*(oauth|authentication|auth|login)|(?i)(oauth|authentication|auth|login).*(google|github|microsoft|okta|facebook|auth0)"
    type: oauth-integration
    subtasks:
      - id_suffix: "oauth-config"
        category: med
        subject: "Configure OAuth credentials for {provider}"
        description: "Set up OAuth client ID, secret, and callback URLs for {provider}"
        notes: |
          Add environment variables for OAuth configuration.
          Update application config with OAuth settings.
          Register OAuth application with provider.

          Call specialists: integration-specialist, security-engineer

      - id_suffix: "oauth-service"
        category: high
        subject: "Implement OAuth service layer for {provider}"
        description: "Create OAuth client wrapper and token management for {provider}"
        depends_on: ["oauth-config"]
        notes: |
          Create service class for OAuth authorization flows.
          Handle token exchange, refresh, and storage.
          Implement secure token storage (encrypted at rest).
          Add error handling for provider downtime.

          Call specialists: security-engineer, backend-engineer, integration-specialist

      - id_suffix: "oauth-routes"
        category: high
        subject: "Add OAuth endpoints for {provider}"
        description: "Create login, callback, and logout endpoints for {provider}"
        depends_on: ["oauth-service"]
        notes: |
          Add /auth/oauth/{provider} login redirect endpoint.
          Add /auth/oauth/{provider}/callback token exchange endpoint.
          Add /auth/logout endpoint.
          Implement CSRF protection with state parameter.
          Handle session creation and user linking.

          Call specialists: api-designer, security-engineer, backend-engineer

      - id_suffix: "oauth-tests"
        category: med
        subject: "Add OAuth integration tests for {provider}"
        description: "Test OAuth flow end-to-end for {provider}"
        depends_on: ["oauth-routes"]
        notes: |
          Mock OAuth provider responses.
          Test successful authorization flow.
          Test error scenarios (invalid token, network failure, provider downtime).
          Test CSRF protection.
          Test token refresh logic.
          Security testing for token handling.

          Call specialists: qa-engineer, security-engineer

  # REST API Endpoint Creation
  - pattern: "(?i)(api|endpoint|rest).*(create|add|implement|build).*(?:for|resource)"
    type: api-endpoint
    subtasks:
      - id_suffix: "api-model"
        category: med
        subject: "Define data model for {resource}"
        description: "Create database schema and model for {resource}"
        notes: |
          Define SQLAlchemy model with proper types and constraints.
          Create database migration script.
          Add indexes for common query patterns.
          Define relationships with other models.

          Call specialists: database-architect, backend-engineer

      - id_suffix: "api-service"
        category: high
        subject: "Implement {resource} service layer"
        description: "Business logic for {resource} CRUD operations"
        depends_on: ["api-model"]
        notes: |
          Implement create, read, update, delete operations.
          Add input validation and business rule enforcement.
          Handle edge cases and error scenarios.
          Implement pagination, filtering, sorting.
          Add transaction handling for multi-step operations.

          Call specialists: backend-engineer, security-engineer

      - id_suffix: "api-routes"
        category: high
        subject: "Create {resource} API endpoints"
        description: "REST endpoints for {resource} with proper request/response handling"
        depends_on: ["api-service"]
        notes: |
          Define routes: GET /api/v1/{resource}s (list), GET /api/v1/{resource}s/:id (get),
                        POST /api/v1/{resource}s (create), PUT /api/v1/{resource}s/:id (update),
                        DELETE /api/v1/{resource}s/:id (delete)
          Add request schema validation.
          Define response formats and status codes.
          Implement authentication and authorization.
          Add rate limiting.

          Call specialists: api-designer, backend-engineer, security-engineer

      - id_suffix: "api-tests"
        category: med
        subject: "Test {resource} API endpoints"
        description: "Integration tests for {resource} CRUD operations"
        depends_on: ["api-routes"]
        notes: |
          Test all CRUD operations with realistic data.
          Test pagination, filtering, sorting.
          Test input validation and error responses.
          Test authentication and authorization.
          Test concurrent operations and race conditions.

          Call specialists: qa-engineer

  # Payment/Billing Integration
  - pattern: "(?i)(payment|stripe|billing|subscription|checkout)"
    type: payment-integration
    subtasks:
      - id_suffix: "payment-config"
        category: med
        subject: "Configure payment provider"
        description: "Set up API keys, webhook endpoints, and payment provider configuration"
        notes: |
          Add payment provider API keys to environment.
          Register webhook endpoint URLs.
          Configure payment methods and currencies.
          Set up test and production environments.

          Call specialists: integration-specialist, security-engineer

      - id_suffix: "payment-models"
        category: high
        subject: "Create payment data models"
        description: "Database schema for payments, subscriptions, and invoices"
        depends_on: ["payment-config"]
        notes: |
          Define models: Payment, Subscription, Invoice, PaymentMethod.
          Add proper indexing for payment queries.
          Ensure ACID compliance for payment state.
          Add audit trail for all payment operations.

          Call specialists: database-architect, backend-engineer, security-engineer

      - id_suffix: "payment-service"
        category: high
        subject: "Implement payment processing service"
        description: "Payment processing logic with provider API integration"
        depends_on: ["payment-models"]
        notes: |
          Implement charge creation with idempotency keys.
          Add subscription management (create, update, cancel).
          Implement retry logic with exponential backoff.
          Handle payment failures and declined cards.
          Secure handling of sensitive payment data (PCI compliance).
          Never log or store full card numbers.

          Call specialists: backend-engineer, security-engineer, integration-specialist

      - id_suffix: "payment-webhooks"
        category: high
        subject: "Handle payment provider webhooks"
        description: "Process webhook events from payment provider"
        depends_on: ["payment-service"]
        notes: |
          Verify webhook signatures to prevent spoofing.
          Handle all event types: payment.succeeded, payment.failed,
                                   subscription.created, subscription.cancelled, etc.
          Implement idempotent webhook processing.
          Add retry logic for failed webhook processing.
          Log all webhook events for audit trail.

          Call specialists: backend-engineer, security-engineer, integration-specialist

      - id_suffix: "payment-tests"
        category: high
        subject: "Test payment flows"
        description: "End-to-end payment testing with mocked provider"
        depends_on: ["payment-webhooks"]
        notes: |
          Mock payment provider API responses.
          Test successful payment flow.
          Test payment failures (declined card, network error, etc.).
          Test webhook processing (success, failure, duplicate events).
          Security testing: webhook signature verification, PCI compliance.
          Test idempotency of payment operations.

          Call specialists: qa-engineer, security-engineer

  # Database Schema Changes
  - pattern: "(?i)(refactor|migrate|change|update).*(database|db|schema|table)"
    type: database-refactor
    subtasks:
      - id_suffix: "db-analysis"
        category: med
        subject: "Analyze current database schema"
        description: "Document current schema and plan migration strategy"
        notes: |
          Map current tables, columns, relationships, indexes.
          Identify breaking changes vs backward-compatible changes.
          Estimate data volume and migration time.
          Plan for zero-downtime migration if needed.

          Call specialists: database-architect

      - id_suffix: "db-migration"
        category: high
        subject: "Create database migration scripts"
        description: "Write migration scripts with proper up/down logic"
        depends_on: ["db-analysis"]
        notes: |
          Write migration script (up: apply changes, down: rollback).
          Handle data transformations safely (no data loss).
          Add data validation checks before/after migration.
          Test migration on copy of production data.
          Plan rollback strategy.

          Call specialists: database-architect, backend-engineer

      - id_suffix: "db-update-code"
        category: high
        subject: "Update application code for new schema"
        description: "Modify models, queries, and services for schema changes"
        depends_on: ["db-migration"]
        notes: |
          Update SQLAlchemy models to match new schema.
          Update all queries using changed tables/columns.
          Maintain backward compatibility if using staged rollout.
          Update serializers and API responses if schema affects API.

          Call specialists: backend-engineer

      - id_suffix: "db-tests"
        category: high
        subject: "Test database migration"
        description: "Verify migration works correctly with realistic data"
        depends_on: ["db-update-code"]
        notes: |
          Test migration up (apply changes).
          Test migration down (rollback changes).
          Test with realistic data scenarios (empty tables, large datasets, edge cases).
          Verify data integrity after migration.
          Test application functionality with new schema.

          Call specialists: qa-engineer, database-architect

  # Frontend Feature Implementation
  - pattern: "(?i)(frontend|ui|component|page).*(create|add|implement|build)"
    type: frontend-feature
    subtasks:
      - id_suffix: "ui-design"
        category: med
        subject: "Design {feature} UI components"
        description: "Define component structure, props, and user interactions"
        notes: |
          Define component hierarchy.
          Specify props and state management.
          Design user interactions and event handlers.
          Ensure accessibility (ARIA labels, keyboard navigation).

          Call specialists: frontend-engineer, solution-architect

      - id_suffix: "ui-implement"
        category: high
        subject: "Implement {feature} components"
        description: "Build React/Vue components with styling"
        depends_on: ["ui-design"]
        notes: |
          Create reusable components following project patterns.
          Implement state management (local state, context, or store).
          Add client-side validation.
          Style components following design system.
          Optimize for performance (memoization, lazy loading).

          Call specialists: frontend-engineer

      - id_suffix: "ui-integration"
        category: high
        subject: "Integrate {feature} with backend API"
        description: "Connect UI components to backend endpoints"
        depends_on: ["ui-implement"]
        notes: |
          Implement API client calls.
          Handle loading, success, and error states.
          Add proper error messages for users.
          Implement optimistic updates where appropriate.
          Add request caching/deduplication.

          Call specialists: frontend-engineer, api-designer

      - id_suffix: "ui-tests"
        category: med
        subject: "Test {feature} components"
        description: "Unit and integration tests for UI components"
        depends_on: ["ui-integration"]
        notes: |
          Test component rendering with different props.
          Test user interactions (clicks, form submissions, etc.).
          Test error handling and edge cases.
          Test accessibility (screen reader, keyboard navigation).
          End-to-end tests for critical user flows.

          Call specialists: qa-engineer, frontend-engineer

  # Performance Optimization
  - pattern: "(?i)(optimize|improve|speed up|performance|slow)"
    type: performance-optimization
    subtasks:
      - id_suffix: "perf-analysis"
        category: med
        subject: "Profile and identify performance bottlenecks"
        description: "Measure current performance and find slow operations"
        notes: |
          Set up profiling tools (cProfile, py-spy, browser DevTools).
          Identify slow endpoints, queries, or functions.
          Measure baseline performance metrics.
          Prioritize optimizations by impact.

          Call specialists: backend-engineer, database-architect

      - id_suffix: "perf-optimize"
        category: high
        subject: "Implement performance optimizations"
        description: "Apply optimizations to identified bottlenecks"
        depends_on: ["perf-analysis"]
        notes: |
          Optimize database queries (add indexes, reduce N+1 queries).
          Add caching where appropriate (Redis, in-memory).
          Optimize algorithms (reduce time complexity).
          Add pagination for large datasets.
          Implement lazy loading and background processing.

          Call specialists: backend-engineer, database-architect

      - id_suffix: "perf-tests"
        category: med
        subject: "Verify performance improvements"
        description: "Benchmark and validate optimizations"
        depends_on: ["perf-optimize"]
        notes: |
          Re-run performance profiling.
          Compare before/after metrics.
          Load testing to ensure improvements hold under load.
          Monitor for performance regressions in CI.

          Call specialists: qa-engineer

  # Security Enhancement
  - pattern: "(?i)(security|vulnerability|exploit|xss|sql injection|csrf)"
    type: security-enhancement
    subtasks:
      - id_suffix: "security-audit"
        category: high
        subject: "Conduct security audit"
        description: "Identify security vulnerabilities and risks"
        notes: |
          Review authentication and authorization logic.
          Check for common vulnerabilities (OWASP Top 10).
          Audit input validation and sanitization.
          Review secrets management and encryption.
          Identify attack vectors.

          Call specialists: security-engineer

      - id_suffix: "security-fixes"
        category: high
        subject: "Implement security fixes"
        description: "Address identified vulnerabilities"
        depends_on: ["security-audit"]
        notes: |
          Fix authentication/authorization issues.
          Add input validation and sanitization.
          Implement CSRF protection.
          Add rate limiting and DDoS protection.
          Encrypt sensitive data at rest and in transit.
          Remove hardcoded secrets.

          Call specialists: security-engineer, backend-engineer

      - id_suffix: "security-tests"
        category: high
        subject: "Security testing and validation"
        description: "Verify security fixes and test for vulnerabilities"
        depends_on: ["security-fixes"]
        notes: |
          Test authentication and authorization edge cases.
          Test input validation (injection attacks, XSS).
          Test CSRF protection.
          Test rate limiting.
          Penetration testing if possible.

          Call specialists: security-engineer, qa-engineer

  # Default/Generic Task (fallback)
  - pattern: ".*"
    type: generic-task
    subtasks:
      - id_suffix: "impl"
        category: med
        subject: "{request}"
        description: "{request}"
        notes: |
          Generic task without specific decomposition template.
          spec-creator will analyze request and determine best approach.

          Specialists will be selected based on keywords in request.
