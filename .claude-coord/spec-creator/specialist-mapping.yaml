# Specialist Mapping Configuration
# Defines which specialist agents to call for different task types and keywords

specialists:
  security-engineer:
    description: "Security review, threat modeling, vulnerability assessment"
    questions:
      - "What security risks does this task introduce?"
      - "What authentication/authorization is needed?"
      - "What input validation is required?"
      - "Are there any OWASP concerns (injection, XSS, CSRF, etc.)?"
      - "How should sensitive data be protected?"

  database-architect:
    description: "Schema design, indexing, query optimization, migrations"
    questions:
      - "What database schema changes are needed?"
      - "What indexes should be added for performance?"
      - "What are the expected query patterns?"
      - "How should data be migrated safely?"
      - "What are the scalability considerations?"

  backend-engineer:
    description: "Server-side logic, business rules, API implementation"
    questions:
      - "What business logic is required?"
      - "What edge cases need handling?"
      - "What error scenarios exist?"
      - "What performance considerations apply?"
      - "How should this integrate with existing services?"

  api-designer:
    description: "API contracts, REST design, request/response schemas"
    questions:
      - "What endpoints are needed?"
      - "What are the request/response formats?"
      - "What status codes for different scenarios?"
      - "What API versioning strategy should be used?"
      - "How should pagination/filtering work?"

  frontend-engineer:
    description: "UI components, client-side logic, user experience"
    questions:
      - "What UI components are needed?"
      - "What user interactions should occur?"
      - "What client-side validation is needed?"
      - "What accessibility requirements apply?"
      - "How should loading and error states be handled?"

  qa-engineer:
    description: "Test strategy, test cases, quality assurance"
    questions:
      - "What test cases are needed?"
      - "What edge cases should be tested?"
      - "What is the test data strategy?"
      - "What CI/CD integration is needed?"
      - "How should test coverage be measured?"

  integration-specialist:
    description: "Third-party API integration, webhooks, external services"
    questions:
      - "How should we integrate with the external service?"
      - "What error handling for API failures?"
      - "What retry/backoff strategy is appropriate?"
      - "How should webhook signatures be verified?"
      - "What rate limits apply?"

  solution-architect:
    description: "High-level design, technology choices, system architecture"
    questions:
      - "What is the overall architecture?"
      - "What technology choices are best?"
      - "What are the scalability considerations?"
      - "What are alternative approaches?"
      - "How does this fit into the larger system?"

  performance-engineer:
    description: "Performance optimization, profiling, benchmarking"
    questions:
      - "What are the performance bottlenecks?"
      - "What optimization strategies apply?"
      - "How should we measure performance?"
      - "What caching strategies are appropriate?"
      - "What are the performance targets?"

# Task type to specialist mappings
task_types:
  oauth-integration:
    - security-engineer
    - backend-engineer
    - integration-specialist
    - qa-engineer

  api-endpoint:
    - database-architect
    - backend-engineer
    - api-designer
    - security-engineer
    - qa-engineer

  payment-integration:
    - security-engineer
    - backend-engineer
    - integration-specialist
    - database-architect
    - qa-engineer

  database-refactor:
    - database-architect
    - backend-engineer
    - qa-engineer

  frontend-feature:
    - frontend-engineer
    - api-designer
    - qa-engineer

  performance-optimization:
    - performance-engineer
    - database-architect
    - backend-engineer
    - qa-engineer

  security-enhancement:
    - security-engineer
    - backend-engineer
    - qa-engineer

  generic-task:
    - solution-architect
    - backend-engineer
    - qa-engineer

# Keyword-based specialist selection
# These are added to specialists from task_type mapping
keywords:
  oauth:
    - security-engineer
    - integration-specialist

  authentication:
    - security-engineer
    - backend-engineer

  authorization:
    - security-engineer
    - backend-engineer

  database:
    - database-architect

  schema:
    - database-architect

  migration:
    - database-architect

  api:
    - api-designer
    - backend-engineer

  endpoint:
    - api-designer
    - backend-engineer

  payment:
    - security-engineer
    - integration-specialist

  billing:
    - security-engineer
    - integration-specialist

  subscription:
    - security-engineer
    - backend-engineer

  frontend:
    - frontend-engineer

  ui:
    - frontend-engineer

  component:
    - frontend-engineer

  security:
    - security-engineer

  vulnerability:
    - security-engineer

  performance:
    - performance-engineer
    - database-architect

  optimization:
    - performance-engineer

  webhook:
    - integration-specialist
    - security-engineer

  integration:
    - integration-specialist

  test:
    - qa-engineer

  testing:
    - qa-engineer

# Specialist dependencies (specialists can call other specialists)
# Maximum depth: 2 levels to prevent excessive nesting
specialist_dependencies:
  security-engineer:
    can_call:
      - backend-engineer  # For implementation details

  database-architect:
    can_call:
      - backend-engineer  # For ORM/query patterns

  frontend-engineer:
    can_call:
      - api-designer  # For API contracts

  integration-specialist:
    can_call:
      - security-engineer  # For security review of external APIs

  performance-engineer:
    can_call:
      - database-architect  # For query optimization
