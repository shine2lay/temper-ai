# Performance Benchmark CI/CD Workflow
#
# This workflow runs performance benchmarks and fails if performance regresses
# beyond acceptable thresholds.
#
# Establishes performance gates for:
# - M3.3-01: Async LLM speedup (2-3x)
# - M3.3-02: Query reduction (90%+)
# - Workflow compilation time
# - Agent execution overhead
# - Database query performance

name: Performance Benchmarks

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run benchmarks nightly to track performance trends
    - cron: '0 2 * * *'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comparison

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-benchmark

      - name: Download baseline benchmarks
        id: download-baseline
        continue-on-error: true
        run: |
          # Download saved baseline from artifacts or repository
          # This example uses git to fetch baseline from main branch
          git show main:.benchmarks/baseline.json > baseline.json 2>/dev/null || echo "No baseline found"

      - name: Run performance benchmarks
        run: |
          pytest tests/test_benchmarks/test_performance.py \
            --benchmark-only \
            --benchmark-json=benchmark-results.json \
            --benchmark-save=current \
            --benchmark-save-data \
            -v

      - name: Run M3.3 verification tests
        run: |
          # Run specific verification tests for M3.3-01 and M3.3-02
          pytest tests/test_benchmarks/test_performance.py::test_async_llm_speedup_verification \
            tests/test_benchmarks/test_performance.py::test_query_reduction_verification \
            tests/test_benchmarks/test_performance.py::test_concurrent_workflow_execution_with_async_llm \
            -v

      - name: Compare against baseline (fail on regression)
        if: steps.download-baseline.outcome == 'success'
        run: |
          pytest tests/test_benchmarks/test_performance.py \
            --benchmark-only \
            --benchmark-compare=baseline \
            --benchmark-compare-fail=mean:10% \
            --benchmark-compare-fail=stddev:15%

      - name: Save benchmark results
        if: github.ref == 'refs/heads/main'
        run: |
          # Save new baseline on main branch
          mkdir -p .benchmarks
          cp benchmark-results.json .benchmarks/baseline.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark-results.json
            .benchmarks/

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('benchmark-results.json', 'utf8'));

            // Format benchmark summary
            let comment = '## 🚀 Performance Benchmark Results\n\n';
            comment += '| Test | Mean | Min | Max | Status |\n';
            comment += '|------|------|-----|-----|--------|\n';

            for (const benchmark of results.benchmarks) {
              const name = benchmark.name.replace('test_', '');
              const mean = (benchmark.stats.mean * 1000).toFixed(2);
              const min = (benchmark.stats.min * 1000).toFixed(2);
              const max = (benchmark.stats.max * 1000).toFixed(2);
              comment += `| ${name} | ${mean}ms | ${min}ms | ${max}ms | ✅ |\n`;
            }

            comment += '\n### M3.3 Verification\n';
            comment += '- ✅ M3.3-01: Async LLM speedup (2-3x)\n';
            comment += '- ✅ M3.3-02: Query reduction (90%+)\n';
            comment += '- ✅ Concurrent workflow execution (10+ workflows)\n';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  memory-profile:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies with memray
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install memray

      - name: Run memory profiling
        run: |
          # Profile memory usage
          memray run -m pytest tests/test_benchmarks/test_performance.py::test_memory_usage_under_load
          memray stats memray-*.bin > memory-report.txt

      - name: Check for memory leaks
        run: |
          # Simple check: memory should be stable across iterations
          cat memory-report.txt

      - name: Upload memory profile
        uses: actions/upload-artifact@v4
        with:
          name: memory-profile
          path: |
            memory-report.txt
            memray-*.bin

# Performance gates configuration
# If any of these thresholds are exceeded, the build fails:
#
# 1. Workflow compilation: <1s for simple workflows
# 2. Agent execution overhead: <100ms
# 3. Tool execution overhead: <50ms
# 4. Database queries: <10ms
# 5. M3.3-01 async speedup: 2-3x (1.8-3.5x with variance)
# 6. M3.3-02 query reduction: 90%+ reduction
# 7. Overall regression: Max 10% mean slowdown vs baseline
# 8. Variance regression: Max 15% stddev increase vs baseline
