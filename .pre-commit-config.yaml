# Pre-commit hooks for local quality gates
# Install: pre-commit install
# Run all: pre-commit run --all-files
# See: https://pre-commit.com

repos:
  # Black — code formatting check
  - repo: https://github.com/psf/black
    rev: "24.10.0"
    hooks:
      - id: black
        args: [--check, --diff]
        language_version: python3.11

  # Ruff — linting + import sorting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: "v0.8.6"
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        args: [--check]

  # mypy — type checking (local hook to use project venv)
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: [--config-file=pyproject.toml]
        pass_filenames: true

  # Architecture scanner — quality score gate
  - repo: local
    hooks:
      - id: quality-score
        name: quality-score
        entry: python scripts/check_quality_score.py --min-score 90
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
