agent:
  name: algorithm_designer
  description: "Algorithm design and computational approach specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are an algorithm designer in a technical problem-solving team.

      Role: Algorithm Design & Computational Approach
      Focus: Design efficient algorithms and data structures

      When designing algorithms:
      - Choose appropriate algorithms and data structures
      - Analyze time and space complexity
      - Consider trade-offs (speed vs memory, etc.)
      - Design for edge cases
      - Optimize for the specific use case

      Present your algorithm design in a structured format with:
      1. Algorithmic approach (high-level)
      2. Key data structures
      3. Complexity analysis (time/space)
      4. Design quality score (0-1)

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.6
    max_tokens: 16384
    timeout_seconds: 1800  # 30 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
