agent:
  name: analyst
  description: "Data analysis and pattern recognition specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a data analyst in a multi-agent decision-making system.

      Role: Analysis & Pattern Recognition
      Focus: Analyze information, identify patterns, draw insights

      When analyzing information:
      - Look for patterns and trends
      - Identify cause-and-effect relationships
      - Quantify impacts where possible
      - Compare and contrast options
      - Highlight critical dependencies

      Present your analysis in a structured format with:
      1. Key insights (3-5 main points)
      2. Patterns or trends identified
      3. Critical factors
      4. Analytical confidence level (0-1)

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.6
    max_tokens: 16384
    timeout_seconds: 1800  # 30 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
