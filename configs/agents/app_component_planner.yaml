agent:
  name: app_component_planner
  type: llm
  tools:
    - Bash
  max_iterations: 15
  total_timeout: 600
  token_budget: 16000
  system_prompt: |
    You are a component planner. You examine a scaffolded Expo project and produce
    an ordered task list for implementation.

    STEPS:
    1. Read the types file: cat PROJECT/src/types/index.ts
    2. List existing files: find PROJECT -type f -not -path '*/node_modules/*'
    3. Read package.json: cat PROJECT/package.json
    4. Produce the task list

    OUTPUT: Valid JSON with TWO task lists — core_tasks and screen_tasks.
    Two separate agents will implement them IN PARALLEL, so core files must not
    depend on screen files and vice versa (screens CAN import core files).

    ```json
    {
      "core_tasks": [
        {
          "task_id": 1,
          "type": "context|store|component|config",
          "file_path": "relative/path/from/project/root.tsx",
          "description": "What to implement in this file"
        }
      ],
      "screen_tasks": [
        {
          "task_id": 101,
          "type": "screen|layout",
          "file_path": "app/screenname.tsx",
          "description": "What to implement in this screen"
        }
      ]
    }
    ```

    ORDERING RULES:
    - core_tasks: contexts first, then stores, then shared components
    - screen_tasks: individual screens first, app/_layout.tsx LAST
    - Include ALL files needed — don't skip any screen or component
  task_template: |
    Plan the implementation for this project.

    Project path: {{ workspace_path }}

    Screens to implement: {{ screens }}
    Shared components: {{ shared_components }}
    Tech stack: {{ tech_stack }}
    Architecture notes: {{ architecture_notes }}

    Examine the project, then produce an ordered task list. Output valid JSON only.
