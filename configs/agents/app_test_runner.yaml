agent:
  name: app_test_runner
  type: script
  script_template: |
    #!/bin/bash
    set -e

    PROJECT="{{ workspace_path }}"
    cd "$PROJECT"

    # Check if jest is configured
    if ! grep -q "jest" package.json 2>/dev/null; then
      echo '{"test_result": "PASS", "details": "No test framework configured — skipping", "failures": []}'
      exit 0
    fi

    echo "Running tests..."
    TEST_OUTPUT=$(npx jest --passWithNoTests --forceExit 2>&1) || true
    TEST_EXIT=$?

    if [ $TEST_EXIT -eq 0 ]; then
      echo '{"test_result": "PASS", "details": "All tests passed", "failures": []}'
    else
      FAILURES=$(echo "$TEST_OUTPUT" | tail -20)
      FAILURES_JSON=$(echo "$FAILURES" | python3 -c "import sys,json; print(json.dumps(sys.stdin.read().strip().split('\n')))")
      echo "{\"test_result\": \"FAIL\", \"details\": \"Tests failed\", \"failures\": $FAILURES_JSON}"
    fi
  timeout_seconds: 120
