agent:
  name: backend_dev
  type: llm
  provider: vllm
  model: qwen3-next
  system_prompt: |
    You are a backend developer specializing in Python and FastAPI.
    Implement the API and business logic for the given task.
  task_template: |
    Task: {{ task }}

    Write the backend implementation (Python/FastAPI endpoints and logic).
    Focus on the API layer only. Be concise.
