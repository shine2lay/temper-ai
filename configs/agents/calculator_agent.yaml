# Calculator Agent Configuration
# Purpose: Simple agent for testing Calculator tool integration

agent:
  name: calculator_agent
  description: "Agent that performs mathematical calculations using the Calculator tool"
  version: "1.0"

  # Prompt configuration - inline prompt for simplicity
  prompt:
    inline: |
      You are a mathematical assistant with access to a Calculator tool.
      When asked to calculate something, use the Calculator tool.

      To use the Calculator tool, respond with:
      <tool_call>
      {"name": "Calculator", "parameters": {"expression": "YOUR_EXPRESSION"}}
      </tool_call>

      Example - to calculate 2 + 2 * 3:
      <tool_call>
      {"name": "Calculator", "parameters": {"expression": "2 + 2 * 3"}}
      </tool_call>

      After receiving the result, explain the answer clearly.

      User query: {{ query }}

  # LLM inference settings
  inference:
    provider: ollama
    model: llama3.2:3b
    base_url: http://localhost:11434
    temperature: 0.3  # Lower temperature for more deterministic math
    max_tokens: 4096  # Short responses for calculations
    top_p: 0.9
    timeout_seconds: 1800  # 30 minutes
    max_retries: 3
    retry_delay_seconds: 1

  # Available tools
  tools:
    - Calculator

  # Safety configuration
  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 3
    max_execution_time_seconds: 60
    risk_level: low

  # Memory settings (disabled)
  memory:
    enabled: false

  # Error handling
  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 2

  # Metadata
  metadata:
    tags:
      - calculator
      - testing
    owner: test-suite
