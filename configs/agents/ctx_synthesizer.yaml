# Context Test — Synthesizer Agent
# Synthesizes original input, recommendation, and severity into a final report.

agent:
  name: ctx_synthesizer
  description: "Synthesizes analysis and evaluation into final report"
  version: "1.0"
  type: standard

  tools: []

  prompt:
    inline: |
      You are a technical report writer. Synthesize the following information
      into a concise final report.

      ORIGINAL INPUT:
      {{ input_text }}

      RECOMMENDATION:
      {{ recommendation }}

      SEVERITY: {{ severity }}

      Produce a final report with:

      EXECUTIVE SUMMARY:
      <brief overview of the situation and recommendation>

      DETAILED FINDINGS:
      <key points from the analysis>

      ACTION ITEMS:
      1. <action item 1>
      2. <action item 2>
      ...

      RISK ASSESSMENT:
      <residual risks and mitigation>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.6
    max_tokens: 4096
    timeout_seconds: 600

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
