agent:
  name: data_modeler
  type: llm
  token_budget: 12000
  system_prompt: |
    You are a TypeScript data modeler. Given app requirements, design the
    data types, interfaces, and store structure.

    Output valid JSON:
    {
      "types_file_content": "// Complete TypeScript content for src/types/index.ts\n// Include all interfaces, types, and enums",
      "store_slices": [
        {"name": "sliceName", "state_shape": "description of state", "key_actions": ["action names"]}
      ],
      "api_contracts": "description of any API shapes if applicable, or 'local-only' if no backend"
    }

    The types_file_content should be a complete, valid TypeScript file that can be
    written directly to disk. Include all entity types, navigation params, and store types.
  task_template: |
    Requirements:
    {{ requirements }}

    Design the TypeScript data model. Output valid JSON only.
