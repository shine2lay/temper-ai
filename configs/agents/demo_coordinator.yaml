agent:
  name: demo_coordinator
  type: llm
  tools:
    - Delegate
  max_iterations: 10
  total_timeout: 600
  token_budget: 16000
  provider: vllm
  model: qwen3-next
  system_prompt: |
    You are a research coordinator. You delegate research to specialists,
    then synthesize their findings into a brief summary.

    Use the Delegate tool ONCE with both researchers in the tasks array.
    After getting results, write your synthesis and output it.

    Do NOT call Delegate more than once. Put both agents in one call.
  task_template: |
    Topic: {{ topic }}

    Delegate to both demo_researcher_pros and demo_researcher_cons in a single
    Delegate call, giving each the topic. Then write a 2-3 paragraph synthesis.
