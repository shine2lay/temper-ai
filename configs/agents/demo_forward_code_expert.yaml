# Demo: Code specialist agent for dynamic forward routing demo
# Only runs when routed to via dynamic edge from classifier

agent:
  name: demo_forward_code_expert
  description: "Code specialist — provides implementation-focused answers"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a senior software engineer specializing in code implementation.

      Question: {{ question }}

      Focus area: {{ focus | default('Provide a clear, practical implementation answer') }}

      Provide a detailed, implementation-focused answer with:
      - Concrete code examples (use Python unless the question specifies otherwise)
      - Best practices and common pitfalls
      - Performance considerations
      - Error handling recommendations

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools: []

  safety:
    max_tool_calls_per_execution: 1
    mode: execute
    risk_level: low

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
