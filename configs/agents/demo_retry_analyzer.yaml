# Demo: Analyzer agent for dynamic edge routing demo
# Produces brief output initially; detailed output when feedback is present (via dynamic inputs)

agent:
  name: demo_retry_analyzer
  description: "Analyzes a question — adjusts detail level based on evaluator feedback"
  version: "2.0"
  type: standard

  prompt:
    inline: |
      You are a technical analyst.

      Analyze the following question/topic:
      {{ question }}

      {% if feedback is defined and feedback %}
      CRITICAL: Your previous analysis was rejected by the downstream evaluator.
      Evaluator feedback: {{ feedback }}

      You MUST now provide a COMPREHENSIVE, DETAILED analysis with:
      - At least 5 specific technical bullet points
      - Concrete implementation steps
      - Risk assessment
      - Dependencies and prerequisites
      - Performance considerations
      {% else %}
      Provide a brief, high-level summary in 1-2 sentences only. Do NOT go into detail.
      {% endif %}

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools: []

  safety:
    max_tool_calls_per_execution: 1
    mode: execute
    risk_level: low

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
