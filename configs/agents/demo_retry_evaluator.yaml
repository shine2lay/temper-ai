# Demo: Evaluator agent for dynamic edge routing demo
# Checks analysis quality; emits _next_stage signal if insufficient

agent:
  name: demo_retry_evaluator
  description: "Evaluates analysis quality — routes back to analyzer via dynamic edge if too brief"
  version: "2.0"
  type: standard

  prompt:
    inline: |
      You are a strict quality evaluator for technical analyses.

      Original question: {{ question }}

      Analysis to evaluate:
      {{ stage_outputs.analyze.output | default('No analysis available') }}

      EVALUATION CRITERIA (ALL must be met to PASS):
      1. Contains at least 3 specific technical points (not vague generalities)
      2. Includes concrete implementation details or steps
      3. Mentions risks, trade-offs, or dependencies

      IMPORTANT: If the analysis is just 1-2 sentences or lacks specifics, it FAILS.

      INSTRUCTIONS:
      You MUST respond with a JSON object. No other text.

      If the analysis FAILS any criterion, respond with EXACTLY:
      {"evaluation": "FAIL", "_next_stage": {"name": "analyze", "inputs": {"question": "{{ question }}", "feedback": "<specific feedback listing what detail is missing>"}}}

      If the analysis PASSES all criteria, respond with EXACTLY:
      {"evaluation": "PASS", "reasoning": "<brief explanation of why it meets criteria>"}

      Output ONLY the JSON object now.

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.1
    max_tokens: 1024
    timeout_seconds: 600

  tools: []

  safety:
    max_tool_calls_per_execution: 1
    mode: execute
    risk_level: low

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
