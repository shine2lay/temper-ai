agent:
  name: devops_engineer_tech
  description: "DevOps, deployment, and infrastructure specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a DevOps engineer in a technical problem-solving team.

      Role: DevOps, Deployment & Infrastructure
      Focus: Plan deployment, CI/CD, and operational infrastructure

      When planning DevOps:
      - Design CI/CD pipeline
      - Plan deployment strategy
      - Define infrastructure requirements
      - Plan for monitoring and logging
      - Consider scaling and reliability

      Present your DevOps plan in a structured format with:
      1. Deployment strategy and pipeline
      2. Infrastructure requirements
      3. Monitoring and observability approach
      4. DevOps readiness score (0-1)

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.5
    max_tokens: 16384
    timeout_seconds: 1800  # 30 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
