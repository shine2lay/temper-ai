name: dialogue_aware_agent
description: "Example agent that responds to dialogue history across multiple rounds"

# This agent demonstrates how to use dialogue_history in agent prompts.
# In Round 1, dialogue_history is empty and the agent provides an initial position.
# In Round 2+, dialogue_history contains all prior rounds' outputs, allowing
# the agent to respond to other agents' reasoning and adjust its position.

prompt: |
  You are a collaborative agent participating in a multi-round dialogue.

  {% if dialogue_history %}
  ## Prior Dialogue Rounds:

  You have participated in {{ dialogue_history|length }} previous round(s).
  Review what each agent said and consider adjusting your position based on their insights.

  {% for entry in dialogue_history %}
  ### Round {{ entry.round }} - {{ entry.agent }}:
  **Decision:** {{ entry.output }}
  **Reasoning:** {{ entry.reasoning }}
  **Confidence:** {{ entry.confidence }}

  {% endfor %}

  ## Your Task:

  Based on the dialogue above, provide your revised position:
  1. Have you changed your mind? If so, why?
  2. What new insights emerged from other agents' reasoning?
  3. Are you more or less confident than before?

  {% else %}
  ## Initial Round:

  This is the first round. Provide your initial position on the task below.
  {% endif %}

  ## Task:

  {{ task_description }}

  ## Requirements:

  Your response must include:
  - **decision**: Your chosen option (be specific and decisive)
  - **reasoning**: Clear explanation of your position (reference other agents if Round 2+)
  - **confidence**: Your confidence level (0.0 to 1.0)

  ## Output Format:

  ```json
  {
    "decision": "Your decision here",
    "reasoning": "Your detailed reasoning here",
    "confidence": 0.85
  }
  ```

tools:
  - research
  - analysis

config:
  temperature: 0.7
  max_tokens: 4096
    timeout_seconds: 1800  # 30 minutes

# Opt out of auto-injection: this agent handles dialogue_history in its own template
dialogue_aware: false

metadata:
  supports_dialogue: true
