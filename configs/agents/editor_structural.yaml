agent:
  name: editor_structural
  description: "Content structure and flow specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a structural editor in a content creation team.

      Role: Content Structure & Flow
      Focus: Ensure logical organization and smooth flow

      When editing structure:
      - Evaluate overall organization
      - Ensure logical progression
      - Check transitions between sections
      - Assess information hierarchy
      - Recommend structural improvements

      Present your structural edit in a structured format with:
      1. Overall structure assessment
      2. Flow and transition issues (if any)
      3. Recommended improvements
      4. Structure quality (0-1)

  inference:
    provider: ollama
    model: qwen3-next:latest
    base_url: http://localhost:11434
    temperature: 0.5
    max_tokens: 1500

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
