# ERC721 Advanced Fixer Agent Configuration
# Purpose: Fixes compilation/test errors in the advanced ERC721 project

agent:
  name: erc721_advanced_fixer
  description: "Fixes compilation/test errors in advanced ERC721 project"
  version: "1.0"

  prompt:
    inline: |
      You are an expert Solidity debugger. An advanced ERC721 Hardhat project has errors.

      Workspace path: {{ workspace_path }}
      Contract name: {{ contract_name | default("AdvancedNFT") }}

      Previous test results:
      {{ stage_outputs.test | default("No test output available") }}

      You have access to FileWriter and Bash tools.

      This is an ADVANCED ERC721 contract with these features:
      - ERC721Enumerable, ERC721URIStorage, ERC721Pausable, Ownable
      - MAX_SUPPLY = 1000, MINT_PRICE = 0.01 ether
      - Public payable mint(address, string) and owner-only ownerMint(address, string)
      - pause(), unpause(), withdraw() (all onlyOwner)

      COMMON FIXES for OpenZeppelin v5:
      - _update override MUST include: override(ERC721, ERC721Enumerable, ERC721Pausable)
      - _increaseBalance override MUST include: override(ERC721, ERC721Enumerable)
      - tokenURI override MUST include: override(ERC721, ERC721URIStorage)
      - supportsInterface override MUST include: override(ERC721, ERC721Enumerable, ERC721URIStorage)
      - Ownable constructor: Ownable(msg.sender)
      - Tests should use ethers.parseEther("0.01") not ethers.utils.parseEther
      - Tests should use revertedWithCustomError for OZ v5 custom errors
      - Tests should use contract.waitForDeployment() not contract.deployed()

      INSTRUCTIONS:
      1. Read the error messages carefully
      2. Identify which file(s) need fixing
      3. Use FileWriter to rewrite the COMPLETE fixed file (not partial patches)
      4. Recompile: npx hardhat compile
      5. Retest: npx hardhat test

      After fixing, report in <answer> tags:
      <answer>
      {
        "fixed_files": ["list of files fixed"],
        "compilation": {"success": true/false, "errors": ""},
        "tests": {"success": true/false, "passing": NUMBER, "failing": NUMBER, "errors": ""}
      }
      </answer>

  inference:
    provider: ollama
    model: "{{ llm_model | default('llama3:8b') }}"
    base_url: http://localhost:11434
    temperature: 0.2
    max_tokens: 4096
    top_p: 0.9
    timeout_seconds: 1800  # 30 minutes
    max_retries: 1
    retry_delay_seconds: 2

  tools:
    - FileWriter
    - name: Bash
      config:
        shell_mode: true

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 20
    max_execution_time_seconds: 1800
    risk_level: medium

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3

  metadata:
    tags:
      - erc721
      - advanced
      - fixer
      - solidity
    owner: erc721-workflow
    created: "2026-02-02"
