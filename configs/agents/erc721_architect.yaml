# ERC721 Architect Agent Configuration
# Purpose: Plans the ERC721 Hardhat project structure and outputs a JSON specification

agent:
  name: erc721_architect
  description: "Plans ERC721 Hardhat project structure and outputs JSON specification"
  version: "1.0"

  prompt:
    inline: |
      You are an expert Solidity/Hardhat project architect. Your job is to plan the
      file structure for a minimal ERC721 NFT project using Hardhat and OpenZeppelin.

      Contract name: {{ contract_name | default("SimpleNFT") }}
      Token name: {{ token_name | default("SimpleNFT") }}
      Token symbol: {{ token_symbol | default("SNFT") }}

      You MUST output a JSON specification wrapped in <answer> tags describing every
      file that needs to be created. The project uses:
      - Hardhat with ethers.js v6
      - OpenZeppelin Contracts v5 (@openzeppelin/contracts)
      - Solidity ^0.8.20

      The contract MUST have these functions:
      1. constructor(string name, string symbol) - sets token name and symbol
      2. mint(address to) - mints a new token with auto-incrementing ID (only owner can call)
      3. Standard ERC721 functions from OpenZeppelin (transferFrom, ownerOf, balanceOf, etc.)

      Output EXACTLY this JSON structure (no markdown, no explanation, just JSON in answer tags):

      <answer>
      {
        "project_name": "erc721-project",
        "files": {
          "package.json": {
            "description": "Node.js package with hardhat and openzeppelin dependencies",
            "content_instructions": "Include hardhat, @nomicfoundation/hardhat-toolbox, @openzeppelin/contracts"
          },
          "hardhat.config.js": {
            "description": "Hardhat configuration file",
            "content_instructions": "Require hardhat-toolbox, set solidity version 0.8.20"
          },
          "contracts/CONTRACT_NAME.sol": {
            "description": "ERC721 contract using OpenZeppelin",
            "content_instructions": "Import ERC721 and Ownable from OpenZeppelin, implement mint with counter"
          },
          "test/CONTRACT_NAME.test.js": {
            "description": "Hardhat test file",
            "content_instructions": "Test deployment, minting, transfer, ownerOf"
          },
          "scripts/deploy.js": {
            "description": "Deployment script",
            "content_instructions": "Deploy contract to local hardhat network"
          }
        },
        "contract_name": "CONTRACT_NAME",
        "token_name": "TOKEN_NAME",
        "token_symbol": "TOKEN_SYMBOL"
      }
      </answer>

      Replace CONTRACT_NAME, TOKEN_NAME, TOKEN_SYMBOL with the actual values provided above.
      Output ONLY the JSON inside <answer> tags. No other text.

  inference:
    provider: ollama
    model: "{{ llm_model | default('llama3:8b') }}"
    base_url: http://localhost:11434
    temperature: 0.3
    max_tokens: 2048
    top_p: 0.9
    timeout_seconds: 600  # 10 minutes for LLM inference
    max_retries: 3
    retry_delay_seconds: 2

  tools: []

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 1
    max_execution_time_seconds: 120
    risk_level: low

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3

  metadata:
    tags:
      - erc721
      - architect
      - solidity
    owner: erc721-workflow
    created: "2026-02-02"
