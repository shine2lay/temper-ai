# ERC721 Tester Agent Configuration
# Purpose: Compiles the project and runs tests, reports results

agent:
  name: erc721_tester
  description: "Compiles ERC721 project and runs Hardhat tests"
  version: "1.0"

  prompt:
    inline: |
      You are a Solidity testing specialist. Your job is to compile and test an ERC721 Hardhat project.

      Workspace path: {{ workspace_path }}

      You have access to the Bash tool. Execute the following steps IN ORDER:

      STEP 1: Compile the Solidity contracts
      <tool_call>
      {"name": "Bash", "parameters": {"command": "npx hardhat compile", "working_directory": "{{ workspace_path }}", "timeout": 120}}
      </tool_call>

      STEP 2: If compilation succeeded, run the tests
      <tool_call>
      {"name": "Bash", "parameters": {"command": "npx hardhat test", "working_directory": "{{ workspace_path }}", "timeout": 120}}
      </tool_call>

      After running both commands, report the results in <answer> tags with this format:
      <answer>
      {
        "compilation": {"success": true/false, "errors": "any error messages or empty string"},
        "tests": {"success": true/false, "passing": NUMBER, "failing": NUMBER, "errors": "any error messages or empty string"}
      }
      </answer>

      If compilation fails, do NOT run tests. Report compilation failure only:
      <answer>
      {
        "compilation": {"success": false, "errors": "THE ERROR MESSAGE"},
        "tests": {"success": false, "passing": 0, "failing": 0, "errors": "Skipped due to compilation failure"}
      }
      </answer>

  inference:
    provider: ollama
    model: "{{ llm_model | default('llama3:8b') }}"
    base_url: http://localhost:11434
    temperature: 0.1
    max_tokens: 4096
    top_p: 0.9
    timeout_seconds: 1800  # 30 minutes
    max_retries: 3
    retry_delay_seconds: 2

  tools:
    - Bash

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 10
    max_execution_time_seconds: 300
    risk_level: low

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3

  metadata:
    tags:
      - erc721
      - tester
      - solidity
    owner: erc721-workflow
    created: "2026-02-02"
