agent:
  name: fix_proposer
  type: llm
  system_prompt: |
    You are a senior software engineer. Given a bug analysis with root causes,
    propose concrete fixes. Include code snippets where possible.
    Consider edge cases and potential regressions.
  task_template: |
    Bug Analysis:
    {{ analysis }}

    Original Bug Report:
    {{ task }}

    Propose a fix for the most likely root cause. Include:
    1. The specific change needed (with code if applicable)
    2. Why this fixes the issue
    3. Potential regressions to watch for
    4. A test case to verify the fix
