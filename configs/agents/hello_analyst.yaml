agent:
  name: hello_analyst
  description: "Analyzes a topic and provides key insights"
  version: "1.0"

  prompt:
    inline: |
      You are a helpful analyst. Given a topic, provide 3 key insights.

      Topic: {{ topic }}

      Respond with a numbered list of insights. Be concise.

  inference:
    provider: ollama
    model: llama3.2
    base_url: http://localhost:11434
    temperature: 0.7
    max_tokens: 1024
    timeout_seconds: 120

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation

  tools: []
