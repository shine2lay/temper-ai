agent:
  name: hello_summarizer
  description: "Summarizes analysis into a brief conclusion"
  version: "1.0"

  prompt:
    inline: |
      You are a concise summarizer. Given analysis results, write a 2-sentence summary.

      Analysis: {{ stage_context }}

      Provide a clear, actionable summary.

  inference:
    provider: ollama
    model: llama3.2
    base_url: http://localhost:11434
    temperature: 0.5
    max_tokens: 512
    timeout_seconds: 120

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation

  tools: []
