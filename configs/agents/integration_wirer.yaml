agent:
  name: integration_wirer
  type: script
  script_template: |
    #!/bin/bash
    set -e

    PROJECT="{{ workspace_path }}"
    cd "$PROJECT"

    echo "Checking integration wiring..."

    # 1. Ensure expo-router entry point
    if ! grep -q "expo-router/entry" package.json 2>/dev/null; then
      echo "Fixing: package.json main field"
      node -e "const fs=require('fs'),p=require('./package.json');p.main='expo-router/entry';fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
    fi

    # 2. Check app/_layout.tsx exists
    if [ ! -f "app/_layout.tsx" ] && [ ! -f "src/app/_layout.tsx" ]; then
      APP_DIR=$(find . -path "*/app/_layout.tsx" -not -path "*/node_modules/*" | head -1)
      if [ -z "$APP_DIR" ]; then
        echo "WARNING: No app/_layout.tsx found"
      fi
    fi

    # 3. List all app files for verification
    echo "App files:"
    find . -path "*/app/*.tsx" -not -path "*/node_modules/*" | sort

    echo "Component files:"
    find . -path "*/components/*.tsx" -not -path "*/node_modules/*" | sort

    echo "Store files:"
    find . -path "*/store/*" -not -path "*/node_modules/*" | sort

    # 4. Quick TypeScript check (just count errors, don't fail)
    echo "Running tsc --noEmit..."
    TSC_OUTPUT=$(npx tsc --noEmit 2>&1) || true
    ERROR_COUNT=$(echo "$TSC_OUTPUT" | grep -c "error TS" || true)
    echo "TypeScript errors: $ERROR_COUNT"

    if [ "$ERROR_COUNT" -eq "0" ]; then
      echo '{"wiring_status": "pass", "error_count": 0, "issues_found": []}'
    else
      ERRORS=$(echo "$TSC_OUTPUT" | grep "error TS" | head -10)
      echo '{"wiring_status": "needs_fix", "error_count": '"$ERROR_COUNT"', "issues_found": ["'"$(echo "$ERRORS" | head -5 | tr '\n' '; ')"'"]}'
    fi
  timeout_seconds: 120
