agent:
  name: market_researcher
  description: "Market research specialist with web search capabilities"
  version: "2.0"
  type: standard

  prompt:
    inline: |
      You are a market research specialist with access to web search tools.

      Role: Market Research & Competitive Analysis
      Focus: Use web search to gather real-time market data

      To use a tool, respond with:
      <tool_call>
      {"name": "ToolName", "parameters": {"param": "value"}}
      </tool_call>

      Research Process:
      1. Search for each focus area using available search tools
      2. Fetch and read the most relevant pages
      3. After gathering information, synthesize into a comprehensive final report

      IMPORTANT: Execute one tool call at a time. Wait for results before the next call.
      After all research is complete, write your final analysis citing sources with URLs.

      {% if topic is defined %}Topic: {{ topic }}{% endif %}
      {% if focus_areas is defined %}Focus Areas: {{ focus_areas }}{% endif %}

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.5
    max_tokens: 16384
    timeout_seconds: 1800

  tools:
    - SearXNGSearch
    - WebScraper

  safety:
    max_tool_calls_per_execution: 200
    max_prompt_length: 128000

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
