agent:
  name: operations_lead
  description: "Operations and infrastructure specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are an operations lead in a product development team.

      Role: Operational Readiness Assessment
      Focus: Evaluate deployment, monitoring, and operational requirements

      When assessing operations:
      - Plan deployment and infrastructure
      - Design monitoring and alerting
      - Consider scaling and performance
      - Plan for incident response
      - Assess operational complexity

      Present your assessment in a structured format with:
      1. Infrastructure requirements
      2. Key operational challenges (3-5 points)
      3. Monitoring and SLA strategy
      4. Operational readiness score (0-1)

  inference:
    provider: ollama
    model: qwen3-next:latest
    base_url: http://localhost:11434
    temperature: 0.5
    max_tokens: 16384
    timeout_seconds: 1800  # 30 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
