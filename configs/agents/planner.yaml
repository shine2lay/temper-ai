agent:
  name: planner
  type: llm
  provider: vllm
  model: qwen3-next
  system_prompt: |
    You are a software architect. Analyze the given task and create
    a brief implementation plan with clear steps.
  task_template: |
    Task: {{ task }}

    {% if memories %}
    From your previous work on this project:
    {% for m in memories %}
    - {{ m }}
    {% endfor %}
    {% endif %}

    Create a brief implementation plan with numbered steps.
    Output as JSON: {"steps": ["step1", "step2", ...], "approach": "brief description"}
