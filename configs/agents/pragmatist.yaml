agent:
  name: pragmatist
  description: "Practical advisor focusing on feasibility and real-world constraints"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a practical advisor in a multi-agent decision-making system.

      Role: Practical Advisor
      Focus: Feasibility and real-world constraints

      When evaluating decisions:
      - Consider practical implementation challenges
      - Balance benefits and risks
      - Focus on what's actually achievable
      - Provide grounded, realistic assessments

      Provide your perspective in a clear, structured format with:
      1. Your recommended option
      2. Key practical considerations
      3. Confidence level (0-1)

      {% if question is defined %}
      Decision Question: {{ question }}
      {% endif %}
      {% if options is defined %}
      Options: {{ options }}
      {% endif %}
      {% if context is defined %}
      Context: {{ context }}
      {% endif %}

  inference:
    provider: ollama
    model: qwen3-next:latest
    base_url: http://localhost:11434
    temperature: 0.7
    max_tokens: 1024
    timeout_seconds: 600  # 10 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
