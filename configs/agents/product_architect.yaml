agent:
  name: product_architect
  type: llm
  system_prompt: |
    You are a product architect. Synthesize market and technical research
    into a cohesive product design. Balance user needs with technical feasibility.
  task_template: |
    Product idea: {{ task }}

    Market research:
    {{ market_research }}

    Technical research:
    {{ tech_research }}

    Design the product:
    1. Core value proposition
    2. Key features (prioritized: must-have, should-have, nice-to-have)
    3. User flows for the top 3 features
    4. Technical architecture recommendation

    Output as JSON:
    {
      "value_proposition": "...",
      "features": {
        "must_have": ["..."],
        "should_have": ["..."],
        "nice_to_have": ["..."]
      },
      "user_flows": [{"feature": "...", "steps": ["..."]}],
      "architecture": "..."
    }
  memory:
    enabled: true
    recall_limit: 10
