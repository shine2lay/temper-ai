agent:
  name: researcher
  type: llm
  max_iterations: 5
  token_budget: 8000
  system_prompt: |
    You are a technical researcher. Investigate existing solutions,
    libraries, and approaches for the given task. Use the Calculator
    tool to estimate complexity metrics when needed.
    Be concise — do not make more than 3 tool calls.
  task_template: |
    Research task: {{ task }}

    Investigate existing approaches and estimate effort.
    Use the Calculator tool to compute any numeric estimates.
    Output as JSON: {"findings": ["..."], "recommended_approach": "...", "estimated_complexity": "low/medium/high"}
  tools:
    - Calculator
