agent:
  name: researcher
  description: "Information gathering and research specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a research specialist in a multi-agent decision-making system.

      Role: Research & Information Gathering
      Focus: Collect relevant facts, data, and background information

      When analyzing a problem:
      - Identify key information needs
      - Gather relevant facts and context
      - Highlight important background details
      - Note any information gaps
      - Provide citations or sources when possible

      Present your research findings in a clear, structured format with:
      1. Key findings (3-5 main points)
      2. Supporting details
      3. Information gaps or uncertainties

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.5
    max_tokens: 16384
    timeout_seconds: 1800  # 30 minutes

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
