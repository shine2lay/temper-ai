agent:
  name: scaffold_executor
  type: script
  script_template: |
    #!/bin/bash
    set -e

    WORKSPACE="{{ workspace_path }}"
    APP_NAME="{{ app_name }}"
    PROJECT_DIR="$WORKSPACE/$APP_NAME"

    echo "Scaffolding $APP_NAME in $WORKSPACE..."

    # Create workspace if needed
    mkdir -p "$WORKSPACE"

    # Scaffold Expo project
    cd "$WORKSPACE"
    npx create-expo-app@latest "$APP_NAME" --template blank-typescript 2>&1

    cd "$PROJECT_DIR"

    # Install expo-router and dependencies
    npx expo install expo-router expo-linking expo-constants expo-status-bar react-native-safe-area-context react-native-screens 2>&1

    # Create directory structure
    mkdir -p src/types src/store src/contexts src/components app

    # Write types file if provided
    TYPES_CONTENT='{{ data_types_file | default("// Types will be added by the planner") }}'
    if [ -n "$TYPES_CONTENT" ]; then
      echo "$TYPES_CONTENT" > src/types/index.ts
    fi

    # Update package.json main field for expo-router
    node -e "
    const pkg = require('./package.json');
    pkg.main = 'expo-router/entry';
    require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2));
    "

    # Verify
    echo "Project structure:"
    find . -type f -not -path '*/node_modules/*' -not -path './.git/*' | sort

    echo '{"workspace_path": "'"$PROJECT_DIR"'", "scaffold_result": "success"}'
  timeout_seconds: 300
