agent:
  name: sdlc_cleanup
  type: script
  script_template: |
    #!/bin/bash
    WORKSPACE={{ workspace_path }}

    if [ -n "$WORKSPACE" ] && [ -d "$WORKSPACE" ]; then
      rm -rf "$WORKSPACE"
      echo '{"cleanup": "done", "path": "'"$WORKSPACE"'"}'
    else
      echo '{"cleanup": "skipped", "reason": "no workspace"}'
    fi
  timeout_seconds: 30
