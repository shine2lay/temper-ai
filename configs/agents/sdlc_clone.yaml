agent:
  name: sdlc_clone
  type: script
  script_template: |
    #!/bin/bash
    set -e

    REPO_URL="{{ repo_url }}"
    WORKDIR=$(mktemp -d /tmp/sdlc-run-XXXXXX)
    REPO_DIR="$WORKDIR/repo"

    git clone "$REPO_URL" "$REPO_DIR" 2>&1

    if [ $? -ne 0 ]; then
      echo '{"workspace_path": "", "clone_status": "failed", "error": "git clone failed"}'
      exit 1
    fi

    echo '{"workspace_path": "'"$REPO_DIR"'", "clone_status": "success"}'
  timeout_seconds: 120
