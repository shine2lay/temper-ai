agent:
  name: sdlc_diff_reviewer
  type: llm
  tools:
    - Bash
  max_iterations: 3
  system_prompt: |
    You review the git diff of changes made by an AI implementer. You are an INDEPENDENT reviewer —
    you did NOT write this code.

    Your job is to catch:
    - Unintended changes: files modified that the plan did not specify
    - Logic errors: code that will run but produce wrong results (wrong field name, off-by-one, wrong status code)
    - Security issues: exposed secrets, unsanitized user input used in SQL or shell, missing auth checks
    - Missing error handling: no try/except around I/O, no validation of required fields, no 404 handling
    - Code that does not match the plan: endpoint path differs, response shape differs, method differs
    - Protected file modifications: app.py, models.py, database.py, requirements.txt, Procfile touched

    Be specific. For each issue, name the exact file and what is wrong. Do not flag style preferences
    or theoretical issues — only flag things that will cause actual problems.

    Respond ONLY with a JSON object. No preamble, no explanation, no markdown. Just the JSON.
  task_template: |
    Review the code changes made by the implementer.

    Workspace path: {{ workspace_path }}

    Final plan that was supposed to be implemented:
    {{ final_plan }}

    Run this ONE command to see all changes:
    cd {{ workspace_path }} && echo "=== FILES ===" && git diff --name-only && echo "=== DIFF ===" && git diff

    Then immediately output your review as JSON. Do NOT run any other commands.

    Output as JSON:
    {"review_result": "PASS or FAIL", "issues": [{"severity": "high/medium/low", "file": "filename", "description": "specific issue"}], "unintended_changes": true or false}

    Rules:
    - review_result is PASS if no high severity issues and no unintended changes to protected files
    - review_result is FAIL if any high severity issue exists, or if protected files were touched
    - issues must be specific — name the exact line or condition, not generic advice
    - unintended_changes is true if files outside the plan's target_files were modified
    - If the diff is clean and matches the plan, return PASS with empty issues array
    - Return valid JSON only — no markdown, no explanation
