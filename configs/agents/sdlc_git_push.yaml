agent:
  name: sdlc_git_push
  type: script
  script_template: |
    WORKSPACE={{ workspace_path }}
    HINT="{{ commit_message }}"

    # Validate workspace exists
    if [ -z "$WORKSPACE" ] || [ ! -d "$WORKSPACE" ]; then
      echo "ERROR: workspace_path is empty or does not exist: '$WORKSPACE'"
      echo '{"commit_hash": "none", "push_status": "failed"}'
      exit 1
    fi

    # Validate it's a git repo
    if [ ! -d "$WORKSPACE/.git" ]; then
      echo "ERROR: workspace is not a git repo: $WORKSPACE"
      echo '{"commit_hash": "none", "push_status": "failed"}'
      exit 1
    fi

    # Stage all changes
    echo "Staging changes..."
    git -C "$WORKSPACE" add -A

    # Check for changes
    CHANGES=$(git -C "$WORKSPACE" diff --cached --stat)
    if [ -z "$CHANGES" ]; then
      echo "No changes to commit"
      echo '{"commit_hash": "none", "push_status": "skipped"}'
      exit 0
    fi

    echo "Changes to commit:"
    echo "$CHANGES"

    # Build commit message: use hint from plan if available, otherwise
    # auto-generate from the changed files
    if [ -n "$HINT" ] && echo "$HINT" | grep -qE "^(feat|fix|refactor|chore|docs):"; then
      COMMIT_MSG="$HINT"
    else
      # Auto-generate from changed file names
      FILES=$(git -C "$WORKSPACE" diff --cached --name-only | head -5 | tr '\n' ', ' | sed 's/,$//')
      COMMIT_MSG="feat: update $FILES via agentic-sdlc pipeline"
    fi

    # Commit
    echo "Committing: $COMMIT_MSG"
    if ! git -C "$WORKSPACE" commit -m "$COMMIT_MSG" 2>/tmp/sdlc_commit_err; then
      ERR=$(cat /tmp/sdlc_commit_err 2>/dev/null)
      echo "ERROR: git commit failed: $ERR"
      echo '{"commit_hash": "none", "push_status": "failed"}'
      exit 1
    fi

    HASH=$(git -C "$WORKSPACE" rev-parse --short HEAD)
    echo "Committed: $HASH"

    # Push to GitHub
    echo "Pushing to origin (GitHub)..."
    if ! git -C "$WORKSPACE" push origin main 2>/tmp/sdlc_push_err; then
      ERR=$(cat /tmp/sdlc_push_err 2>/dev/null)
      echo "ERROR: git push to origin failed: $ERR"
      echo '{"commit_hash": "'"$HASH"'", "push_status": "failed"}'
      exit 1
    fi
    echo "GitHub push OK"

    # Push to Heroku to trigger deploy
    heroku_url="{{ heroku_git_url }}"
    if [ -n "$heroku_url" ]; then
      echo "Pushing to Heroku..."
      git -C "$WORKSPACE" remote add heroku "$heroku_url" 2>/dev/null
      git -C "$WORKSPACE" remote set-url heroku "$heroku_url" 2>/dev/null
      if ! git -C "$WORKSPACE" push heroku main 2>/tmp/sdlc_heroku_push_err; then
        ERR=$(cat /tmp/sdlc_heroku_push_err 2>/dev/null)
        echo "WARNING: Heroku push failed: $ERR"
        echo "  (GitHub push succeeded — deploy may happen via auto-deploy)"
      else
        echo "Heroku push OK"
      fi
    fi

    echo '{"commit_hash": "'"$HASH"'", "push_status": "success"}'
  timeout_seconds: 120
