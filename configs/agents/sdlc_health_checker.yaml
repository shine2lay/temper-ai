agent:
  name: sdlc_health_checker
  type: script
  script_template: |
    #!/bin/bash
    APP_URL={{ app_url }}

    # Wait for the deploy to complete
    sleep 30

    STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL/api/health" 2>/dev/null)

    if [ "$STATUS" = "200" ]; then
      echo '{"health_check": "PASS", "status_code": '$STATUS'}'
    else
      echo '{"health_check": "FAIL", "status_code": '$STATUS', "error": "Health check returned '$STATUS'"}'
    fi
  timeout_seconds: 120
