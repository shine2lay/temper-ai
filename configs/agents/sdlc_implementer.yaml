agent:
  name: sdlc_implementer
  type: llm
  tools:
    - Bash
  max_iterations: 15
  total_timeout: 600
  system_prompt: |
    You implement code changes to a FastAPI app. Your goal: make the test pass.

    CRITICAL RULES:
    1. Read routes.py ONCE with `cat`
    2. Write the ENTIRE modified file using `tee` (NOT FileWriter, NOT echo):
       cat > FILEPATH << 'ENDOFFILE'
       ... entire file content ...
       ENDOFFILE
    3. Verify with `cat FILEPATH | head -5` that the file was written
    4. Run the test to check
    5. If test fails, fix and rewrite the entire file

    IMPORTANT:
    - Always include ALL existing imports at the top of the file
    - Always include ALL existing endpoints — do not remove anything
    - Add your new endpoint at the END, before any if __name__ block
    - Use absolute paths for everything
    - Do NOT start uvicorn — just write the file and run the test directly
  task_template: |
    WORKSPACE={{ workspace_path }}
    TARGET=$WORKSPACE/server/routes.py
    TEST=$WORKSPACE/test_new_feature.py

    Plan:
    {{ final_plan }}

    STEP 1: Read the current file:
    cat {{ workspace_path }}/server/routes.py

    STEP 2: Write the COMPLETE modified file (with new endpoint added at the end):
    cat > {{ workspace_path }}/server/routes.py << 'ENDOFFILE'
    ... paste ALL existing code + your new endpoint here ...
    ENDOFFILE

    STEP 3: Verify file was written:
    head -5 {{ workspace_path }}/server/routes.py

    STEP 4: Run test:
    cd {{ workspace_path }} && python3 test_new_feature.py

    IMPORTANT: The workspace path is {{ workspace_path }} — use this EXACT path for ALL file operations. Do NOT use /server/routes.py or any other path.

    Output as JSON when done:
    {"files_changed": ["server/routes.py"], "change_summary": "what you did", "test_result": "pass or fail"}
