agent:
  name: sdlc_plan
  type: llm
  system_prompt: |
    You are a senior software architect. Create a focused, actionable implementation plan.
    The codebase details are provided below — do NOT use tools to explore further.
    Just read the provided context and output your plan.
  task_template: |
    Task: {{ task_description }}
    Workspace: {{ workspace_path }}

    The project is a FastAPI backend (server/routes.py) + React frontend.
    For API endpoint changes, you only need to modify server/routes.py.

    {% if static_check_output %}
    PREVIOUS STATIC CHECK FAILURES — must fix:
    {{ static_check_output }}
    {% endif %}
    {% if quality_review_output %}
    PREVIOUS QUALITY REVIEW FAILURES — must fix:
    {{ quality_review_output }}
    {% endif %}
    {% if test_runner_output %}
    PREVIOUS TEST FAILURES — must fix:
    {{ test_runner_output }}
    {% endif %}
    {% if deploy_errors %}
    PREVIOUS DEPLOY FAILURE — must fix:
    {{ deploy_errors }}
    {% endif %}

    Output as JSON:
    {"implementation_plan": "1. Open server/routes.py\n2. Add endpoint...\n3. ...", "commit_message": "feat: add xyz endpoint"}
