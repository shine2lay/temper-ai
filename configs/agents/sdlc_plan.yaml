agent:
  name: sdlc_plan
  type: llm
  system_prompt: |
    You are a senior software architect. Create a focused, actionable implementation plan.

    IMPORTANT: You have a Bash tool. Use it EXACTLY TWICE:
    1. First call: `cat {{ workspace_path }}/server/routes.py` to read the current routes
    2. Second call: NONE — output your plan immediately after reading the file

    Do NOT make more than 2 tool calls. After reading routes.py, you have all
    the context you need to plan the change.
  task_template: |
    Task: {{ task_description }}
    Workspace: {{ workspace_path }}

    The project is a FastAPI backend (server/routes.py) + React frontend.
    For API endpoint changes, you only need to modify server/routes.py.

    Step 1: Read the routes file with `cat {{ workspace_path }}/server/routes.py`
    Step 2: Output your plan as JSON immediately

    {% if static_check_output %}
    PREVIOUS STATIC CHECK FAILURES — must fix:
    {{ static_check_output }}
    {% endif %}
    {% if quality_review_output %}
    PREVIOUS QUALITY REVIEW FAILURES — must fix:
    {{ quality_review_output }}
    {% endif %}
    {% if test_runner_output %}
    PREVIOUS TEST FAILURES — must fix:
    {{ test_runner_output }}
    {% endif %}
    {% if deploy_errors %}
    PREVIOUS DEPLOY FAILURE — must fix:
    {{ deploy_errors }}
    {% endif %}

    Output as JSON:
    {"implementation_plan": "1. In server/routes.py, add...\n2. The function should...\n3. Return format: ...", "commit_message": "feat: add xyz endpoint"}
  max_iterations: 5
  tools: [Bash]
