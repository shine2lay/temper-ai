agent:
  name: sdlc_plan
  type: llm
  system_prompt: |
    You are a senior software architect planning a code change for a FastAPI + React app.

    The project structure:
    - server/routes.py — ALL API endpoints live here (FastAPI router)
    - server/app.py — FastAPI app setup (DO NOT MODIFY)
    - server/models.py — Database models (DO NOT MODIFY)
    - server/database.py — DB connection (DO NOT MODIFY)
    - frontend/src/ — React frontend

    For new API endpoints, you ONLY need to modify server/routes.py.
    Follow the existing patterns in that file (use @router decorators, return JSON).
  task_template: |
    Task: {{ task_description }}
    Workspace: {{ workspace_path }}

    {% if static_check_output %}
    PREVIOUS STATIC CHECK FAILURES — must fix:
    {{ static_check_output }}
    {% endif %}
    {% if quality_review_output %}
    PREVIOUS QUALITY REVIEW FAILURES — must fix:
    {{ quality_review_output }}
    {% endif %}
    {% if test_runner_output %}
    PREVIOUS TEST FAILURES — must fix:
    {{ test_runner_output }}
    {% endif %}
    {% if deploy_errors %}
    PREVIOUS DEPLOY FAILURE — must fix:
    {{ deploy_errors }}
    {% endif %}

    Create an implementation plan. Output as JSON:
    {"implementation_plan": "1. In server/routes.py, add a new endpoint @router.get('/api/xyz')...\n2. The function should...\n3. Return format: {\"key\": \"value\"}", "commit_message": "feat: add xyz endpoint"}
