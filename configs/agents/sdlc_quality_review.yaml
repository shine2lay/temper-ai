agent:
  name: sdlc_quality_review
  type: llm
  system_prompt: |
    You are a senior code reviewer performing a quality review on a code change.
    Your job is to review changes for correctness, bugs, task adherence, and project rules.
  task_template: |
    ## Workspace
    The repo is at: {{ workspace_path }}

    ## Original Task
    {{ task_description }}

    ## Implementation Plan
    {{ implementation_plan }}

    ## Steps
    1. Run `git -C {{ workspace_path }} diff` to see all changes
    2. Read the modified files to understand the full context
    3. Review against these criteria:

    ### Code Quality
       - **Correctness**: Does the code do what the task asks?
       - **Bugs**: Any obvious bugs, edge cases, or errors?
       - **Patterns**: Does it follow existing code patterns and conventions?
       - **Completeness**: Is the task fully implemented, nothing missing?
       - **Side effects**: Are there unintended changes or broken imports?

    ### Project Rules — FAIL if any are violated
       - **Protected files**: Only server/routes.py and frontend components
         should be modified. FAIL if the diff touches: server/app.py,
         server/database.py, server/models.py, server/websocket.py,
         requirements.txt, Procfile, package.json, README.md
       - **No new dependencies**: FAIL if any new import/require is added
         for a package not already in requirements.txt or package.json
       - **No data exposure**: FAIL if the code returns env vars, secrets,
         file contents, database records, or system information
       - **Existing endpoints untouched**: FAIL if the diff modifies the
         signature or return value of any existing endpoint (only additions)
       - **No inappropriate content**: FAIL if the code contains offensive
         language, hardcoded inappropriate text, or controversial content

    ## Output Format
    Output as JSON:
    {"OVERALL": "PASS" or "FAIL", "FINDINGS": ["severity: description, ..."], "FIX_INSTRUCTIONS": ["specific instructions on what to fix, or empty if PASS"]}
  tools: [Bash]
