agent:
  name: sdlc_static_checks
  type: script
  script_template: |
    WORKSPACE={{ workspace_path }}
    FAILURES=""
    PASS_COUNT=0
    FAIL_COUNT=0

    echo "=== Static Checks ==="
    echo ""

    # 1. Python syntax check on all .py files
    echo "--- Python Syntax Check ---"
    for f in $(find "$WORKSPACE/server" -name "*.py" 2>/dev/null); do
      REL=$(echo "$f" | sed "s|$WORKSPACE/||")
      if python3 -m py_compile "$f" 2>/tmp/sdlc_syntax_err; then
        echo "  PASS: $REL"
        PASS_COUNT=$((PASS_COUNT + 1))
      else
        ERR=$(cat /tmp/sdlc_syntax_err)
        echo "  FAIL: $REL"
        echo "    $ERR"
        FAILURES="$FAILURES\nSyntax error in $REL: $ERR"
        FAIL_COUNT=$((FAIL_COUNT + 1))
      fi
    done
    echo ""

    # 2. Import check — verify the main app module can be imported
    echo "--- Import Check ---"
    cd "$WORKSPACE"
    if python3 -c "import server.app" 2>/tmp/sdlc_import_err; then
      echo "  PASS: server.app imports successfully"
      PASS_COUNT=$((PASS_COUNT + 1))
    else
      ERR=$(cat /tmp/sdlc_import_err)
      echo "  FAIL: server.app import failed"
      echo "    $ERR"
      FAILURES="$FAILURES\nImport error: $ERR"
      FAIL_COUNT=$((FAIL_COUNT + 1))
    fi
    echo ""

    # 3. Frontend build check — only if frontend files were modified
    echo "--- Frontend Build Check ---"
    FRONTEND_CHANGED=$(git -C "$WORKSPACE" diff --name-only HEAD 2>/dev/null | grep -c "^frontend/" || true)
    if [ "$FRONTEND_CHANGED" -gt 0 ]; then
      echo "  Frontend files modified ($FRONTEND_CHANGED files) — running TypeScript check"
      if ! command -v npx > /dev/null 2>&1; then
        echo "  SKIP: npx not available (Node.js not installed)"
        PASS_COUNT=$((PASS_COUNT + 1))
      else
        cd "$WORKSPACE/frontend"
        if [ ! -d "node_modules" ]; then
          echo "  Installing node_modules..."
          npm install --include=dev --silent 2>/dev/null
        fi
        # tsc writes errors to STDOUT, not stderr — capture both
        if npx tsc --noEmit > /tmp/sdlc_tsc_out 2>&1; then
          echo "  PASS: TypeScript compiles"
          PASS_COUNT=$((PASS_COUNT + 1))
        else
          ERR=$(cat /tmp/sdlc_tsc_out 2>/dev/null | head -30 | tr '\n' ' | ' | sed 's/  */ /g' | head -c 1000)
          echo "  FAIL: TypeScript errors"
          echo "    $ERR"
          FAILURES="$FAILURES\nTypeScript error: $ERR"
          FAIL_COUNT=$((FAIL_COUNT + 1))
        fi
        cd "$WORKSPACE"
      fi
    else
      echo "  SKIP: No frontend files modified"
      PASS_COUNT=$((PASS_COUNT + 1))
    fi
    echo ""

    # 4. Summary
    echo "=== Results ==="
    echo "Passed: $PASS_COUNT"
    echo "Failed: $FAIL_COUNT"
    echo ""

    if [ $FAIL_COUNT -gt 0 ]; then
      FLAT_FAILURES=$(echo -e "$FAILURES" | tr '\n' ' | ' | sed 's/  */ /g' | head -c 2000)
      echo '{"check_result": "FAIL", "check_details": "OVERALL: FAIL. Passed: '$PASS_COUNT', Failed: '$FAIL_COUNT'. Failures: '"$FLAT_FAILURES"'"}'
    else
      echo '{"check_result": "PASS", "check_details": "OVERALL: PASS. All '$PASS_COUNT' checks passed."}'
    fi
  timeout_seconds: 60
