agent:
  name: sdlc_test_runner
  type: script
  script_template: |
    WORKSPACE={{ workspace_path }}
    cd "$WORKSPACE"
    FAIL_COUNT=0
    DETAILS=""

    echo "=== Test Runner ==="
    echo ""

    # 1. Python tests or smoke test
    TEST_FILES=$(find "$WORKSPACE" -name "test_*.py" -o -name "*_test.py" 2>/dev/null | head -20)

    if [ -n "$TEST_FILES" ]; then
      echo "--- Running pytest ---"
      echo "Found test files:"
      echo "$TEST_FILES"
      echo ""

      if python3 -m pytest --tb=short -q 2>&1 | tee /tmp/sdlc_test_output; then
        echo "  PASS: pytest"
        DETAILS="$DETAILS pytest: PASS."
      else
        TEST_OUT=$(cat /tmp/sdlc_test_output 2>/dev/null | tail -5 | tr '\n' ' ' | sed 's/  */ /g')
        echo "  FAIL: pytest"
        DETAILS="$DETAILS pytest: FAIL ($TEST_OUT)."
        FAIL_COUNT=$((FAIL_COUNT + 1))
      fi
    else
      echo "--- Smoke test (no test files) ---"

      if python3 -c "
    from server.app import app
    routes = [r.path for r in app.routes]
    print('Registered routes:', routes)
    assert '/api/health' in routes or '/health' in routes, 'Health endpoint missing'
    print('Smoke test passed')
    " 2>/tmp/sdlc_smoke_err; then
        echo "  PASS: smoke test"
        DETAILS="$DETAILS smoke test: PASS."
      else
        ERR=$(cat /tmp/sdlc_smoke_err | tr '\n' ' ' | sed 's/  */ /g')
        echo "  FAIL: smoke test ($ERR)"
        DETAILS="$DETAILS smoke test: FAIL ($ERR)."
        FAIL_COUNT=$((FAIL_COUNT + 1))
      fi
    fi
    echo ""

    # 2. Frontend build check — only if frontend files were modified
    echo "--- Frontend Build Check ---"
    FRONTEND_CHANGED=$(git -C "$WORKSPACE" diff --name-only HEAD 2>/dev/null | grep -c "^frontend/" || true)
    if [ "$FRONTEND_CHANGED" -gt 0 ]; then
      if ! command -v npm > /dev/null 2>&1; then
        echo "  SKIP: npm not available (Node.js not installed)"
      else
        echo "  Frontend files modified — verifying production build"
        cd "$WORKSPACE/frontend"
        if [ ! -d "node_modules" ]; then
          npm install --include=dev --silent 2>/dev/null
        fi
        if npm run build > /tmp/sdlc_build_out 2>&1; then
          echo "  PASS: frontend builds"
          DETAILS="$DETAILS frontend build: PASS."
        else
          ERR=$(cat /tmp/sdlc_build_out 2>/dev/null | tail -20 | tr '\n' ' | ' | sed 's/  */ /g' | head -c 1000)
          echo "  FAIL: frontend build ($ERR)"
          DETAILS="$DETAILS frontend build: FAIL ($ERR)."
          FAIL_COUNT=$((FAIL_COUNT + 1))
        fi
        cd "$WORKSPACE"
      fi
    else
      echo "  SKIP: No frontend files modified"
    fi
    echo ""

    # Summary
    echo "=== Results ==="
    if [ $FAIL_COUNT -gt 0 ]; then
      echo '{"test_result": "FAIL", "test_details": "OVERALL: FAIL.'"$DETAILS"'"}'
    else
      echo '{"test_result": "PASS", "test_details": "OVERALL: PASS.'"$DETAILS"'"}'
    fi
  timeout_seconds: 120
