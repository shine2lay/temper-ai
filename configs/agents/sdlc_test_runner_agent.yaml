agent:
  name: sdlc_test_runner_agent
  type: script
  script_template: |
    WORKSPACE={{ workspace_path }}
    TEST_FILE={{ test_file }}
    PASS_COUNT=0
    FAIL_COUNT=0
    DETAILS=""

    cd "$WORKSPACE"

    # 1. Import smoke test — can the app module load?
    if timeout 15 python3 -c "from server.app import app; print('OK')" 2>/tmp/sdlc_smoke; then
      PASS_COUNT=$((PASS_COUNT + 1))
      DETAILS="$DETAILS import:PASS"
    else
      FAIL_COUNT=$((FAIL_COUNT + 1))
      DETAILS="$DETAILS import:FAIL($(cat /tmp/sdlc_smoke | tail -2 | tr '\n' ' '))"
    fi

    # 2. Run existing pytest suite (if available)
    if command -v pytest > /dev/null 2>&1 && [ -d "tests" ]; then
      if timeout 60 pytest --tb=short -q 2>/tmp/sdlc_pytest; then
        PASS_COUNT=$((PASS_COUNT + 1))
        DETAILS="$DETAILS pytest:PASS"
      else
        FAIL_COUNT=$((FAIL_COUNT + 1))
        DETAILS="$DETAILS pytest:FAIL($(cat /tmp/sdlc_pytest | tail -5 | tr '\n' ' '))"
      fi
    else
      DETAILS="$DETAILS pytest:SKIP(not available)"
    fi

    # 3. Syntax check on the new/modified file
    if python3 -m py_compile "$WORKSPACE/server/routes.py" 2>/tmp/sdlc_syntax; then
      PASS_COUNT=$((PASS_COUNT + 1))
      DETAILS="$DETAILS syntax:PASS"
    else
      FAIL_COUNT=$((FAIL_COUNT + 1))
      DETAILS="$DETAILS syntax:FAIL($(cat /tmp/sdlc_syntax | tr '\n' ' '))"
    fi

    if [ $FAIL_COUNT -gt 0 ]; then
      echo '{"test_result": "FAIL", "passed": '$PASS_COUNT', "failed": '$FAIL_COUNT', "details": "'"$(echo $DETAILS | head -c 500)"'"}'
    else
      echo '{"test_result": "PASS", "passed": '$PASS_COUNT', "failed": 0, "details": "'"$DETAILS"'"}'
    fi
  timeout_seconds: 90
