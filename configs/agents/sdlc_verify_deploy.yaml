agent:
  name: sdlc_verify_deploy
  type: script
  script_template: |
    target="{{ app_url }}"
    api_key="{{ heroku_api_key }}"
    app_name="{{ heroku_app_name }}"
    commit="{{ commit_hash }}"
    workspace="{{ workspace_path }}"
    api="https://api.heroku.com"

    check_health() {
      curl -s --max-time 10 "$target/api/health" 2>/dev/null | grep -q '"status"'
    }

    do_rollback() {
      if [ -n "$workspace" ] && [ -d "$workspace/.git" ]; then
        git -C "$workspace" revert --no-edit HEAD 2>/dev/null && git -C "$workspace" push origin main 2>/dev/null
        echo "Rollback pushed"
        return 0
      fi
      echo "WARNING: No workspace for rollback"
      return 1
    }

    heroku_get() {
      curl -s -H "Authorization: Bearer $api_key" -H "Accept: application/vnd.heroku+json; version=3" "$1" 2>/dev/null
    }

    # Fallback: no API key
    if [ -z "$api_key" ] || [ -z "$app_name" ]; then
      if [ -n "$target" ]; then
        sleep 30
        if check_health; then
          echo '{"verify_result": "PASS", "verify_details": "Health OK (no API key for full check)", "deploy_errors": ""}'
        else
          echo '{"verify_result": "FAIL", "verify_details": "Health check failed", "deploy_errors": "Health endpoint did not respond after deploy"}'
        fi
      else
        echo '{"verify_result": "SKIP", "verify_details": "No app URL or API key", "deploy_errors": ""}'
      fi
      exit 0
    fi

    echo "=== Deploy Verification ==="
    echo "App: $app_name | Commit: $commit"

    # Step 1: Poll for build or release matching our commit
    # Check BUILDS first (catches failures before they become releases)
    # Then check RELEASES (git-push deploys show here when successful)
    echo "Waiting for Heroku build/release..."
    found_id=""
    found_status=""
    found_source="none"
    attempt=1
    while [ $attempt -le 20 ]; do
      sleep 15
      echo "$commit" > /tmp/sdlc_commit.txt

      # Check builds API first
      heroku_get "$api/apps/$app_name/builds" > /tmp/sdlc_builds.json
      match=$(python3 /tmp/sdlc_parse_builds.py 2>/dev/null)
      if [ -n "$match" ]; then
        found_id=$(echo "$match" | cut -d'|' -f1)
        found_status=$(echo "$match" | cut -d'|' -f2)
        found_source="build"
        echo "  [$attempt] Build found: $found_status"
        if [ "$found_status" = "succeeded" ] || [ "$found_status" = "failed" ]; then
          break
        fi
      fi

      # Check releases API (git-push successful deploys show here)
      if [ -z "$found_id" ]; then
        heroku_get "$api/apps/$app_name/releases" > /tmp/sdlc_builds.json
        match=$(python3 /tmp/sdlc_parse_builds.py 2>/dev/null)
        if [ -n "$match" ]; then
          found_id=$(echo "$match" | cut -d'|' -f1)
          found_status=$(echo "$match" | cut -d'|' -f2)
          found_source="release"
          echo "  [$attempt] Release found: $found_status"
          if [ "$found_status" = "succeeded" ] || [ "$found_status" = "failed" ]; then
            break
          fi
        fi
      fi

      if [ -z "$found_id" ]; then
        echo "  [$attempt] Not found yet..."
      fi
      attempt=$((attempt + 1))
    done

    # Not found after 5 minutes
    if [ -z "$found_id" ]; then
      echo "No build or release found for commit $commit"
      echo '{"verify_result": "FAIL", "verify_details": "No Heroku build or release found for commit '"$commit"'", "deploy_errors": "Heroku did not process commit '"$commit"'. The push may not have reached Heroku."}'
      exit 0
    fi

    # Step 2: Build/release FAILED — fetch full log and save to workspace
    if [ "$found_status" = "failed" ]; then
      echo "=== BUILD FAILED ==="
      build_log=""

      if [ "$found_source" = "build" ]; then
        # Get the output_stream_url from the build object
        heroku_get "$api/apps/$app_name/builds/$found_id" > /tmp/sdlc_build_result.json
        log_url=$(python3 -c "import json; print(json.load(open('/tmp/sdlc_build_result.json')).get('output_stream_url',''))" 2>/dev/null)
        if [ -n "$log_url" ]; then
          build_log=$(curl -s "$log_url" 2>/dev/null)
        fi
        # Fallback: try build result lines
        if [ -z "$build_log" ]; then
          heroku_get "$api/apps/$app_name/builds/$found_id/result" > /tmp/sdlc_build_result.json
          build_log=$(python3 /tmp/sdlc_parse_build_log.py 2>/dev/null)
        fi
      fi

      # Save full log to workspace so the plan agent can read it with cat
      log_file=""
      if [ -n "$build_log" ] && [ -n "$workspace" ] && [ -d "$workspace" ]; then
        log_file="$workspace/heroku_build_error.log"
        echo "$build_log" > "$log_file"
        echo "Full build log saved to $log_file"
      fi

      # For the structured output, include a pointer to the file
      # plus a brief snippet with actual error lines (not boilerplate)
      error_lines=$(echo "$build_log" | grep -iE "error|fail|cannot|unable|not found|missing" | grep -v "sorry\|troubleshoot\|submit a ticket\|Love," | head -10 | tr '\n' ' | ' | head -c 800)
      if [ -z "$error_lines" ]; then
        error_lines="Build failed but could not extract specific errors. "
      fi

      echo "Error lines: $error_lines"

      if [ -n "$log_file" ]; then
        echo '{"verify_result": "FAIL", "verify_details": "Heroku build failed for commit '"$commit"'", "deploy_errors": "Heroku build failed. Errors: '"$error_lines"' Full log at: heroku_build_error.log (read with cat '"$log_file"')"}'
      else
        echo '{"verify_result": "FAIL", "verify_details": "Heroku build failed for commit '"$commit"'", "deploy_errors": "Heroku build failed. Errors: '"$error_lines"'"}'
      fi
      exit 0
    fi

    # Step 3: Build/release succeeded — verify health
    echo "Deploy succeeded — checking health..."
    sleep 10
    healthy=false
    attempt=1
    while [ $attempt -le 6 ]; do
      if check_health; then
        echo "  Health OK"
        healthy=true
        break
      fi
      echo "  [$attempt/6] Waiting..."
      attempt=$((attempt + 1))
      sleep 10
    done

    if [ "$healthy" = "false" ]; then
      echo "=== APP UNHEALTHY — rolling back ==="
      do_rollback
      echo '{"verify_result": "FAIL", "verify_details": "Build OK but app crashed — rolled back", "deploy_errors": "App crashed after deploy. Health endpoint not responding. Commit reverted. Fix the runtime error."}'
      exit 0
    fi

    echo "=== DEPLOY VERIFIED ==="
    echo '{"verify_result": "PASS", "verify_details": "Build succeeded and app is healthy", "deploy_errors": ""}'
  timeout_seconds: 600
