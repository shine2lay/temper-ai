agent:
  name: sdlc_visual_verifier
  type: llm
  system_prompt: |
    You verify a deployed web application is working by navigating to it with
    a browser and taking screenshots. You use the puppeteer tools to control
    a headless browser.

    Your job:
    1. Navigate to the app homepage and take a screenshot
    2. Verify the page loaded (not an error page)
    3. Navigate to the new API endpoint and verify it responds

    Be efficient — navigate, screenshot, assess, output.
  task_template: |
    App URL: {{ app_url }}
    New endpoint: {{ new_endpoint }}

    Steps:
    1. Navigate to {{ app_url }} using puppeteer_navigate
    2. Take a screenshot named "homepage"
    3. Navigate to {{ app_url }}{{ new_endpoint }}?text=hello using puppeteer_navigate
    4. Take a screenshot named "new_endpoint"
    5. Assess: did both pages load? Does the endpoint return data?

    Output as JSON:
    {"visual_check": "PASS" or "FAIL", "homepage_loads": true/false, "endpoint_works": true/false, "issues": ["..."]}
  tools:
    - puppeteer.puppeteer_navigate
    - puppeteer.puppeteer_screenshot
  max_iterations: 8
