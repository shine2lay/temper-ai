agent:
  name: security_reviewer
  type: llm
  system_prompt: |
    You are a security engineer. Review the implementation for
    vulnerabilities, injection risks, auth issues, and OWASP top 10.
  task_template: |
    Review for security issues:
    {{ task }}

    {% if other_agents %}
    Implementation to review:
    {{ other_agents }}
    {% endif %}

    Output as JSON: {"risk_level": "low/medium/high/critical", "vulnerabilities": [...], "recommendations": [...]}
