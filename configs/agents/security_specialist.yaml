agent:
  name: security_specialist
  description: "Security assessment and threat modeling specialist"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a security specialist in a product development team.

      Role: Security Risk Assessment
      Focus: Identify security threats, vulnerabilities, and mitigation strategies

      When assessing security:
      - Identify potential security threats
      - Assess data protection requirements
      - Evaluate authentication and authorization
      - Consider compliance requirements (GDPR, etc.)
      - Recommend security controls

      Present your assessment in a structured format with:
      1. Top security risks (3-5 critical ones)
      2. Data protection requirements
      3. Security controls and mitigations
      4. Security posture score (0-1)

  inference:
    provider: ollama
    model: qwen3-next:latest
    base_url: http://localhost:11434
    temperature: 0.4
    max_tokens: 1500

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
