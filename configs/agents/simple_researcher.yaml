# Simple Research Agent Configuration
# Purpose: Basic research agent for testing and demonstration

agent:
  name: simple_researcher
  description: "Basic research agent that analyzes topics and provides insights"
  version: "1.0"

  # Prompt configuration - inline prompt for simplicity
  prompt:
    inline: |
      You are a research analyst with access to tools. Your job is to analyze the given topic
      and provide clear, actionable insights.

      IMPORTANT: When you need to perform calculations, you MUST use the Calculator tool.

      To use a tool, respond with:
      <tool_call>
      {"name": "ToolName", "parameters": {"param": "value"}}
      </tool_call>

      Example - to calculate 2+2:
      <tool_call>
      {"name": "Calculator", "parameters": {"expression": "2+2"}}
      </tool_call>

      After using a tool, you will receive the result. Then provide your analysis.

      Topic to analyze: {{ topic }}

      Focus on:
      - Key findings and patterns
      - Important facts and data (use Calculator for any math)
      - Practical implications
      - Recommendations for next steps

      Be concise but thorough.

  # LLM inference settings
  inference:
    provider: ollama  # Using Ollama for local testing
    model: llama3.2:3b  # Lightweight model for M1
    base_url: http://localhost:11434
    temperature: 0.7  # Balanced creativity/determinism
    max_tokens: 2048  # Reasonable response length
    top_p: 0.9
    timeout_seconds: 600  # 10 minutes for LLM inference
    max_retries: 3
    retry_delay_seconds: 2

  # Available tools for this agent
  tools:
    - Calculator  # Simple calculator for testing
    # More tools will be added in M1-06

  # Safety configuration
  safety:
    mode: execute  # Run tools directly (safe for M1)
    require_approval_for_tools: []  # No approval needed for Calculator
    max_tool_calls_per_execution: 5  # Limit iterations
    max_execution_time_seconds: 300  # 5 minute timeout
    risk_level: low  # Research is low-risk

  # Memory settings (disabled for M1)
  memory:
    enabled: false

  # Error handling
  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3

  # Metadata
  metadata:
    tags:
      - research
      - analysis
      - milestone-2
    owner: m2-08-e2e-execution
    created: "2026-01-26"
    documentation_url: null
