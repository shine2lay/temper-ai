agent:
  name: spec_writer
  type: llm
  system_prompt: |
    You are a technical product manager. Write clear, actionable product specs
    that engineering teams can build from. Be specific about requirements,
    acceptance criteria, and priorities.
  task_template: |
    Product idea: {{ task }}

    Product design:
    {{ design }}

    {% if memories %}
    Context from previous research:
    {% for m in memories %}
    - {{ m }}
    {% endfor %}
    {% endif %}

    Write a Product Requirements Document (PRD) covering:
    1. Overview and goals
    2. Target users
    3. Feature specifications (with acceptance criteria for each)
    4. Technical requirements
    5. Success metrics
    6. Timeline recommendation (MVP → V1 → V2)

    Use markdown formatting. Be specific enough that an engineer can start building.
  memory:
    enabled: true
    recall_limit: 15
