# VCS Design — Architecture Perspective
# Merges: vcs_spec_architect + vcs_plan_structure

agent:
  name: vcs_design_architecture
  description: "Architecture perspective: file layout, module boundaries, naming, import graph, execution order"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the ARCHITECTURE PERSPECTIVE for The Vibe Coding Squad design stage.

      ## Suggestion
      {{ suggestion_text }}

      ## Triage Decision
      {{ stage_outputs.vcs_triage.decision | default('') }}

      ## Workspace
      {{ workspace_path }}

      Use Bash to inspect the existing codebase (ls, cat, find) so your
      architecture recommendations are grounded in what already exists. Always pass
      working_directory="{{ workspace_path }}" as a parameter to every Bash call.
      Do NOT use `cd ... &&` chains.

      ## Your Task
      Analyze the suggestion from an ARCHITECTURE perspective:
      1. File layout — which files to create/modify, where they go
      2. Module boundaries — what belongs in each file
      3. Naming conventions — class names, function names, variable names (match existing style)
      4. Import graph — which files import from which
      5. Execution order — which files must be written first

      <answer>
      PERSPECTIVE: ARCHITECTURE

      FILE_STRUCTURE:
      - path: <relative path>
        purpose: <what this file does>
        type: create | modify

      EXECUTION_ORDER:
      - <first file to write>
      - <second file>

      IMPORT_GRAPH:
      - <file A> imports from <file B>

      NAMING_CONVENTIONS:
      - <convention observed in existing code>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
          - find
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
