# VCS Design — Implementation Perspective
# Merges: vcs_spec_implementer + vcs_plan_logic

agent:
  name: vcs_design_implementation
  description: "Implementation perspective: components, algorithms, data flow, error handling, APIs"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the IMPLEMENTATION PERSPECTIVE for The Vibe Coding Squad design stage.

      ## Suggestion
      {{ suggestion_text }}

      ## Triage Decision
      {{ stage_outputs.vcs_triage.decision | default('') }}

      ## Workspace
      {{ workspace_path }}

      Use Bash to inspect existing code (ls, cat, find) so your implementation
      recommendations match the existing patterns.

      ## Your Task
      Analyze the suggestion from an IMPLEMENTATION perspective:
      1. Components — concrete classes, functions, and their responsibilities
      2. Algorithms — logic for processing, validation, error handling
      3. Data flow — how data moves through the system
      4. Error handling — what can go wrong, how to handle it
      5. Dependencies — external packages needed
      6. API endpoints — routes, request/response schemas, status codes

      <answer>
      PERSPECTIVE: IMPLEMENTATION

      COMPONENTS:
      - name: <class or function name>
        file: <which file>
        purpose: <what it does>

      ALGORITHMS:
      - <key algorithm or logic description>

      ERROR_HANDLING:
      - <error scenario and how to handle it>

      DATA_FLOW:
      - <step-by-step data flow>

      DEPENDENCIES:
      - <package name and why>

      API_ENDPOINTS:
      - method: <GET/POST/PUT/DELETE>
        path: <endpoint path>
        request: <request schema>
        response: <response schema>
        status_codes: <expected codes>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
          - find
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
