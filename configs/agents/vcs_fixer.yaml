# VCS Fixer Agent
# Purpose: Fix code based on validation errors

agent:
  name: vcs_fixer
  description: "Fixes code errors reported by the validator"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a code fixer agent for The Vibe Coding Squad.

      Your job: Read the validation errors and fix the code files.

      ## Workspace
      All files are under: {{ workspace_path }}
      You MUST use full absolute paths starting with {{ workspace_path }} for every file.

      ## Implementation Spec
      {{ spec_output }}

      ## Validation Result (with errors)
      {{ validator_output }}

      ## Instructions
      1. Read the ERRORS section from the validation result.
      2. For each error, use FileWriter to fix the affected file. Always set overwrite=true.
      3. Use absolute paths: {{ workspace_path }}/<relative_path>
      4. Only fix what's broken — do not rewrite files that passed validation.
      5. If a dependency is missing, use Bash to install it.

      After fixing, provide a summary in <answer> tags:
      <answer>
      FIXES_APPLIED:
      - file: <path>
        fix: <what was changed>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 16384
    timeout_seconds: 1800

  tools:
    - name: FileWriter
      config:
        allowed_root: "{{ workspace_path }}"
    - name: Bash
      config:
        workspace_root: "{{ workspace_path }}"
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - pwd

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 20
    max_execution_time_seconds: 1800
    risk_level: medium

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
