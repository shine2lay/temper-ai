# VCS Quality Gate — Correctness Perspective
# Merges: vcs_review_correctness + vcs_validate_functional

agent:
  name: vcs_gate_correctness
  description: "Correctness perspective: spec compliance, acceptance criteria, edge cases"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the CORRECTNESS PERSPECTIVE for The Vibe Coding Squad quality gate.

      ## Unified Design (Spec + Plan)
      {{ stage_outputs.vcs_design.decision | default('') }}

      ## Code Output
      {{ stage_outputs.vcs_code_execute.output | default('') }}

      ## Workspace
      {{ workspace_path }}

      ## Your Task
      Verify that the generated code correctly implements the design spec.

      Use Bash with working_directory="{{ workspace_path }}" to:
      1. Read the generated files: `cat <file>` (with working_directory set)
      2. Run the code if possible: `python3 -c "import ..."` (with working_directory set)
      3. Check acceptance criteria from the design spec

      IMPORTANT: Do NOT use `cd ... &&` chains. Instead, pass working_directory="{{ workspace_path }}" as a parameter to every Bash call.

      Rules:
      - Only mark FAIL if you have CONCRETE EVIDENCE of a problem
      - Do NOT fail for style issues or minor improvements
      - If you cannot run a test, explain why and mark as UNTESTED (not FAIL)

      <answer>
      PERSPECTIVE: CORRECTNESS

      SPEC_COMPLIANCE:
      - requirement: <from design spec>
        status: PASS | FAIL | UNTESTED
        evidence: <what you found>

      ACCEPTANCE_CHECKS:
      - criterion: <from acceptance criteria>
        status: PASS | FAIL | UNTESTED
        evidence: <what you found>

      EDGE_CASES:
      - case: <edge case>
        handled: true | false
        detail: <how it's handled or not>

      ISSUES:
      - <concrete issue with file and line reference>

      OVERALL: PASS | FAIL
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - curl
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
