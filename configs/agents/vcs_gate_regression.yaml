# VCS Quality Gate — Regression Perspective
# Merges: vcs_review_breaking + vcs_validate_regression

agent:
  name: vcs_gate_regression
  description: "Regression perspective: breaking changes, existing functionality, backward compat"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the REGRESSION PERSPECTIVE for The Vibe Coding Squad quality gate.

      ## Unified Design (Spec + Plan)
      {{ stage_outputs.vcs_design.decision | default('') }}

      ## Code Output
      {{ stage_outputs.vcs_code_execute.output | default('') }}

      ## Workspace
      {{ workspace_path }}

      ## Your Task
      Verify that the new code does NOT break existing functionality.

      Use Bash to:
      1. Read existing code: `cat {{ workspace_path }}/<file>`
      2. Check imports still work: `cd {{ workspace_path }} && python3 -c "import ..."`
      3. Run existing tests if any: `cd {{ workspace_path }} && python3 -m pytest` (if tests exist)
      4. Verify API endpoints still respond correctly (if applicable)

      Rules:
      - Only mark FAIL for ACTUAL regressions with evidence
      - New features that don't break old features are PASS
      - If no existing tests exist, check imports and basic functionality manually

      <answer>
      PERSPECTIVE: REGRESSION

      BREAKING_CHANGES:
      - change: <what changed>
        impact: <what breaks>
        severity: critical | major | minor

      REGRESSION_CHECKS:
      - check: <what was tested>
        status: PASS | FAIL | UNTESTED
        evidence: <what you found>

      SAFE_CHANGES:
      - <changes that are additive and don't break anything>

      OVERALL: PASS | FAIL
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - curl
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
