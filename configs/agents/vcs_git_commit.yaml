# VCS Git Commit Agent
# Commits and pushes changes on the feature branch, then cleans up the worktree
# Uses script type — deterministic execution, zero LLM calls

agent:
  name: vcs_git_commit
  description: "Commit and push changes on the feature branch after quality gate passes"
  version: "3.0"
  type: script

  script: |
    WORKSPACE={{ workspace_path }}
    REPO={{ repo_path }}

    # Verify feature branch
    BRANCH=$(git -C "$WORKSPACE" branch --show-current)
    if ! echo "$BRANCH" | grep -q '^feature/'; then
      echo "ERROR: Not on a feature branch: $BRANCH" >&2
      exit 1
    fi

    # Stage all changes
    git -C "$WORKSPACE" add -A

    # Check for changes
    CHANGES=$(git -C "$WORKSPACE" diff --cached --stat)
    if [ -z "$CHANGES" ]; then
      echo "No changes to commit"
      CLEANED="false"
      git -C "$REPO" worktree remove "$WORKSPACE" --force 2>/dev/null && CLEANED="true"
      echo "::output branch_name=$BRANCH"
      echo "::output commit_hash=none"
      echo "::output commit_message=none"
      echo "::output push_status=skipped"
      echo "::output worktree_cleaned=$CLEANED"
      exit 0
    fi

    # Generate commit message from suggestion
    # Assign to a variable first so shlex.quote expansion is word-safe in pipelines
    SUGGESTION_TEXT={{ suggestion_text }}
    SUMMARY=$(printf '%s' "$SUGGESTION_TEXT" | cut -c1-65)
    git -C "$WORKSPACE" commit -m "feat: $SUMMARY"
    HASH=$(git -C "$WORKSPACE" rev-parse --short HEAD)

    # Push if remote exists
    PUSH_STATUS="skipped_no_remote"
    if git -C "$WORKSPACE" remote | grep -q origin; then
      if git -C "$WORKSPACE" push origin "$BRANCH" 2>/dev/null; then
        PUSH_STATUS="success"
      elif git -C "$WORKSPACE" push --set-upstream origin "$BRANCH" 2>/dev/null; then
        PUSH_STATUS="success"
      else
        PUSH_STATUS="failed"
      fi
    fi

    # Clean up worktree
    CLEANED="false"
    git -C "$REPO" worktree remove "$WORKSPACE" --force 2>/dev/null && CLEANED="true"

    echo "::output branch_name=$BRANCH"
    echo "::output commit_hash=$HASH"
    echo "::output commit_message=feat: $SUMMARY"
    echo "::output push_status=$PUSH_STATUS"
    echo "::output worktree_cleaned=$CLEANED"

  timeout_seconds: 120

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
