# VCS Git Setup Agent
# Pulls latest, creates an isolated worktree, and checks out a feature branch
# Uses script type — deterministic execution, zero LLM calls

agent:
  name: vcs_git_setup
  description: "Pull latest, create isolated worktree, and checkout feature branch for the suggestion"
  version: "3.0"
  type: script

  script: |
    WORKSPACE={{ workspace_path }}

    # Initialize git if needed
    if [ ! -d "$WORKSPACE/.git" ]; then
      git -C "$WORKSPACE" init
      git -C "$WORKSPACE" add -A
      git -C "$WORKSPACE" commit -m "initial: workspace snapshot" --allow-empty
    fi

    # Check remote
    HAS_REMOTE=false
    if git -C "$WORKSPACE" remote | grep -q origin; then
      HAS_REMOTE=true
    fi

    # Pull if remote exists
    DEFAULT_BRANCH="none"
    PULL_STATUS="skipped_no_remote"
    if [ "$HAS_REMOTE" = true ]; then
      DEFAULT_BRANCH=$(git -C "$WORKSPACE" symbolic-ref refs/remotes/origin/HEAD 2>/dev/null | sed 's|refs/remotes/origin/||' || echo "main")
      git -C "$WORKSPACE" checkout "$DEFAULT_BRANCH" 2>/dev/null || true
      if git -C "$WORKSPACE" pull origin "$DEFAULT_BRANCH" 2>/dev/null; then
        PULL_STATUS="success"
      else
        PULL_STATUS="failed"
      fi
    fi

    # Generate feature branch name
    # Assign to a variable first so shlex.quote expansion is word-safe in pipelines
    SUGGESTION_TEXT={{ suggestion_text }}
    SLUG=$(printf '%s' "$SUGGESTION_TEXT" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | cut -c1-40)
    TIMESTAMP=$(date +%Y%m%d-%H%M%S)
    BRANCH_NAME="feature/$SLUG-$TIMESTAMP"

    # Create worktree
    WORKTREE=$(mktemp -d /tmp/vcs-run-XXXXXX)
    git -C "$WORKSPACE" worktree add "$WORKTREE" -b "$BRANCH_NAME" HEAD

    # Verify
    CURRENT_BRANCH=$(git -C "$WORKTREE" branch --show-current)

    echo "::output worktree_path=$WORKTREE"
    echo "::output feature_branch=$BRANCH_NAME"
    echo "::output default_branch=$DEFAULT_BRANCH"
    echo "::output pull_status=$PULL_STATUS"

  timeout_seconds: 120

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
