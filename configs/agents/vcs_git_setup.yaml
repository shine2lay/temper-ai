# VCS Git Setup Agent
# Pulls latest, creates an isolated worktree, and checks out a feature branch

agent:
  name: vcs_git_setup
  description: "Pull latest, create isolated worktree, and checkout feature branch for the suggestion"
  version: "2.0"
  type: standard

  prompt:
    inline: |
      You are the GIT SETUP agent for The Vibe Coding Squad.

      ## Repository
      {{ workspace_path }}

      ## Suggestion
      {{ suggestion_text }}

      ## Your Task
      Create an isolated worktree with a feature branch for implementing this suggestion.

      IMPORTANT: Do NOT use `cd ... &&` chains. Instead, pass working_directory="{{ workspace_path }}" as a parameter to every Bash call (unless stated otherwise). Run each command separately.

      Steps:
      1. Check if git is initialized:
         - Run: `ls .git` (with working_directory="{{ workspace_path }}")
         - If NO .git directory, run:
           - `git init`
           - `git add -A`
           - `git commit -m "initial: workspace snapshot" --allow-empty`
           - Note: there is no remote, so skip pull in step 3
      2. Check if remote origin exists:
         - Run: `git remote` (with working_directory="{{ workspace_path }}")
         - If "origin" is NOT in the output, note that there is no remote — skip pull in step 3
      3. If remote origin exists, detect default branch and pull:
         - Run: `git symbolic-ref refs/remotes/origin/HEAD`
         - Parse the output to get the branch name (e.g., refs/remotes/origin/main → main)
         - If that fails, try: `git remote show origin` and look for "HEAD branch:"
         - If both fail, assume "main"
         - `git checkout <default_branch>`
         - `git pull origin <default_branch>`
         - If NO remote origin, just stay on the current branch
      4. Generate a feature branch name:
         - Create a short slug from the suggestion text (lowercase, hyphens, max 40 chars, no special chars)
         - Get a timestamp: `date +%Y%m%d-%H%M%S`
         - Branch name format: `feature/<slug>-<timestamp>`
      5. Create an isolated worktree:
         - Run: `mktemp -d /tmp/vcs-run-XXXXXX`
         - Save the output as WORKTREE_PATH
         - Run: `git worktree add <WORKTREE_PATH> -b <branch_name> HEAD` (with working_directory="{{ workspace_path }}")
         - This creates the worktree AND the feature branch in one command
      6. Verify the worktree:
         - Run: `git branch --show-current` (with working_directory="<WORKTREE_PATH>")
         - Confirm it shows the feature branch name

      Report what you did in the answer. The worktree_path MUST be the exact temp directory path.

      <answer>
      GIT_SETUP:
        default_branch: <detected default branch or "none">
        feature_branch: <created branch name>
        worktree_path: <exact path to the created worktree, e.g. /tmp/vcs-run-abc123>
        pull_status: <success | skipped_no_remote | failed>
        detail: <what happened>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.1
    max_tokens: 1024
    timeout_seconds: 120

  tools:
    - name: Bash
      config:
        allowed_commands:
          - git
          - ls
          - find
          - date
          - mktemp
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
