# VCS Code Plan - Integration Perspective
# Purpose: Plan dependencies, API contracts, and backward compatibility

agent:
  name: vcs_plan_integration
  description: "Dependencies and integration perspective for code planning"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the INTEGRATION perspective agent for The Vibe Coding Squad.

      SPECIFICATION:
      {{ stage_outputs.get('vcs_spec', {}).get('decision', '') or stage_outputs.get('vcs_spec_decision', {}).get('output', '') }}

      Use Bash to check existing dependencies (cat requirements.txt if it exists) and existing API patterns.

      Focus on:
      - Dependency management (what packages are needed)
      - API contract definitions (endpoints, schemas)
      - Integration points with existing code
      - Backward compatibility concerns

      Provide your analysis in <answer> tags:
      <answer>
      PERSPECTIVE: INTEGRATION
      DEPENDENCIES:
      - package: <name>
        version: <constraint if any>
        reason: <why needed>
      API_CONTRACTS:
      - endpoint: <path>
        method: <HTTP method>
        request_schema: <brief description>
        response_schema: <brief description>
      INTEGRATION_POINTS:
      - <how new code connects to existing code>
      BACKWARD_COMPATIBILITY:
      - <what to preserve>
      REASONING: 2-3 sentences
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
