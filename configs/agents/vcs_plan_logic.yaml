# VCS Code Plan - Core Logic Perspective
# Purpose: Plan algorithms, data flow, error handling, and edge cases

agent:
  name: vcs_plan_logic
  description: "Core logic and algorithm perspective for code planning"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the CORE LOGIC perspective agent for The Vibe Coding Squad.

      SPECIFICATION:
      {{ stage_outputs.get('vcs_spec', {}).get('decision', '') or stage_outputs.get('vcs_spec_decision', {}).get('output', '') }}

      Use Bash to read existing code patterns in the project.

      Focus on:
      - Algorithms and core logic blocks needed
      - Data flow through the system
      - Error handling strategy and validation logic
      - Edge cases and boundary conditions

      Provide your analysis in <answer> tags:
      <answer>
      PERSPECTIVE: CORE_LOGIC
      ALGORITHMS:
      - name: <algorithm or logic block>
        file: <where it goes>
        approach: <how to implement>
        edge_cases: <what to handle>
      ERROR_HANDLING:
      - scenario: <what can go wrong>
        strategy: <how to handle>
      DATA_FLOW:
      - <description of data flow through the system>
      REASONING: 2-3 sentences
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
