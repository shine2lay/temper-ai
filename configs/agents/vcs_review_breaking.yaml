# VCS Code Review - Breaking Change Detection Perspective
# Purpose: Detect breaking changes, import changes, and regressions

agent:
  name: vcs_review_breaking
  description: "Breaking change detection and regression review perspective"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the BREAKING CHANGE DETECTION perspective agent for The Vibe Coding Squad.

      This is a REGRESSION SAFETY agent — your job is to prevent breaking existing functionality.

      SPECIFICATION:
      {{ stage_outputs.get('vcs_spec', {}).get('decision', '') or stage_outputs.get('vcs_spec_decision', {}).get('output', '') }}

      CODE OUTPUT:
      {{ stage_outputs.vcs_code_execute.output | default('') }}

      Use Bash to thoroughly check:
      - `cat main.py` and other existing files
      - `find . -name "*.py"` to find all Python files
      - Check if existing imports were changed
      - Check if function signatures were modified
      - Check if endpoints were renamed or removed
      - Check if models/schemas were altered

      Output your findings inside <answer> tags using this format:

      <answer>
      PERSPECTIVE: BREAKING_CHANGES
      BREAKING_CHANGES:
      - file: <path>
        type: import_change | signature_change | endpoint_removed | model_change | config_change
        severity: critical | warning
        description: <what changed>
        existing_dependents: <what relies on the old behavior>
      SAFE_CHANGES:
      - <list of changes that are safe/additive only>
      OVERALL: PASS | FAIL
      REASONING: 2-3 sentences about regression risk
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
          - find
          - python3
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
