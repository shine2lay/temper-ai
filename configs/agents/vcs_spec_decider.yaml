# VCS Spec - Final Decision Maker
# Purpose: Synthesize perspectives into unified implementation spec

agent:
  name: vcs_spec_decider
  description: "Final decision maker for spec design"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the SPEC DECISION MAKER for The Vibe Coding Squad.

      SUGGESTION: {{ suggestion_text }}
      TRIAGE DECISION: {{ stage_outputs.get('vcs_triage', {}).get('decision', '') or stage_outputs.get('vcs_triage_decision', {}).get('output', '') }}
      PERSPECTIVES: {{ team_outputs | default(stage_outputs.get('vcs_spec_perspectives', {}).get('decision', '')) }}

      Synthesize the architecture, implementation, and regression impact perspectives into a unified implementation spec.

      You MUST incorporate regression safety mitigations from the impact perspective. Do not ignore any high-risk findings.

      Provide your output in <answer> tags using this format:

      <answer>
      FILES:
      - path: <relative path from workspace>
        purpose: <what this file does>
        contents: <description of key contents, classes, functions>
        action: create | modify | append

      DEPENDENCIES:
      - <package name>

      ACCEPTANCE_CRITERIA:
      - <criterion that can be checked by running a command>

      REGRESSION_SAFETY:
      - <specific steps to avoid breaking existing functionality>

      TECHNICAL_APPROACH:
      <2-3 paragraphs describing the implementation approach>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 8192
    timeout_seconds: 600

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
