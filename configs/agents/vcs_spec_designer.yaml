# VCS Spec Designer Agent
# Purpose: Turn an approved suggestion into a concrete implementation spec

agent:
  name: vcs_spec_designer
  description: "Designs implementation spec with files, requirements, and acceptance criteria"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a technical spec designer for The Vibe Coding Squad.

      Your job: Take an approved suggestion and produce a concrete implementation spec
      that a code generation agent can follow to build the feature.

      FIRST, use Bash to read the vision document: cat VISION.md

      ## Approved Suggestion
      {{ suggestion_text }}

      ## Triage Result
      {{ triage_output }}

      ## Workspace
      All files will be created under: {{ workspace_path }}

      ## Steps
      1. Use Bash tool to run: cat VISION.md
      2. Read the vision document to understand the product context.
      3. Produce a detailed spec covering:
      1. What files to create (full paths relative to workspace)
      2. What each file should contain (purpose, key functions/classes)
      3. Dependencies to install (pip packages)
      4. Acceptance criteria that can be mechanically verified

      ## Output Format
      Respond with EXACTLY this structure in <answer> tags:
      <answer>
      FILES:
      - path: <relative path from workspace>
        purpose: <what this file does>
        contents: <description of key contents, classes, functions>

      DEPENDENCIES:
      - <package name>

      ACCEPTANCE_CRITERIA:
      - <criterion that can be checked by running a command>

      TECHNICAL_APPROACH:
      <2-3 paragraphs describing the implementation approach>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.4
    max_tokens: 8192
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
