# VCS Static Checker Agent v3.0
# Purpose: Run deterministic static checks via pre_commands, LLM only synthesizes results
#
# Pre-commands run via subprocess BEFORE the LLM prompt. The LLM receives
# deterministic pass/fail results and synthesizes a verdict — it never
# decides WHAT to run.
#
# Check categories (ordered cheap → expensive):
#   1. Syntax — py_compile (recursive), ruff lint
#   2. Imports — dynamic discovery of all top-level .py modules

agent:
  name: vcs_static_checker
  description: "Deterministic static checker — pre_commands run checks, LLM synthesizes verdict"
  version: "3.0"
  type: static_checker

  pre_commands:
    - name: py_compile_all
      command: "find {{ workspace_path }} -name '*.py' -exec python3 -m py_compile {} +"
      timeout_seconds: 30

    - name: ruff_autofix
      command: "cd {{ workspace_path }} && if python3 -c 'import ruff' 2>/dev/null; then python3 -m ruff format . && python3 -m ruff check --select=E,F --fix . 2>&1; echo 'autofix applied'; else echo 'ruff not installed, skipping autofix'; fi"
      timeout_seconds: 30

    - name: ruff_lint
      command: "cd {{ workspace_path }} && if python3 -c 'import ruff' 2>/dev/null; then python3 -m ruff check --select=E,F --no-fix .; else echo 'ruff not installed, skipping lint'; fi"
      timeout_seconds: 30

    - name: import_modules
      command: "cd {{ workspace_path }} && for f in $(find . -maxdepth 1 -name '*.py' ! -name '__*' -printf '%f\\n' | sort); do mod=\"${f%.py}\"; echo \"import $mod...\"; python3 -c \"import $mod\" 2>&1 || true; done"
      timeout_seconds: 60

  prompt:
    inline: |
      You are the STATIC CHECK SYNTHESIZER.

      Below are the results of deterministic static checks that ran
      against the generated code. Your ONLY job is to read these results
      and produce a structured verdict.

      {{ command_results }}

      RULES:
      - If ALL checks have exit code 0 → OVERALL: PASS
      - If ANY check has non-zero exit code → OVERALL: FAIL
      - Copy the exact error output into ERRORS — do not paraphrase
      - Do NOT speculate about issues not shown in the results
      - ruff_autofix runs `ruff format` and `ruff check --fix` to auto-fix formatting
        and trivially fixable issues BEFORE the lint check. Treat autofix as informational.
      - For ruff_lint: if ruff is not installed the check says "skipping" → treat as PASS.
        If ruff ran and found errors (exit code 1) → FAIL. Include the ruff output in ERRORS.
      - For import_modules: each line shows "import <mod>..." followed by output.
        If any import prints a traceback or error → FAIL. List the failing modules.

      Output your findings in <answer> tags:
      <answer>
      OVERALL: PASS | FAIL
      CHECKS:
      - name: <check name>
        result: PASS | FAIL
        detail: <stdout/stderr summary>
      ERRORS:
      - <exact error text from failed checks, or "none">
      FIX_INSTRUCTIONS:
      - <concrete fix instructions for any FAIL, or "none needed">
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.1
    max_tokens: 4096
    timeout_seconds: 600

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
