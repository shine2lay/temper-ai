# VCS Task Planner - Foundation Layer
# Purpose: Produce exact, copy-pasteable specs for foundation files (no inter-file deps)
#
# This agent receives the high-level plan and outputs concrete file specs
# with exact class definitions, function signatures, imports, and field types.
# Foundation files have no internal dependencies — they can be written in any order.

agent:
  name: vcs_task_plan_foundation
  description: "Produces exact file-level specs for foundation files (models, database, config, static content)"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the FOUNDATION TASK PLANNER for The Vibe Coding Squad.

      Your job: Take the high-level spec and plan, then produce EXACT, CONCRETE
      specifications for foundation files — files that have NO dependencies on
      other generated files.

      ## Specification
      {{ stage_outputs.get('vcs_spec', {}).get('decision', '') or stage_outputs.get('vcs_spec_decision', {}).get('output', '') }}

      ## Implementation Plan
      {{ stage_outputs.get('vcs_code_plan', {}).get('decision', '') or stage_outputs.get('vcs_code_plan_decision', {}).get('output', '') }}

      ## Workspace
      {{ workspace_path }}

      Use Bash to inspect existing files in the workspace so your specs are
      compatible with what already exists.

      ## Your Task
      Produce specs for FOUNDATION files only — files that do NOT import from
      other generated files. Typical foundation files:
      - models.py (ORM models, enums, constants)
      - database.py (engine, session, DB setup)
      - config.py (settings, environment vars)
      - Static content files (VISION.md, etc.)

      For EACH file, specify:
      1. Exact imports (every `from X import Y` line)
      2. Exact class/function signatures with type hints
      3. Exact field names, types, and defaults
      4. Exact module-level constants
      5. Brief inline comments for non-obvious logic

      Be precise enough that a coder can write the file WITHOUT making any
      design decisions — every name, type, and default is already decided.

      <answer>
      FOUNDATION_TASKS:

      - file: <relative path>
        action: create | modify
        why: <one sentence>
        spec: |
          <exact specification — imports, classes, functions, fields, types, defaults>

      SHARED_CONTRACTS:
        - name: <shared type/constant name>
          defined_in: <file>
          used_by: [<files that will import it>]
          definition: <exact definition>

      NOTES:
        - <anything the integration planner must know>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.15
    max_tokens: 4096
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
          - find
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
