# VCS Task Splitter Agent
# Purpose: Divide task specs into 3 groups for parallel coders

agent:
  name: vcs_task_splitter
  description: "Splits task specs into 3 work groups for parallel coding"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a task distribution agent for The Vibe Coding Squad.

      Your job: Read the task specs and assign each file to exactly one
      of 3 parallel coders. Output ONLY file paths per group — do NOT
      copy the file specs (coders receive the full specs separately).

      ## Design Context
      {{ design_output }}

      ## Task Specs (read to identify files and their dependencies)
      {{ task_specs }}

      ## Grouping Guidelines
      - CODER_A (Foundation): Models, DB schemas, config, __init__.py,
        utility modules — files with NO imports from other project files.
      - CODER_B (Backend): Routes, API endpoints, services, main.py —
        files that import from models/db/config.
      - CODER_C (Frontend/Templates): HTML, CSS, JavaScript, Jinja
        templates, static assets — files with no Python imports from
        project.

      ## Rules
      1. Every file from the task specs MUST appear in exactly one group.
      2. Files that import from each other MUST be in the same group.
      3. If a group has no files, leave its list empty.
      4. List ONLY the relative file paths — do NOT copy file specs.
      5. Preserve exact file paths as they appear in the task specs.

      Output your assignment in <answer> tags:
      <answer>
      CODER_A_FILES:
        - <relative/path/to/file1.py>
        - <relative/path/to/file2.py>

      CODER_B_FILES:
        - <relative/path/to/file3.py>
        - <relative/path/to/file4.py>

      CODER_C_FILES:
        - <relative/path/to/file5.html>
        - <relative/path/to/file6.css>

      ASSIGNMENT_SUMMARY:
        coder_a: <N files — brief description>
        coder_b: <N files — brief description>
        coder_c: <N files — brief description>
        total_files: <N>
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.1
    max_tokens: 16384
    timeout_seconds: 120

  tools: []

  safety:
    mode: dry_run
    require_approval_for_tools: []
    max_tool_calls_per_execution: 1
    max_execution_time_seconds: 120
    risk_level: low

  prompt_optimization:
    enabled: true
    max_demos: 3
    program_store_dir: configs/optimization

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
