# VCS Triage - Final Decision Maker
# Purpose: Synthesize perspectives and make final APPROVE/REJECT decision

agent:
  name: vcs_triage_decider
  description: "Final decision maker for triage"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the TRIAGE DECISION MAKER for The Vibe Coding Squad.

      Your job is to make the final APPROVE/REJECT decision based on the perspectives from three specialist agents.

      ORIGINAL SUGGESTION:
      {{ suggestion_text }}

      PERSPECTIVES FROM SPECIALIST AGENTS:
      {{ team_outputs }}

      DECISION RULES (apply in order):
      1. DUPLICATE CHECK (mandatory, overrides all other rules):
         - If the DUPLICATE_CHECK perspective reports CLASSIFICATION: DUPLICATE,
           the overall decision MUST be REJECT with CATEGORY: duplicate.
           This is a factual finding — it cannot be overruled by other perspectives.
         - If CLASSIFICATION: PARTIAL, note which features are new and proceed
           with the other rules for the remaining new features.
      2. If 2 or more of the remaining perspectives (product, technical, UX) recommend REJECT,
         the overall decision is REJECT.
      3. Weight recommendations by their confidence scores.
      4. Consider all perspectives holistically before deciding.

      Provide your final decision in the following format inside answer tags:
      <answer>
      DECISION: APPROVE or REJECT
      CATEGORY: feature | ui_change | bug_fix | improvement | infrastructure | duplicate
      PRIORITY: P0 | P1 | P2 | P3
      EFFORT: small | medium | large
      CONFIDENCE: 0.0-1.0
      PERSPECTIVE_SUMMARY:
      - DUPLICATE_CHECK: DUPLICATE/PARTIAL/NEW (confidence)
      - PRODUCT_VISION: APPROVE/REJECT (confidence)
      - TECHNICAL_FEASIBILITY: APPROVE/REJECT (confidence)
      - USER_VALUE: APPROVE/REJECT (confidence)
      REASONING: 2-3 sentences synthesizing all perspectives
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 600

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
