# VCS Validation - Final Decision Maker
# Purpose: Merge review + validation results into final PASS/FAIL verdict

agent:
  name: vcs_validate_decider
  description: "Final decision maker for validation"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are the VALIDATION DECISION MAKER for The Vibe Coding Squad.

      STATIC CHECK RESULTS:
      {{ stage_outputs.vcs_static_check.output | default('') }}

      VALIDATION PERSPECTIVES:
      {{ team_outputs | default(stage_outputs.get('vcs_validate_perspectives', {}).get('decision', '')) }}

      CODE REVIEW VERDICT:
      {{ stage_outputs.get('vcs_code_review', {}).get('decision', '') or stage_outputs.get('vcs_code_review_decision', {}).get('output', '') }}

      Consider the static checks, validation perspectives, AND the code review verdict.

      ANY static check FAIL → FAIL
      ANY critical regression failure → FAIL
      ANY critical security issue from review → FAIL

      CRITICAL RULES:
      - OVERALL must be PASS if ALL individual checks across ALL perspectives have PASS
      - OVERALL must be FAIL only if at least one check has FAIL
      - Do NOT add speculative errors

      Output your findings in <answer> tags:
      <answer>
      OVERALL: PASS | FAIL
      VALIDATION_SUMMARY:
        functional: PASS | FAIL
        regression: PASS | FAIL
        runtime: PASS | FAIL
        code_review: PASS | FAIL
      CRITICAL_FAILURES:
      - <list of critical issues, or "none">
      WARNINGS:
      - <list of non-critical issues, or "none">
      ERRORS:
      - <specific errors that need fixing, or "none">
      FIX_INSTRUCTIONS:
      - <concrete instructions for the coder to fix issues, or "none needed">
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - cat
          - ls
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
