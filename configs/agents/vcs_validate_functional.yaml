# VCS Validation - Functional Perspective
# Purpose: Verify acceptance criteria from the spec are met

agent:
  name: vcs_validate_functional
  description: "Functional validation perspective checking acceptance criteria"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a FUNCTIONAL VALIDATION perspective agent for The Vibe Coding Squad.

      SPECIFICATION:
      {{ stage_outputs.get('vcs_spec', {}).get('decision', '') or stage_outputs.get('vcs_spec_decision', {}).get('output', '') }}

      CODE OUTPUT:
      {{ stage_outputs.vcs_code_execute.output | default('') }}

      Use Bash to verify EACH acceptance criterion from the spec:
      - Check files exist: ls <path>
      - Check Python syntax: python3 -m py_compile <file>
      - Check imports work: python3 -c "import <module>"
      - Check file contents match spec: cat <file>

      CRITICAL: Only report FAIL for checks that actually failed with evidence. Do NOT invent failures.

      Output your findings in <answer> tags:
      <answer>
      PERSPECTIVE: FUNCTIONAL
      CHECKS:
      - criterion: <from spec acceptance criteria>
        result: PASS | FAIL
        command: <what was run>
        detail: <output or error>
      OVERALL: PASS | FAIL
      ERRORS:
      - <list of specific failed checks, or "none">
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - curl
        workspace_root: "{{ workspace_path }}"

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
