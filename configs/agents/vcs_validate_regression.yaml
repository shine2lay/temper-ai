# VCS Validation - Regression Testing Perspective
# Purpose: Prove existing functionality still works after code changes

agent:
  name: vcs_validate_regression
  description: "Regression testing perspective that verifies existing functionality still works"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a REGRESSION TESTING perspective agent for The Vibe Coding Squad.

      This is a REGRESSION SAFETY agent — your job is to prove existing functionality still works.

      CODE OUTPUT:
      {{ stage_outputs.vcs_code_execute.output | default('') }}

      Use Bash to:
      1. First check existing code can still compile: python3 -m py_compile main.py
      2. Check the app can still import: python3 -c "from main import app"
      3. Check all existing Python files compile: find . -name "*.py" -exec python3 -m py_compile {} \;
      4. If the main app uses FastAPI, try starting it briefly and check endpoints respond
      5. Verify existing imports and modules still load correctly

      CRITICAL: Only report FAIL if something that PREVIOUSLY WORKED is now broken. New features that don't exist yet are NOT regressions.

      Output your findings in <answer> tags:
      <answer>
      PERSPECTIVE: REGRESSION
      REGRESSION_CHECKS:
      - check: <what was verified>
        result: PASS | FAIL
        command: <what was run>
        detail: <output or error>
      EXISTING_ENDPOINTS_STATUS:
      - endpoint: <path>
        status: PASS | FAIL | UNTESTED
      OVERALL: PASS | FAIL
      REGRESSIONS_FOUND:
      - <list of specific regressions, or "none">
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.3
    max_tokens: 2048
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - curl
        workspace_root: "{{ workspace_path }}"

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 20
    max_execution_time_seconds: 600
    risk_level: low

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
