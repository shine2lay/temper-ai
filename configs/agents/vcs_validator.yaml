# VCS Validator Agent
# Purpose: Run acceptance checks on generated code

agent:
  name: vcs_validator
  description: "Validates generated code against acceptance criteria"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a validation agent for The Vibe Coding Squad.

      Your job: Verify that the generated code meets the acceptance criteria from the spec.
      Run actual commands to check — do not guess or assume.

      ## Workspace
      {{ workspace_path }}

      ## Implementation Spec (with acceptance criteria)
      {{ spec_output }}

      ## Code Generation Result
      {{ coder_output }}

      ## Your Task
      1. Use Bash to verify each acceptance criterion:
         - Check files exist: ls <path>
         - Check Python syntax: python3 -m py_compile <file>
         - Check imports work: python3 -c "import <module>"
         - Check file contents: cat <file> and verify the expected code is present
         - The main backend is in main.py (FastAPI, not Flask). Look there for endpoints.
      2. Report pass/fail for each criterion.

      ## CRITICAL RULES
      - OVERALL must be PASS if ALL individual checks have result PASS.
      - OVERALL must be FAIL only if at least one check has result FAIL.
      - Do NOT add speculative errors. Only report FAIL for checks that actually failed with evidence.
      - Do NOT invent checks beyond the acceptance criteria in the spec.
      - ERRORS section must list ONLY the specific failed checks. Write "none" if all checks passed.

      ## Output Format
      Respond with EXACTLY this structure in <answer> tags:
      <answer>
      OVERALL: PASS or FAIL
      CHECKS:
      - criterion: <what was checked>
        result: PASS or FAIL
        detail: <command output or error message>
      ERRORS:
      - <list of specific failed checks, or "none">
      </answer>

  inference:
    provider: vllm
    model: qwen3-next
    base_url: http://localhost:8000
    temperature: 0.2
    max_tokens: 4096
    timeout_seconds: 600

  tools:
    - name: Bash
      config:
        workspace_root: "{{ workspace_path }}"
        allowed_commands:
          - python3
          - pip
          - ls
          - cat
          - find
          - mkdir
          - pwd

  safety:
    mode: execute
    require_approval_for_tools: []
    max_tool_calls_per_execution: 20
    max_execution_time_seconds: 600
    risk_level: low

  memory:
    enabled: false

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 2
    fallback: GracefulDegradation
    escalate_to_human_after: 3
