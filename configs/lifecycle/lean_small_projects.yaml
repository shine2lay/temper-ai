name: lean_small_projects
description: "Skip heavyweight stages for small, low-risk projects"
version: "1.0"
product_types: []
rules:
  - name: skip_design_for_small
    action: skip
    stage_name: design
    condition: "{{ size == 'small' and risk_level in ['low', 'medium'] }}"
    rationale: "Small projects don't need formal design review"
    priority: 10
  - name: skip_security_low_risk
    action: skip
    stage_name: security_review
    condition: "{{ risk_level == 'low' }}"
    rationale: "Low-risk projects can skip dedicated security review"
    priority: 5
enabled: true
min_autonomy_level: 1
requires_approval: false
source: manual
confidence: 1.0
