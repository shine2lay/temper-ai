# Demo: Analysis stage for dynamic edge routing demo

stage:
  name: demo_retry_analyze
  description: "Produces technical analysis of a question"
  version: "2.0"

  agents:
    - demo_retry_analyzer

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    question:
      type: string
      required: true

  outputs:
    analysis:
      type: string
      description: "Technical analysis output"

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2
