stage:
  name: collaborative_dialogue
  description: "Collaborative 4-agent dialogue building shared understanding"
  version: "1.0"

  agents:
    - researcher
    - analyst
    - systems_thinker
    - decision_maker

  execution:
    agent_mode: sequential
    timeout_seconds: 1800

  collaboration:
    strategy: multi_round
    config:
      mode: dialogue
      max_rounds: 5
      convergence_threshold: 0.85
      context_strategy: full

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2

  inputs:
    required:
      - topic
    optional:
      - context
      - constraints

  outputs:
    decision: "Final collaborative decision"
    dialogue_history: "Full dialogue transcript"
    convergence_info: "Convergence metrics"
