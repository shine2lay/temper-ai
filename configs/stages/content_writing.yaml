stage:
  name: content_writing
  description: "Multi-style content creation and structuring"
  version: "1.0"

  agents:
    - writer_informative
    - writer_engaging
    - editor_structural

  collaboration:
    strategy: src.strategies.dialogue.DialogueOrchestrator
    max_rounds: 3
    consensus_threshold: 0.65
    enable_summarization: true

  timeout_seconds: 600  # 10 minutes for stage execution

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
