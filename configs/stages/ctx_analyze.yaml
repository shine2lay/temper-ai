# Context Test — Analyze Stage
# Stage 1: Analyzes input text, produces findings and severity.

stage:
  name: ctx_analyze
  description: "Analyze input text for key findings and severity"
  version: "1.0"

  agents:
    - ctx_analyzer

  execution:
    agent_mode: sequential
    timeout_seconds: 900

  inputs:
    input_text:
      type: string
      required: true

  outputs:
    findings:
      type: string
      description: "Key findings from the analysis"
    severity:
      type: string
      description: "Severity level (low/medium/high/critical)"

  error_handling:
    on_agent_failure: halt_stage
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 1
