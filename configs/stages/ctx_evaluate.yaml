# Context Test — Evaluate Stage
# Stage 2: Evaluates findings from analysis stage, produces recommendation.

stage:
  name: ctx_evaluate
  description: "Evaluate analysis findings and produce recommendation"
  version: "1.0"

  agents:
    - ctx_evaluator

  execution:
    agent_mode: sequential
    timeout_seconds: 900

  inputs:
    findings:
      source: ctx_analyze.output
      required: true
    severity:
      source: ctx_analyze.structured.severity
      required: false
      default: "unknown"
    original_text:
      source: workflow.input_text
      required: false

  outputs:
    recommendation:
      type: string
      description: "Recommended course of action"

  error_handling:
    on_agent_failure: halt_stage
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 1
