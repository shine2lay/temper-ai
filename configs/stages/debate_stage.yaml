# Debate Stage - M3 Multi-Round Argumentation
# Purpose: Multi-round structured debate with convergence detection
# Features: Iterative refinement, convergence tracking, synthesis from debate

stage:
  name: debate_stage
  description: "Multi-round debate with convergence detection"
  version: "1.0"

  # Stage type: multi-agent debate
  type: multi_agent_debate  # M3 feature

  # Debating agents
  agents:
    - name: agent_advocate
      config_path: configs/agents/simple_researcher.yaml
      role: advocate
      description: "Argues for the proposed option"

    - name: agent_skeptic
      config_path: configs/agents/simple_researcher.yaml
      role: skeptic
      description: "Challenges and questions the proposal"

    - name: agent_analyst
      config_path: configs/agents/simple_researcher.yaml
      role: analyst
      description: "Provides objective analysis"

  # Execution: Debate rounds
  execution:
    agent_mode: sequential  # Agents respond in sequence per round
    max_iterations: 3  # Max 3 debate rounds
    timeout_seconds: 600  # 10 minutes total

  # Collaboration: Debate strategy (M3)
  collaboration:
    strategy: debate_and_synthesize  # M3 debate strategy
    config:
      max_rounds: 3  # Maximum debate rounds
      convergence_threshold: 0.8  # Stop if 80% unchanged
      require_unanimous: false
      min_rounds: 1  # At least 1 round even if converged
      debate_structure: round_robin  # Turn-taking structure

  # Convergence detection (M3)
  convergence:
    enabled: true
    threshold: 0.8  # 80% agents unchanged
    early_termination: true  # Stop early if converged
    track_position_changes: true

  # Error handling
  error_handling:
    min_successful_agents: 2  # Need 2/3 agents
    on_agent_failure: continue
    on_no_convergence: escalate  # Escalate if debate doesn't converge

  # Input/output schema
  inputs:
    required:
      - decision_prompt  # What to decide
      - options  # Available options
    optional:
      - context  # Additional context

  outputs:
    - decision  # Final decision
    - debate_history  # All rounds
    - convergence_info  # Convergence metrics
    - conflicts  # Remaining disagreements

  # Metadata
  tags:
    - debate
    - convergence
    - multi-round
    - milestone-3

  created_by: m3-14-example-workflows
  created_at: "2026-01-26"
