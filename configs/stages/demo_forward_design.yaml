# Demo: Design expert stage for dynamic forward routing demo
# condition: False — only activates via dynamic edge from classifier

stage:
  name: demo_forward_design_expert
  description: "Design specialist — only runs when classifier routes here"
  version: "1.0"

  agents:
    - demo_forward_design_expert

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    question:
      source: workflow.question
      required: true

  outputs:
    answer:
      type: string
      description: "Architecture-focused answer"

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2
