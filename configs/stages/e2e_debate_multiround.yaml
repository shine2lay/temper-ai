# Multi-Round Debate Stage
# Purpose: Show agents debating and changing minds over multiple rounds
# Strategy: debate_and_synthesize with convergence detection

stage:
  name: e2e_debate_multiround
  description: "Multi-round debate with convergence detection"
  version: "1.0"

  # Stage type
  type: multi_agent_debate

  # Agent configuration (same 3 agents)
  agents:
    - name: product_manager
      role: Product Manager
      persona: "You're business-focused and care about market timing, competitive advantage, and revenue. You're willing to take calculated risks for market opportunity."
      llm_config:
        temperature: 0.7
        max_tokens: 500

    - name: engineering_lead
      role: Engineering Lead
      persona: "You're technical and quality-focused. You care about code stability, security, and maintainability. You prefer thorough testing before launch."
      llm_config:
        temperature: 0.7
        max_tokens: 500

    - name: data_analyst
      role: Data Analyst
      persona: "You're data-driven and analytical. You prefer evidence-based decisions and controlled experiments. You value learning from user data."
      llm_config:
        temperature: 0.7
        max_tokens: 500

  # Execution settings
  execution:
    agent_mode: sequential
    max_iterations: 5  # Up to 5 rounds of debate
    timeout_seconds: 300

  # Collaboration: Multi-round debate with convergence
  collaboration:
    strategy: debate_and_synthesize
    config:
      max_rounds: 5
      convergence_threshold: 0.8  # Stop if 80% agree
      min_rounds: 2  # At least 2 rounds
      allow_position_changes: true
      track_mind_changes: true

  # Error handling
  error_handling:
    min_successful_agents: 2
    on_agent_failure: continue
    on_stage_failure: halt

  # Quality gates
  quality_gates:
    enabled: true
    min_confidence: 0.6
    on_failure: proceed_with_warning

  # Input/output schema
  inputs:
    required:
      - scenario
      - options
    optional:
      - context

  outputs:
    - decision
    - agent_outputs
    - debate_history
    - convergence_metrics

  # Metadata
  tags:
    - e2e-demo
    - multi-round-debate
    - convergence
    - milestone-3

  notes:
    - "Multi-round debate (2-5 rounds)"
    - "Agents can change positions based on others' arguments"
    - "Stops early if convergence detected"
    - "Tracks mind changes and debate evolution"

  created_by: m3-e2e-demo
  created_at: "2026-01-27"
