# ERC721 Scaffold Stage
# Purpose: Plan project structure using architect agent

stage:
  name: erc721_scaffold
  description: "Plans ERC721 project structure and outputs JSON specification"
  version: "1.0"

  agents:
    - erc721_architect

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 600  # 10 minutes for stage execution

  inputs:
    contract_name:
      type: string
      required: false
      default: "SimpleNFT"
    token_name:
      type: string
      required: false
      default: "SimpleNFT"
    token_symbol:
      type: string
      required: false
      default: "SNFT"
    llm_model:
      type: string
      required: false
      default: "llama3:8b"

  outputs:
    project_spec:
      type: string
      description: "JSON specification of the project structure"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - erc721
    - scaffold
