# ERC721 Test Stage
# Purpose: Compile and test the project

stage:
  name: erc721_test
  description: "Compiles Solidity contracts and runs Hardhat tests"
  version: "1.0"

  agents:
    - erc721_tester

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 600  # 10 minutes for stage execution

  inputs:
    workspace_path:
      type: string
      required: true
    llm_model:
      type: string
      required: false
      default: "llama3:8b"

  outputs:
    test_results:
      type: string
      description: "JSON with compilation and test results"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - erc721
    - test
  created_by: erc721-workflow
  created_at: "2026-02-02"
