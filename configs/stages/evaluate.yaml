# Demo: Evaluation stage for dynamic edge routing demo
# Evaluates analysis quality; emits _next_stage signal to route back if insufficient

stage:
  name: demo_retry_evaluate
  description: "Evaluates analysis quality — may route back to analyzer via dynamic edge"
  version: "2.0"

  agents:
    - demo_retry_evaluator

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    question:
      source: workflow.question
      required: true

  outputs:
    evaluation:
      type: string
      description: "Quality evaluation verdict (PASS or FAIL)"
    _next_stage:
      type: dict
      description: "Dynamic routing signal: {name: stage_name, inputs: {key: value}}"

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2
