stage:
  name: evaluation_decision
  description: "Evaluation and decision stage with voting"
  version: "1.0"

  agents:
    - evaluator
    - risk_assessor
    - decision_maker

  collaboration:
    strategy: temper_ai.strategies.dialogue.DialogueOrchestrator
    max_rounds: 2
    consensus_threshold: 0.75
    enable_summarization: true

  timeout_seconds: 3000

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
