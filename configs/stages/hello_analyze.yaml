stage:
  name: hello_analyze
  description: "Analyze a topic with a single agent"
  version: "1.0"

  agents:
    - hello_analyst

  execution:
    agent_mode: sequential
    timeout_seconds: 300

  inputs:
    topic:
      type: string
      required: true
      description: "The topic to analyze"

  outputs:
    insights:
      type: string
      description: "Key insights about the topic"
