stage:
  name: implementation_planning
  description: "Architecture design and project planning"
  version: "1.0"

  agents:
    - solution_architect
    - product_manager
    - project_manager

  collaboration:
    strategy: temper_ai.strategies.dialogue.DialogueOrchestrator
    max_rounds: 3
    consensus_threshold: 0.7
    enable_summarization: true

  timeout_seconds: 600  # 10 minutes for stage execution

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
