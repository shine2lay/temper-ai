stage:
  name: memory_research
  description: "Research stage with memory-enabled agent"
  product_type: report
  agents:
    - memory_researcher
  execution:
    mode: sequential
  error_handling:
    on_agent_failure: continue_with_remaining
    max_retries: 1
    retry_strategy: ExponentialBackoff
    fallback: GracefulDegradation
