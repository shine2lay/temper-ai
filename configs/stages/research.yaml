# Research Stage Configuration
# Purpose: Single-agent research stage for simple analysis workflows

stage:
  name: research_stage
  description: "Research and analysis stage using a single agent"
  version: "1.0"

  # Agent configuration (list of agent names)
  agents:
    - simple_researcher

  # Stage execution settings
  execution:
    max_iterations: 3
    convergence_threshold: 0.85
    timeout_seconds: 600

  # Input/output schema
  inputs:
    topic:
      type: string
      required: true
    focus_areas:
      type: array
      required: false
    depth:
      type: string
      required: false
      default: medium

  outputs:
    insights:
      type: string
      description: "Research insights and findings"
    recommendations:
      type: string
      description: "Action recommendations"
    confidence_score:
      type: number
      description: "Confidence in the analysis"

  # Collaboration configuration (required for multi-agent stages)
  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  # Conflict resolution configuration (required for multi-agent stages)
  conflict_resolution:
    strategy: "highest_confidence"

  # Stage safety configuration
  safety:
    mode: execute
    risk_level: low
    require_approval: false

  # Metadata
  tags:
    - research
    - single-agent
    - milestone-1

  created_by: m1-05-example-configs
  created_at: "2026-01-26"
