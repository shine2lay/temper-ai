stage:
  name: research_fact_checking
  description: "Research and fact-checking with verification"
  version: "1.0"

  agents:
    - fact_checker
    - research_specialist
    - topic_expert

  collaboration:
    strategy: src.strategies.dialogue.DialogueOrchestrator
    max_rounds: 3
    consensus_threshold: 0.7
    enable_summarization: true

  timeout_seconds: 600  # 10 minutes for stage execution

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
