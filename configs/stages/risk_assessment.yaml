stage:
  name: risk_assessment
  description: "Security, operations, and compliance risk assessment"
  version: "1.0"

  agents:
    - security_specialist
    - operations_lead
    - compliance_officer

  collaboration:
    strategy: temper_ai.strategies.dialogue.DialogueOrchestrator
    max_rounds: 2
    consensus_threshold: 0.75
    enable_summarization: true

  timeout_seconds: 600  # 10 minutes for stage execution

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
