stage:
  name: solution_design_parallel
  description: "Technical solution design with multiple perspectives (parallel agents)"
  version: "1.0"

  agents:
    - algorithm_designer
    - software_architect_tech
    - data_engineer_tech

  execution:
    agent_mode: parallel
    timeout_seconds: 1800

  collaboration:
    strategy: consensus
    config:
      threshold: 0.5
      require_unanimous: false
      conflict_threshold: 0.3

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
