stage:
  name: validation_documentation_parallel
  description: "Solution validation and technical documentation (parallel agents)"
  version: "1.0"

  agents:
    - code_reviewer_tech
    - documentation_specialist
    - qa_validator

  execution:
    agent_mode: parallel
    timeout_seconds: 1800

  collaboration:
    strategy: consensus
    config:
      threshold: 0.5
      require_unanimous: false
      conflict_threshold: 0.3

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2
