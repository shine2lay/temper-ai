# VCS Code Generation Stage
# Purpose: Write actual code files based on the spec

stage:
  name: vcs_code
  description: "Generates code files based on the implementation spec"
  version: "1.0"

  agents:
    - vcs_coder

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 1800

  inputs:
    spec_output:
      type: string
      required: true
    workspace_path:
      type: string
      required: true
    validator_output:
      type: string
      required: false

  outputs:
    coder_output:
      type: string
      description: "Summary of files created and dependencies installed"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: medium
    require_approval: false

  tags:
    - vcs
    - code
