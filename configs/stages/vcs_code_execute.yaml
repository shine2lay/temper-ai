# VCS Code Execute Stage
# Purpose: 3 parallel coders write files based on task splitter assignments

stage:
  name: vcs_code_execute
  description: "3 parallel coders write assigned files from task splitter"
  version: "2.0"

  agents:
    - vcs_coder_a
    - vcs_coder_b
    - vcs_coder_c

  execution:
    agent_mode: parallel
    max_concurrent: 3
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 1800

  inputs:
    workspace_path:
      type: string
      required: true
    task_assignments:
      type: string
      required: true
    task_specs:
      type: string
      required: true
    design_output:
      type: string
      required: false
      default: ""
    quality_gate_output:
      type: string
      required: false
      default: ""
    static_check_output:
      type: string
      required: false
      default: ""

  outputs:
    coder_output:
      type: string
      description: "Summary of files created and dependencies installed"
    files_created:
      type: string
      description: "List of files created"
    files_modified:
      type: string
      description: "List of files modified"
    dependencies_installed:
      type: string
      description: "Dependencies installed"

  collaboration:
    strategy: "concatenate"
    max_rounds: 1

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: medium
    require_approval: false

  tags:
    - vcs
    - code
