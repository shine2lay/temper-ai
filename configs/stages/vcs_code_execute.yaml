# VCS Code Execute Stage
# Purpose: Single coder agent writes files based on spec and plan

stage:
  name: vcs_code_execute
  description: "Generates code files based on the implementation spec and plan"
  version: "1.0"

  agents:
    - vcs_coder

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 1800

  inputs:
    workspace_path:
      source: workflow.workspace_path
      required: true
    task_specs:
      source: vcs_task_planning.output
      required: true
    design_decision:
      source: vcs_design.decision
      required: false
      default: ""

  outputs:
    coder_output:
      type: string
      description: "Summary of files created and dependencies installed"
    files_created:
      type: string
      description: "List of files created"
    files_modified:
      type: string
      description: "List of files modified"
    dependencies_installed:
      type: string
      description: "Dependencies installed"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: medium
    require_approval: false

  tags:
    - vcs
    - code
