# VCS Code Plan Stage (Leader Strategy)
# Purpose: 3 perspectives + 1 decider in a single stage
# Replaces: vcs_code_plan_perspectives + vcs_code_plan_decision

stage:
  name: vcs_code_plan
  description: "Multi-perspective code planning with leader decision"
  version: "2.0"

  agents:
    - vcs_plan_structure
    - vcs_plan_logic
    - vcs_plan_integration
    - vcs_plan_decider

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: leader
    config:
      leader_agent: vcs_plan_decider
      fallback_to_consensus: true

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    plan_output:
      type: string
      description: "Final implementation plan"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-plan
    - leader
