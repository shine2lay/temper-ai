stage:
  name: vcs_code_plan_decision
  description: "Final code plan decision based on perspectives"
  version: "1.0"

  agents:
    - vcs_plan_decider

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  collaboration:
    strategy: sequential
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: highest_confidence

  outputs:
    plan_output:
      type: string
      description: "Final implementation plan"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-plan
    - decision
