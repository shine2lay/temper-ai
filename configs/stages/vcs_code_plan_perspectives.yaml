stage:
  name: vcs_code_plan_perspectives
  description: "Three parallel perspectives plan the implementation"
  version: "1.0"

  agents:
    - vcs_plan_structure
    - vcs_plan_logic
    - vcs_plan_integration

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: consensus

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    decision:
      type: string
      description: "Synthesized code plan perspectives"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-plan
    - parallel
