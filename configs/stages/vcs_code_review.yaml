# VCS Code Review Stage (Leader Strategy)
# Purpose: 3 perspectives + 1 decider in a single stage
# Replaces: vcs_code_review_perspectives + vcs_code_review_decision

stage:
  name: vcs_code_review
  description: "Multi-perspective code review with leader decision"
  version: "2.0"

  agents:
    - vcs_review_correctness
    - vcs_review_breaking
    - vcs_review_security
    - vcs_review_decider

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: leader
    config:
      leader_agent: vcs_review_decider
      fallback_to_consensus: true

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    review_output:
      type: string
      description: "Final code review verdict"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-review
    - leader
