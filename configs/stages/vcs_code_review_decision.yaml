stage:
  name: vcs_code_review_decision
  description: "Final code review decision based on perspectives"
  version: "1.0"

  agents:
    - vcs_review_decider

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  collaboration:
    strategy: sequential
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: highest_confidence

  outputs:
    review_output:
      type: string
      description: "Final code review verdict"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-review
    - decision
