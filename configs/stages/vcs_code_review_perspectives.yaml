stage:
  name: vcs_code_review_perspectives
  description: "Three parallel perspectives review the generated code"
  version: "1.0"

  agents:
    - vcs_review_correctness
    - vcs_review_breaking
    - vcs_review_security

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: consensus

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    decision:
      type: string
      description: "Synthesized code review perspectives"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - code-review
    - parallel
