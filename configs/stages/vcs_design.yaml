# VCS Design Stage (replaces vcs_spec + vcs_code_plan)
# Leader strategy: 3 perspectives + 1 decider

stage:
  name: vcs_design
  description: "Unified design stage — architecture + implementation + safety perspectives synthesized by decider"
  version: "1.0"

  agents:
    - vcs_design_architecture
    - vcs_design_implementation
    - vcs_design_safety
    - vcs_design_decider

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: leader
    config:
      leader_agent: vcs_design_decider
      fallback_to_consensus: true

  inputs:
    suggestion_text:
      type: string
      required: true
    workspace_path:
      type: string
      required: true

  outputs:
    design_output:
      type: string
      description: "Unified design specification"
    architecture_summary:
      type: string
      description: "High-level architecture"
    file_list:
      type: string
      description: "Files to create/modify"
    dependencies:
      type: string
      description: "External dependencies needed"

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 1
