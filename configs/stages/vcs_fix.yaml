# VCS Fix Stage
# Purpose: Fix code errors reported by validator

stage:
  name: vcs_fix
  description: "Fixes code errors reported by the validator"
  version: "1.0"

  agents:
    - vcs_fixer

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 1800

  inputs:
    spec_output:
      type: string
      required: true
    validator_output:
      type: string
      required: true
    workspace_path:
      type: string
      required: true

  outputs:
    fixer_output:
      type: string
      description: "Summary of fixes applied"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  conflict_resolution:
    strategy: "highest_confidence"

  safety:
    mode: execute
    risk_level: medium
    require_approval: false

  tags:
    - vcs
    - fix
