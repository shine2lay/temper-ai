# VCS Git Setup Stage
# Pulls latest, creates isolated worktree, checks out feature branch

stage:
  name: vcs_git_setup
  description: "Pull latest, create isolated worktree, and checkout feature branch"
  version: "2.0"

  agents:
    - vcs_git_setup

  execution:
    agent_mode: sequential
    timeout_seconds: 120

  inputs:
    workspace_path:
      source: workflow.workspace_path
      required: true
    suggestion_text:
      source: vcs_work_discovery.output
      required: false
      default: ""

  outputs:
    worktree_path:
      type: string
      description: "Path to the isolated worktree directory"
    feature_branch:
      type: string
      description: "Name of the created feature branch"
    pull_status:
      type: string
      description: "Status of git pull operation"

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 1
