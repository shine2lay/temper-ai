# VCS Git Snapshot Stage
# Creates a git snapshot before code execution for rollback safety

stage:
  name: vcs_git_snapshot
  description: "Create git snapshot for rollback safety before code writes"
  version: "1.0"

  agents:
    - vcs_git_snapshot

  execution:
    agent_mode: sequential
    timeout_seconds: 120

  inputs:
    workspace_path:
      source: workflow.workspace_path
      required: true

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 1
