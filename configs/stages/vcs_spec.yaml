# VCS Spec Stage (Leader Strategy)
# Purpose: 3 perspectives + 1 decider in a single stage
# Replaces: vcs_spec_perspectives + vcs_spec_decision

stage:
  name: vcs_spec
  description: "Multi-perspective spec design with leader decision"
  version: "2.0"

  agents:
    - vcs_spec_architect
    - vcs_spec_implementer
    - vcs_spec_impact
    - vcs_spec_decider

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: leader
    config:
      leader_agent: vcs_spec_decider
      fallback_to_consensus: true

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    suggestion_text:
      type: string
      required: true
    workspace_path:
      type: string
      required: true

  outputs:
    spec_output:
      type: string
      description: "Final implementation spec"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - spec
    - leader
