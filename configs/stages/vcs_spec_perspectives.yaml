stage:
  name: vcs_spec_perspectives
  description: "Three parallel perspectives design the implementation spec"
  version: "1.0"

  agents:
    - vcs_spec_architect
    - vcs_spec_implementer
    - vcs_spec_impact

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: consensus

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    suggestion_text:
      type: string
      required: true
    workspace_path:
      type: string
      required: true

  outputs:
    decision:
      type: string
      description: "Synthesized spec perspectives"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - spec
    - parallel
