# VCS Static Check Stage
# Purpose: Run deterministic static checks on generated code before review/validation
#
# Single agent, sequential execution. Pre-commands handle all the actual
# checking; the LLM just synthesizes results into a structured verdict.

stage:
  name: vcs_static_check
  description: "Deterministic static checks via pre_commands"
  version: "1.0"

  agents:
    - vcs_static_checker

  execution:
    agent_mode: sequential
    timeout_seconds: 900

  inputs:
    workspace_path:
      source: workflow.workspace_path
      required: true
    coder_output:
      source: vcs_code_execute.output
      required: true

  outputs:
    check_verdict:
      type: string
      description: "PASS or FAIL with details"
    verdict:
      type: string
      description: "PASS or FAIL"
    errors_found:
      type: string
      description: "Error details"
    warnings_found:
      type: string
      description: "Warning details"

  error_handling:
    on_agent_failure: halt_stage
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 1
