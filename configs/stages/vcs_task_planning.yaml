# VCS Task Planning Stage
# Purpose: Sequential file-by-file task decomposition before coding
#
# Runs two agents in sequence:
#   1. Foundation planner — specs for files with no internal deps (models, db, config)
#   2. Integration planner — specs for files that import from foundation (routes, main)
#
# The integration planner sees the foundation specs, ensuring import consistency.

stage:
  name: vcs_task_planning
  description: "Sequential file-by-file task specs: foundation first, then integration"
  version: "1.0"

  agents:
    - vcs_task_plan_foundation
    - vcs_task_plan_integration

  execution:
    agent_mode: sequential
    timeout_seconds: 1200

  inputs:
    suggestion_text:
      source: vcs_work_discovery.output
      required: false
      default: ""
    workspace_path:
      source: workflow.workspace_path
      required: true
    design_output:
      source: vcs_design.output
      required: true

  outputs:
    task_specs:
      type: string
      description: "Concrete file-level task specifications"
    task_count:
      type: string
      description: "Number of tasks planned"
    foundation_files:
      type: string
      description: "Foundation file list"
    integration_files:
      type: string
      description: "Integration file list"

  conflict_resolution:
    strategy: highest_confidence

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - task-planning
    - file-specs
