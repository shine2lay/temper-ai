# VCS Task Split Stage
# Purpose: Split task specs into 3 groups for parallel coders

stage:
  name: vcs_task_split
  description: "Split task specs into 3 groups for parallel coders"
  version: "1.0"

  agents:
    - vcs_task_splitter

  execution:
    max_iterations: 1
    convergence_threshold: 0.9
    timeout_seconds: 300

  inputs:
    task_specs:
      type: string
      required: true
    design_output:
      type: string
      required: false
      default: ""
    workspace_path:
      type: string
      required: false
      default: ""

  outputs:
    output:
      type: string
      description: "Task assignments for 3 parallel coders"

  collaboration:
    strategy: "sequential"
    max_rounds: 1
    convergence_threshold: 0.8

  safety:
    mode: dry_run
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - task-split
