# VCS Validation Stage (Leader Strategy)
# Purpose: 3 perspectives + 1 decider in a single stage
# Replaces: vcs_validate_perspectives + vcs_validate_decision

stage:
  name: vcs_validate
  description: "Multi-perspective validation with leader decision"
  version: "2.0"

  agents:
    - vcs_validate_functional
    - vcs_validate_regression
    - vcs_validate_runtime
    - vcs_validate_decider

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: leader
    config:
      leader_agent: vcs_validate_decider
      fallback_to_consensus: true

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    validator_output:
      type: string
      description: "Final validation verdict (PASS/FAIL)"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - validate
    - leader
