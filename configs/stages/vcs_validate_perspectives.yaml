stage:
  name: vcs_validate_perspectives
  description: "Three parallel perspectives validate the generated code"
  version: "1.0"

  agents:
    - vcs_validate_functional
    - vcs_validate_regression
    - vcs_validate_runtime

  execution:
    agent_mode: parallel
    timeout_seconds: 600
    max_concurrent: 3

  collaboration:
    strategy: consensus

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 2
    retry_failed_agents: true
    max_agent_retries: 2

  inputs:
    workspace_path:
      type: string
      required: true

  outputs:
    decision:
      type: string
      description: "Synthesized validation perspectives"

  safety:
    mode: execute
    risk_level: low
    require_approval: false

  tags:
    - vcs
    - validate
    - parallel
