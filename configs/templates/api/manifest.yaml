product_type: api
name: "API Service Template"
description: "RESTful/GraphQL API service development workflow"
version: "1.0"
required_inputs:
  - project_description
  - api_style
optional_inputs:
  - existing_schema
  - authentication_requirements
quality_gates:
  enabled: true
  min_confidence: 0.75
  require_citations: true
  on_failure: retry_stage
  max_retries: 3
  custom_checks:
    - schema_validation
    - backward_compatibility
stages:
  - design
  - implement
  - test
  - document
tags:
  - api
  - rest
  - graphql
  - backend
default_inference:
  provider: vllm
  model: qwen3-next
  base_url: "http://localhost:8000"
