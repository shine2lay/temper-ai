stage:
  name: "{{project_name}}_api_design"
  description: "API contract and schema design"
  version: "1.0"

  agents:
    - "{{project_name}}_api_designer"

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    api_style:
      type: string
      required: true
      description: "API style (REST, GraphQL, gRPC)"
    existing_schema:
      type: string
      required: false
      description: "Existing API schema for backward compatibility"

  outputs:
    api_contract:
      type: dict
      description: "API contract specification"
    endpoint_definitions:
      type: array
      description: "List of endpoint definitions"
    data_models:
      type: dict
      description: "Request/response data models"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.75
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
