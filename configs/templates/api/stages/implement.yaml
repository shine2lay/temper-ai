stage:
  name: "{{project_name}}_api_implement"
  description: "API endpoint implementation"
  version: "1.0"

  agents:
    - "{{project_name}}_api_implementer"

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    api_style:
      type: string
      required: true
      description: "API style (REST, GraphQL, gRPC)"

  outputs:
    implementation:
      type: dict
      description: "Implementation details and code structure"
    middleware_config:
      type: dict
      description: "Middleware and validation configuration"
    database_layer:
      type: dict
      description: "Database layer implementation"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.75
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
