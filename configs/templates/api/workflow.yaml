workflow:
  name: "{{project_name}}_api"
  description: "API service development workflow for {{project_name}}"
  version: "1.0"
  product_type: api

  stages:
    - name: design
      stage_ref: "configs/stages/{{project_name}}_api_design.yaml"
    - name: implement
      stage_ref: "configs/stages/{{project_name}}_api_implement.yaml"
    - name: test
      stage_ref: "configs/stages/{{project_name}}_api_test.yaml"
    - name: document
      stage_ref: "configs/stages/{{project_name}}_api_document.yaml"

  inputs:
    required:
      - project_description
      - api_style
    optional:
      - existing_schema
      - authentication_requirements

  config:
    timeout_seconds: 3600

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true
