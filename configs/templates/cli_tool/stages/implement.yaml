stage:
  name: "{{project_name}}_cli_tool_implement"
  description: "CLI command implementation and business logic"
  version: "1.0"

  agents:
    - "{{project_name}}_cli_tool_implementer"

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    target_platform:
      type: string
      required: true
      description: "Target platform"

  outputs:
    implementation:
      type: dict
      description: "Command implementation details"
    config_management:
      type: dict
      description: "Configuration file handling"
    output_formatting:
      type: dict
      description: "Output formatting and display logic"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.70
    require_citations: false
    on_failure: retry_stage
    max_retries: 3
