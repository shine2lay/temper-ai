workflow:
  name: "{{project_name}}_cli_tool"
  description: "CLI tool development workflow for {{project_name}}"
  version: "1.0"
  product_type: cli_tool

  stages:
    - name: design
      stage_ref: "configs/stages/{{project_name}}_cli_tool_design.yaml"
    - name: implement
      stage_ref: "configs/stages/{{project_name}}_cli_tool_implement.yaml"
    - name: test
      stage_ref: "configs/stages/{{project_name}}_cli_tool_test.yaml"
    - name: package
      stage_ref: "configs/stages/{{project_name}}_cli_tool_package.yaml"

  inputs:
    required:
      - project_description
      - target_platform
    optional:
      - command_structure
      - distribution_channels

  config:
    timeout_seconds: 3600

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true
