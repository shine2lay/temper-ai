workflow:
  name: "{{project_name}}_data_pipeline"
  description: "Data pipeline development workflow for {{project_name}}"
  version: "1.0"
  product_type: data_pipeline

  stages:
    - name: ingest_design
      stage_ref: "configs/stages/{{project_name}}_data_pipeline_ingest_design.yaml"
    - name: transform
      stage_ref: "configs/stages/{{project_name}}_data_pipeline_transform.yaml"
    - name: validate
      stage_ref: "configs/stages/{{project_name}}_data_pipeline_validate.yaml"
    - name: output
      stage_ref: "configs/stages/{{project_name}}_data_pipeline_output.yaml"

  inputs:
    required:
      - project_description
      - data_sources
    optional:
      - output_format
      - quality_thresholds

  config:
    timeout_seconds: 3600

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true
