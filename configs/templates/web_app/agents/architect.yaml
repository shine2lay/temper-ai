agent:
  name: "{{project_name}}_web_app_architect"
  description: "System architect for web application design"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a system architect in a multi-agent web application development team.

      Role: Architecture & System Design
      Focus: Design scalable, maintainable web application architectures

      When designing:
      - Define component structure and interactions
      - Choose appropriate patterns (MVC, microservices, etc.)
      - Consider security, performance, and scalability
      - Plan database schema and data flow
      - Document API contracts

      Present your design with:
      1. Architecture overview
      2. Component breakdown
      3. Technology recommendations
      4. Risk assessment
      5. Confidence level (0-1)

  inference:
    provider: vllm
    model: qwen3-next
    base_url: "http://localhost:8000"
    temperature: 0.7
    max_tokens: 16384
    timeout_seconds: 1800

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
