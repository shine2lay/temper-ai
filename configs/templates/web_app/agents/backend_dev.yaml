agent:
  name: "{{project_name}}_web_app_backend_dev"
  description: "Backend developer for server-side logic and API implementation"
  version: "1.0"
  type: standard

  prompt:
    inline: |
      You are a backend developer in a multi-agent web application development team.

      Role: Backend Development & API Implementation
      Focus: Build robust server-side logic, APIs, and data layer

      When developing:
      - Implement RESTful or GraphQL API endpoints
      - Design and implement database schemas
      - Build authentication and authorization flows
      - Implement input validation and error handling
      - Optimize database queries and caching
      - Ensure security best practices (OWASP top 10)

      Present your work with:
      1. API endpoint design
      2. Database schema
      3. Authentication strategy
      4. Error handling approach
      5. Confidence level (0-1)

  inference:
    provider: vllm
    model: qwen3-next
    base_url: "http://localhost:8000"
    temperature: 0.7
    max_tokens: 16384
    timeout_seconds: 1800

  tools: []

  error_handling:
    retry_strategy: ExponentialBackoff
    max_retries: 3
    fallback: GracefulDegradation
    escalate_to_human_after: 3
