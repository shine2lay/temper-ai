stage:
  name: "{{project_name}}_web_app_code"
  description: "Frontend and backend implementation"
  version: "1.0"

  agents:
    - "{{project_name}}_web_app_frontend_dev"
    - "{{project_name}}_web_app_backend_dev"

  execution:
    agent_mode: parallel
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    tech_stack:
      type: string
      required: true
      description: "Technology stack"

  outputs:
    frontend_code:
      type: dict
      description: "Frontend implementation details"
    backend_code:
      type: dict
      description: "Backend implementation details"
    integration_points:
      type: array
      description: "API integration points between frontend and backend"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.70
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
