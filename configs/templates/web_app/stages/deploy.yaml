stage:
  name: "{{project_name}}_web_app_deploy"
  description: "Deployment planning and execution"
  version: "1.0"

  agents:
    - "{{project_name}}_web_app_devops"

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    tech_stack:
      type: string
      required: true
      description: "Technology stack"
    performance_requirements:
      type: string
      required: false
      description: "Performance and scaling requirements"

  outputs:
    deployment_plan:
      type: dict
      description: "Deployment strategy and infrastructure plan"
    ci_cd_config:
      type: dict
      description: "CI/CD pipeline configuration"
    monitoring_setup:
      type: dict
      description: "Monitoring and alerting configuration"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.70
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
