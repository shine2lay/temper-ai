stage:
  name: "{{project_name}}_web_app_design"
  description: "System and UI/UX design"
  version: "1.0"

  agents:
    - "{{project_name}}_web_app_architect"
    - "{{project_name}}_web_app_frontend_dev"

  execution:
    agent_mode: parallel
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    tech_stack:
      type: string
      required: true
      description: "Technology stack"
    design_guidelines:
      type: string
      required: false
      description: "Design guidelines and constraints"

  outputs:
    architecture:
      type: dict
      description: "System architecture design"
    ui_design:
      type: dict
      description: "UI/UX design specifications"
    component_breakdown:
      type: array
      description: "List of components to build"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.70
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
