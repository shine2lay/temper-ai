stage:
  name: "{{project_name}}_web_app_triage"
  description: "Requirements triage and prioritization"
  version: "1.0"

  agents:
    - "{{project_name}}_web_app_architect"

  execution:
    agent_mode: sequential
    timeout_seconds: 600

  inputs:
    project_description:
      type: string
      required: true
      description: "The project description"
    tech_stack:
      type: string
      required: true
      description: "Technology stack"

  outputs:
    requirements:
      type: dict
      description: "Triaged requirements"
    priorities:
      type: array
      description: "Prioritized feature list"

  collaboration:
    strategy: consensus

  conflict_resolution:
    strategy: HighestConfidenceResolver
    metrics:
      - confidence
    auto_resolve_threshold: 0.85
    escalation_threshold: 0.50

  error_handling:
    on_agent_failure: continue_with_remaining
    min_successful_agents: 1
    retry_failed_agents: true
    max_agent_retries: 2

  quality_gates:
    enabled: true
    min_confidence: 0.70
    require_citations: true
    on_failure: retry_stage
    max_retries: 3
