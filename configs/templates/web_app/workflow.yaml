workflow:
  name: "{{project_name}}_web_app"
  description: "Web application development workflow for {{project_name}}"
  version: "1.0"
  product_type: web_app

  stages:
    - name: triage
      stage_ref: "configs/stages/{{project_name}}_web_app_triage.yaml"
    - name: design
      stage_ref: "configs/stages/{{project_name}}_web_app_design.yaml"
    - name: code
      stage_ref: "configs/stages/{{project_name}}_web_app_code.yaml"
    - name: test
      stage_ref: "configs/stages/{{project_name}}_web_app_test.yaml"
    - name: deploy
      stage_ref: "configs/stages/{{project_name}}_web_app_deploy.yaml"

  inputs:
    required:
      - project_description
      - tech_stack
    optional:
      - design_guidelines
      - performance_requirements

  config:
    timeout_seconds: 3600

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true
