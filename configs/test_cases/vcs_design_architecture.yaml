# Test suite for vcs_design_architecture agent
# Tests the ARCHITECTURE design perspective — produces file structure and execution order.
# Covers: a straightforward feature where the agent must produce the expected output format.

agent_config: configs/agents/vcs_design_architecture.yaml
test_cases:
  - name: produces_architecture_format
    description: "Agent must produce PERSPECTIVE: ARCHITECTURE with FILE_STRUCTURE and EXECUTION_ORDER sections"
    input_vars:
      suggestion_text: "Add a health check endpoint at /api/health"
      triage_output: |
        DECISION: APPROVE
        CATEGORY: feature
        PRIORITY: P2
        EFFORT: small
        CONFIDENCE: 0.93
        REASONING: Minimal scope; standard infrastructure addition.
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*ARCHITECTURE"
      - name: has_file_structure
        pattern: "FILE_STRUCTURE:"
      - name: has_execution_order
        pattern: "EXECUTION_ORDER:"
