# Test suite for vcs_gate_decider agent
# Tests synthesis of gate review perspectives into a final PASS/FAIL verdict.
# Covers: all checks pass for clean code, fail path when a security issue is found.

agent_config: configs/agents/vcs_gate_decider.yaml
test_cases:
  - name: pass_clean_code
    description: "All gate perspectives report PASS; decider should output OVERALL: PASS"
    input_vars:
      team_outputs: |
        --- CORRECTNESS ---
        PERSPECTIVE: CORRECTNESS
        OVERALL: PASS
        SPEC_COMPLIANCE: All endpoints match design spec.
        ACCEPTANCE_CHECKS: GET /api/health returns 200 with {"status": "ok"}.

        --- REGRESSION ---
        PERSPECTIVE: REGRESSION
        OVERALL: PASS
        REGRESSION_CHECKS: No existing tests broken; 3 new tests added.

        --- SECURITY_RUNTIME ---
        PERSPECTIVE: SECURITY_RUNTIME
        OVERALL: PASS
        VULNERABILITIES: None detected.
        COMPILATION_CHECKS: No import errors; all modules load cleanly.
      design_output: |
        FILES:
          - api/health.py
          - tests/test_health.py
        EXECUTION_ORDER: 1. api/health.py, 2. tests
        ACCEPTANCE_CRITERIA: GET /api/health returns HTTP 200 with JSON body {"status": "ok"}
        TECHNICAL_APPROACH: Simple function-based view returning JsonResponse.
      static_check_output: "All checks passed. 0 errors, 0 warnings."
    validators:
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_quality_summary
        pattern: "QUALITY_SUMMARY:"
      - name: has_correctness
        pattern: "correctness:\\s*(PASS|FAIL)"
      - name: has_regression
        pattern: "regression:\\s*(PASS|FAIL)"
      - name: has_security_runtime
        pattern: "security_runtime:\\s*(PASS|FAIL)"

  - name: fail_with_issues
    description: "One gate perspective reports FAIL due to a security issue; decider should output OVERALL: FAIL"
    input_vars:
      team_outputs: |
        --- CORRECTNESS ---
        PERSPECTIVE: CORRECTNESS
        OVERALL: PASS
        SPEC_COMPLIANCE: Endpoint implemented correctly.
        ACCEPTANCE_CHECKS: All acceptance criteria met.

        --- REGRESSION ---
        PERSPECTIVE: REGRESSION
        OVERALL: PASS
        REGRESSION_CHECKS: No regressions detected.

        --- SECURITY_RUNTIME ---
        PERSPECTIVE: SECURITY_RUNTIME
        OVERALL: FAIL
        VULNERABILITIES: SQL injection risk in user_id query parameter — unsanitised string interpolation in db/query.py line 42.
        COMPILATION_CHECKS: Module loads but contains unsafe pattern.
      design_output: |
        FILES:
          - api/users.py
          - db/query.py
        EXECUTION_ORDER: 1. db/query.py, 2. api/users.py
        ACCEPTANCE_CRITERIA: GET /api/users/{id} returns user profile JSON
        TECHNICAL_APPROACH: Query user from DB by ID.
      static_check_output: "1 error: S608 possible SQL injection via string-based query construction (db/query.py:42)"
    validators:
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_quality_summary
        pattern: "QUALITY_SUMMARY:"
      - name: has_correctness
        pattern: "correctness:\\s*(PASS|FAIL)"
      - name: has_regression
        pattern: "regression:\\s*(PASS|FAIL)"
      - name: has_security_runtime
        pattern: "security_runtime:\\s*(PASS|FAIL)"
