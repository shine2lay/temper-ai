# Test suite for vcs_gate_regression agent
# Tests the REGRESSION gate perspective — verifies new code does not break existing behaviour.
# Covers: no regressions detected (PASS), breaking change introduced (FAIL).

agent_config: configs/agents/vcs_gate_regression.yaml
test_cases:
  - name: pass_no_regressions
    description: "New code adds functionality without touching existing behaviour; agent should report OVERALL: PASS"
    input_vars:
      design_output: |
        FILES:
          - api/health.py (new)
          - tests/test_health.py (new)
        EXECUTION_ORDER: 1. api/health.py, 2. tests/test_health.py
        ACCEPTANCE_CRITERIA:
          - GET /api/health returns HTTP 200 with {"status": "ok"}
        TECHNICAL_APPROACH: Additive only — new module, no changes to existing files.
      coder_output: |
        FILES_CREATED:
          - api/health.py
          - tests/test_health.py
        FILES_MODIFIED: []
        SUMMARY: Added new health check endpoint and corresponding test. No existing files modified.
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*REGRESSION"
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_regression_checks
        pattern: "REGRESSION_CHECKS:"

  - name: fail_breaking_change
    description: "Implementation modifies a shared utility function signature, breaking existing callers; agent should report OVERALL: FAIL"
    input_vars:
      design_output: |
        FILES:
          - utils/formatters.py (modify)
          - api/reports.py (modify)
        EXECUTION_ORDER: 1. utils/formatters.py, 2. api/reports.py
        ACCEPTANCE_CRITERIA:
          - Reports are formatted with the new ISO 8601 date format
        TECHNICAL_APPROACH: Update format_date() to accept a timezone argument.
      coder_output: |
        FILES_CREATED: []
        FILES_MODIFIED:
          - utils/formatters.py
          - api/reports.py
        SUMMARY: Changed format_date(date) signature to format_date(date, tz) — required argument. Updated api/reports.py but 4 other callers in api/dashboard.py, api/export.py, notifications/email.py remain unupdated.
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*REGRESSION"
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_regression_checks
        pattern: "REGRESSION_CHECKS:"
