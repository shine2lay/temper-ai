# Test suite for vcs_gate_security_runtime agent
# Tests the SECURITY_RUNTIME gate perspective — scans for vulnerabilities and runtime issues.
# Covers: clean secure code (PASS), SQL injection vulnerability detected (FAIL).

agent_config: configs/agents/vcs_gate_security_runtime.yaml
test_cases:
  - name: pass_secure_code
    description: "Implementation uses parameterised queries and safe patterns; agent should report OVERALL: PASS"
    input_vars:
      coder_output: |
        FILES_CREATED:
          - api/health.py
          - tests/test_health.py
        SUMMARY: |
          Implemented GET /api/health. Uses no database access. Returns static JSON.
          No user input is processed. All imports are from stdlib and internal modules.
          Code:
            async def health_check(request):
                return JsonResponse({"status": "ok"})
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*SECURITY_RUNTIME"
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_vulnerabilities
        pattern: "VULNERABILITIES:"
      - name: has_compilation_checks
        pattern: "COMPILATION_CHECKS:"

  - name: fail_security_issue
    description: "Implementation uses unsafe string interpolation in SQL query; agent should report OVERALL: FAIL"
    input_vars:
      coder_output: |
        FILES_CREATED:
          - api/search.py
          - tests/test_search.py
        SUMMARY: |
          Implemented GET /api/search?q=<term> endpoint.
          Code in api/search.py line 18:
            query = f"SELECT * FROM products WHERE name LIKE '%{search_term}%'"
            results = db.execute(query)
          Used f-string interpolation directly into SQL — quick to write but not parameterised.
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*SECURITY_RUNTIME"
      - name: has_overall
        pattern: "OVERALL:\\s*(PASS|FAIL)"
      - name: has_vulnerabilities
        pattern: "VULNERABILITIES:"
      - name: has_compilation_checks
        pattern: "COMPILATION_CHECKS:"
