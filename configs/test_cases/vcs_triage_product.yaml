# Test suite for vcs_triage_product agent
# Tests the PRODUCT_VISION perspective for feature triage.
# Covers: approve for roadmap-aligned feature, reject for misaligned/off-brand feature.

agent_config: configs/agents/vcs_triage_product.yaml
test_cases:
  - name: approve_aligned_feature
    description: "Feature aligns with product roadmap; agent should APPROVE with structured output"
    input_vars:
      suggestion_text: "Add export to PDF functionality for reports"
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*PRODUCT_VISION"
      - name: has_recommendation
        pattern: "RECOMMENDATION:\\s*(APPROVE|REJECT)"
      - name: has_confidence
        pattern: "CONFIDENCE:\\s*[01]?\\.\\d+"
      - name: has_category
        pattern: "CATEGORY:\\s*(feature|ui_change|bug_fix|improvement|infrastructure|duplicate)"
      - name: has_priority
        pattern: "PRIORITY:\\s*P[0-3]"
      - name: has_reasoning
        pattern: "REASONING:"

  - name: reject_misaligned_feature
    description: "Feature is off-brand and not aligned with product vision; agent should REJECT"
    input_vars:
      suggestion_text: "Add a cryptocurrency mining module"
      workspace_path: "/tmp/test_workspace"
    validators:
      - name: has_perspective
        pattern: "PERSPECTIVE:\\s*PRODUCT_VISION"
      - name: has_recommendation
        pattern: "RECOMMENDATION:\\s*(APPROVE|REJECT)"
      - name: has_confidence
        pattern: "CONFIDENCE:\\s*[01]?\\.\\d+"
      - name: has_category
        pattern: "CATEGORY:\\s*(feature|ui_change|bug_fix|improvement|infrastructure|duplicate)"
      - name: has_priority
        pattern: "PRIORITY:\\s*P[0-3]"
      - name: has_reasoning
        pattern: "REASONING:"
