workflow:
  name: code_review
  description: |
    Parallel code review with leader synthesis, then improvement.
    Demonstrates: parallel strategy, leader pattern, structured output.
    Two reviewers analyze independently → leader decides verdict → improver fixes issues.
  defaults:
    provider: openai         # change to: anthropic, ollama, vllm
    model: gpt-4o-mini      # change to match your provider's model
  safety:
    policies:
      - type: budget
        max_cost_usd: 3.00
  nodes:
    - name: review
      type: stage
      strategy: leader
      agents:
        - code_analyst
        - security_reviewer
        - agent: reviewer
          role: leader
          task_template: |
            You received reviews from multiple specialists.

            Their findings:
            {{ other_agents }}

            Original code:
            {{ task }}

            Synthesize their findings into a final verdict.
            Output as JSON:
            {
              "verdict": "PASS" or "NEEDS_CHANGES",
              "critical_issues": ["..."],
              "suggestions": ["..."],
              "summary": "..."
            }

    - name: improve
      type: agent
      agent: code_improver
      depends_on: [review]
      input_map:
        review: review.output
