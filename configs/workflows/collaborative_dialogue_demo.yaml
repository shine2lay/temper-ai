workflow:
  name: collaborative_dialogue_demo
  description: "Collaborative multi-round dialogue with researcher, analyst, systems thinker, and decision maker"
  version: "1.0"
  product_type: data_product

  stages:
    - name: collaborative_dialogue
      stage_ref: configs/stages/collaborative_dialogue.yaml
      inputs:
        topic: "{{ workflow.inputs.topic }}"
        context: "{{ workflow.inputs.context }}"
        constraints: "{{ workflow.inputs.constraints }}"

      on_success:
        action: continue
      on_failure:
        action: escalate

  error_handling:
    on_stage_failure: retry
    max_stage_retries: 1
    escalation_policy: GracefulDegradation
    enable_rollback: false

  inputs:
    required:
      - topic
    optional:
      - context
      - constraints

  outputs:
    - name: final_decision
      description: "Collaborative decision"
      source: collaborative_dialogue.decision

    - name: dialogue_transcript
      description: "Complete dialogue history"
      source: collaborative_dialogue.dialogue_history

    - name: convergence_info
      description: "Convergence metrics"
      source: collaborative_dialogue.convergence_info

  execution:
    timeout_seconds: 3600
    parallel_execution: false
    allow_early_termination: true

  observability:
    trace_all_decisions: true
    track_collaboration_events: true
    log_level: INFO

  tags:
    - dialogue
    - collaborative
    - multi-round

  use_cases:
    - "System design decisions"
    - "Caching strategy design"
    - "Architecture planning"
