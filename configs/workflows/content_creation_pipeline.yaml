workflow:
  name: content_creation_pipeline
  description: "Content creation pipeline from research to publication-ready output"
  version: "1.0"

  inputs:
    required:
      - topic
      - content_type
      - target_audience
    optional:
      - word_count_target
      - tone_preference
      - key_points
      - sources

  stages:
    - stage_ref: configs/stages/research_fact_checking.yaml
      name: research_fact_checking
      description: "Research and verify information"

    - stage_ref: configs/stages/content_writing.yaml
      name: content_writing
      description: "Write and structure content"
      depends_on:
        - research_fact_checking

    - stage_ref: configs/stages/review_polish.yaml
      name: review_polish
      description: "Review, edit, and finalize content"
      depends_on:
        - content_writing

  outputs:
    primary:
      - final_content
      - publication_status
    secondary:
      - research_summary
      - fact_check_results
      - editorial_feedback
      - quality_score

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true
