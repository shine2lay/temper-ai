# Context Management Test Workflow
# 3-stage sequential pipeline: analyze -> evaluate -> synthesize
# Each stage uses source refs for selective context injection.

workflow:
  name: context_test
  description: "Test workflow for stage-level context management with source refs"
  version: "1.0"

  stages:
    - name: ctx_analyze
      stage_ref: configs/stages/ctx_analyze.yaml
      input_map:
        input_text: "workflow.input_text"

    - name: ctx_evaluate
      stage_ref: configs/stages/ctx_evaluate.yaml
      depends_on: [ctx_analyze]
      input_map:
        findings: "ctx_analyze.output"
        severity: "ctx_analyze.structured.severity"
        original_text: "workflow.input_text"

    - name: ctx_synthesize
      stage_ref: configs/stages/ctx_synthesize.yaml
      depends_on: [ctx_analyze, ctx_evaluate]
      input_map:
        input_text: "workflow.input_text"
        recommendation: "ctx_evaluate.output"
        severity: "ctx_analyze.structured.severity"

  inputs:
    required:
      - input_text

  outputs:
    - name: final_report
      description: "Synthesized final report"
      source: ctx_synthesize.output

    - name: severity
      description: "Identified severity level"
      source: ctx_analyze.structured.severity

    - name: recommendation
      description: "Evaluation recommendation"
      source: ctx_evaluate.output

  config:
    timeout_seconds: 3000
    convergence_detection: false

  context_management:
    extraction:
      enabled: true
      provider: vllm
      model: qwen3-next
      timeout_seconds: 30

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true

  tags:
    - test
    - context-management
    - source-refs
