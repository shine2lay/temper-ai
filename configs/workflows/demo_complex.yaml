workflow:
  name: demo_complex
  description: |
    Full showcase: parallel entry, fan-out, fan-in, all strategy types, tool-using agents.
    [analyze, research] → [implement(parallel), design(sequential)] → integrate → review(leader) → ship
  version: "1.0"
  nodes:
    # ── Layer 1: Parallel entry ──────────────────────────────────────
    # Two agents start simultaneously with no dependencies.
    - name: analyze
      type: agent
      agent: planner
      task_template: |
        Task: {{ task }}
        Create a brief technical plan with components and architecture.
        Output as JSON: {"components": [...], "approach": "...", "key_decisions": [...]}

    - name: research
      type: agent
      agent: researcher
      task_template: |
        Research task: {{ task }}
        Investigate existing solutions, libraries, and patterns.
        Use the Calculator tool to estimate LOC for each component.
        Output as JSON: {"findings": [...], "recommended_stack": "...", "estimated_loc": 0}

    # ── Layer 2: Fan-out into stages ─────────────────────────────────
    # Each branch receives upstream output via auto-injected `other_agents`.

    # 2a. Parallel stage: frontend + backend implement concurrently
    - name: implement
      type: stage
      strategy: parallel
      depends_on: [analyze]
      agents:
        - agent: frontend_dev
          task_template: |
            Build the frontend for: {{ task }}

            Architecture plan from the team:
            {{ other_agents }}

            Write React/TypeScript components. Be concise — key files only.
        - agent: backend_dev
          task_template: |
            Build the backend for: {{ task }}

            Architecture plan from the team:
            {{ other_agents }}

            Write Python/FastAPI endpoints and models. Be concise — key files only.

    # 2b. Sequential stage: UX designs first, then UI implements the designs
    - name: design
      type: stage
      strategy: sequential
      depends_on: [research]
      agents:
        - agent: ux_designer
          task_template: |
            Design UX for: {{ task }}

            Research findings from the team:
            {{ other_agents }}

            Create user flows and wireframe descriptions.
            Output as JSON: {"screens": [...], "flows": [...]}
        - agent: ui_builder
          task_template: |
            Translate these UX wireframes into Tailwind CSS components:

            {{ previous_output }}

            Output concrete component markup for each screen.

    # ── Layer 3: Fan-in ──────────────────────────────────────────────
    # Integrator receives output from BOTH branches.
    - name: integrate
      type: agent
      agent: integrator
      depends_on: [implement, design]
      task_template: |
        Integrate all team outputs for: {{ task }}

        Work from the team:
        {{ other_agents }}

        Synthesize into a unified implementation.
        Output as JSON: {"integration_steps": [...], "conflicts": [...], "architecture": "..."}

    # ── Layer 4: Leader review gate ──────────────────────────────────
    # Security + perf reviewers run in parallel, then leader decides.
    - name: review
      type: stage
      strategy: leader
      depends_on: [integrate]
      agents:
        - agent: security_reviewer
          task_template: |
            Review this implementation for security issues:

            {{ other_agents }}

            Output JSON: {"risk_level": "low/medium/high/critical", "vulnerabilities": [...], "recommendations": [...]}
        - agent: perf_reviewer
          task_template: |
            Review this implementation for performance issues:

            {{ other_agents }}

            Output JSON: {"grade": "A/B/C/D/F", "bottlenecks": [...], "optimizations": [...]}
        - agent: tech_lead
          name: tech_lead
          role: leader
          task_template: |
            Make the final shipping decision based on these reviews:

            {{ other_agents }}

            Output JSON: {"verdict": "SHIP" or "BLOCK", "summary": "...", "conditions": [...]}

    # ── Layer 5: Ship ────────────────────────────────────────────────
    - name: ship
      type: agent
      agent: shipper
      depends_on: [review]
      task_template: |
        Generate deployment artifacts for: {{ task }}

        Review decision:
        {{ other_agents }}

        Write a brief changelog and deployment summary.
