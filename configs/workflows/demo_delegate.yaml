workflow:
  name: demo_delegate
  description: |
    Demo: coordinator delegates to researchers (mid-agent), then the
    workflow continues to a summarizer that receives the coordinator's output.
  defaults:
    provider: openai         # change to: anthropic, ollama, vllm
    model: gpt-4o-mini      # change to match your provider's model
  nodes:
    - name: research
      type: agent
      agent: demo_coordinator

    - name: summarize
      type: agent
      agent: demo_summarizer
      depends_on: [research]
      input_map:
        synthesis: research.output
