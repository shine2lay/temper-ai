workflow:
  name: demo_with_stages
  description: "Plan → Code (parallel) → Review: demonstrates stage nodes"
  version: "1.0"
  nodes:
    - name: plan
      type: agent
      agent: planner

    - name: code
      type: stage
      strategy: parallel
      depends_on: [plan]
      agents:
        - coder
        - coder_b

    - name: review
      type: agent
      agent: reviewer
      depends_on: [code]
