# Dynamic Forward Routing Demo — demonstrates _next_stage for branching
#
# Usage:
#   maf run configs/workflows/dynamic_forward_demo.yaml --input examples/dynamic_forward_demo_input.yaml --show-details
#
# Flow:
#   1. classify stage → classifies question as CODE or DESIGN
#   2. classifier emits _next_stage → routes to demo_forward_code OR demo_forward_design
#   3. only the targeted specialist runs (the other is skipped via condition: False)
#
# This demonstrates forward-pass dynamic edges (routing to different branches)
# rather than backward retry loops.

workflow:
  name: dynamic_forward_demo
  description: "Demo of dynamic forward routing — classifier routes to specialist branches"
  version: "1.0"
  engine: dynamic

  stages:
    - name: demo_forward_classify
      stage_ref: configs/stages/demo_forward_classify.yaml
      description: "Classifies question and routes to appropriate specialist"

    - name: demo_forward_code
      stage_ref: configs/stages/demo_forward_code.yaml
      description: "Code specialist — only runs if classifier routes here"
      depends_on:
        - demo_forward_classify
      conditional: true
      condition: "{{ False }}"

    - name: demo_forward_design
      stage_ref: configs/stages/demo_forward_design.yaml
      description: "Design specialist — only runs if classifier routes here"
      depends_on:
        - demo_forward_classify
      conditional: true
      condition: "{{ False }}"

  context_management:
    extraction:
      enabled: true
      provider: vllm
      model: qwen3-next
      base_url: http://localhost:8000
      timeout_seconds: 30

  inputs:
    required:
      - question
    optional: []

  outputs:
    - name: classification
      description: "Question category"
      source: demo_forward_classify.classification
    - name: answer
      description: "Specialist answer (from whichever expert was routed to)"
      source: demo_forward_code.answer

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: false

  execution:
    timeout_seconds: 3600
    max_stages: 8
    parallel_execution: false

  observability:
    trace_all_decisions: true
    log_level: INFO
    metrics_enabled: true

  tags:
    - demo
    - dynamic-edge
    - forward-routing
    - native-engine
