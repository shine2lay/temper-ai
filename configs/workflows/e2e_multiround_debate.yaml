# End-to-End Multi-Round Debate Workflow
# Purpose: Demonstrate multi-round debate with convergence
# Usage: python3 examples/e2e_yaml_debate.py (with this config)

workflow:
  name: e2e_multiround_debate
  description: "Multi-round debate workflow with convergence detection"
  version: "1.0"

  # Workflow metadata
  lifecycle_type: decision_making
  product_type: debate_decision

  # LLM provider configuration
  llm_provider:
    provider: ollama
    base_url: http://localhost:11434
    model: llama3.3:latest
    temperature: 0.7
    max_tokens: 500
    timeout: 120

  # Workflow stages
  stages:
    - name: multiround_debate
      config_path: configs/stages/e2e_debate_multiround.yaml
      inputs:
        scenario: "{{ workflow.inputs.scenario }}"
        options: "{{ workflow.inputs.options }}"
        context: "{{ workflow.inputs.context }}"

      on_success:
        action: continue

      on_failure:
        action: halt

  # Workflow inputs
  inputs:
    required:
      - scenario
      - options
    optional:
      - context

  # Workflow outputs
  outputs:
    - name: final_decision
      description: "Final consensus decision after debate"
      source: multiround_debate.decision

    - name: debate_history
      description: "Complete debate history across rounds"
      source: multiround_debate.debate_history

    - name: convergence_metrics
      description: "How agents converged over rounds"
      source: multiround_debate.convergence_metrics

    - name: execution_trace
      description: "Complete execution trace"
      fields:
        - agents_executed
        - total_tokens
        - total_latency_ms
        - rounds_completed
        - convergence_achieved

  # Execution settings
  execution:
    timeout_seconds: 600
    parallel_execution: false
    allow_early_termination: true

  # Observability
  observability:
    trace_all_decisions: true
    track_collaboration_events: true
    track_convergence: true
    log_level: INFO

  # Metadata
  tags:
    - e2e-demo
    - multi-round-debate
    - convergence
    - milestone-3

  use_cases:
    - "Demonstrate multi-round agent debate"
    - "Show convergence detection in action"
    - "Template for complex decision workflows"

  notes:
    - "Uses debate_and_synthesize strategy"
    - "Agents reconsider positions based on others' arguments"
    - "Stops early if convergence reached"
    - "Tracks mind changes across rounds"

  created_by: m3-e2e-demo
  created_at: "2026-01-27"
