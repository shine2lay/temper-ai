# End-to-End Simple Debate Workflow
# Purpose: Demonstrate complete YAML → Execution → Output pipeline
# Usage: python3 examples/e2e_yaml_debate.py

workflow:
  name: e2e_simple_debate
  description: "Simple multi-agent debate workflow (E2E demo)"
  version: "1.0"

  # Workflow metadata
  lifecycle_type: decision_making
  product_type: consensus_decision

  # LLM provider configuration
  llm_provider:
    provider: ollama
    base_url: http://localhost:11434
    model: llama3.3:latest
    temperature: 0.7
    max_tokens: 500
    timeout: 600  # 10 minutes

  # Workflow stages
  stages:
    - name: simple_debate
      config_path: configs/stages/e2e_simple_debate_stage.yaml
      inputs:
        scenario: "{{ workflow.inputs.scenario }}"
        options: "{{ workflow.inputs.options }}"
        context: "{{ workflow.inputs.context }}"

      on_success:
        action: continue

      on_failure:
        action: halt

  # Workflow inputs
  inputs:
    required:
      - scenario
      - options
    optional:
      - context

  # Workflow outputs
  outputs:
    - name: final_decision
      description: "Final consensus decision"
      source: simple_debate.decision

    - name: agent_perspectives
      description: "Individual agent outputs"
      source: simple_debate.agent_outputs

    - name: synthesis_metadata
      description: "Consensus details (votes, confidence)"
      source: simple_debate.synthesis_metadata

    - name: execution_trace
      description: "Complete execution trace"
      fields:
        - agents_executed
        - total_tokens
        - total_latency_ms
        - timestamps

  # Execution settings
  execution:
    timeout_seconds: 3000
    parallel_execution: false
    allow_early_termination: false

  # Observability
  observability:
    trace_all_decisions: true
    track_collaboration_events: true
    log_level: INFO

  # Metadata
  tags:
    - e2e-demo
    - simple-debate
    - consensus
    - milestone-3

  use_cases:
    - "E2E demonstration of YAML-driven workflows"
    - "Template for building your own M3 workflows"

  notes:
    - "Simplified config for demonstration"
    - "Uses consensus strategy (no multi-round debate)"
    - "Single stage for simplicity"

  created_by: m3-e2e-demo
  created_at: "2026-01-27"
