# Hello World — the simplest Temper AI workflow
#
# Two stages: analyze a topic, then summarize the findings.
#
# Usage:
#   curl -X POST localhost:8420/api/runs \
#     -d '{"workflow": "configs/workflows/hello_world.yaml", "input_file": "examples/hello_world_input.yaml"}'

workflow:
  name: hello_world
  description: "Minimal two-stage workflow — analyze a topic, then summarize"
  version: "1.0"

  stages:
    - name: analyze
      stage_ref: configs/stages/hello_analyze.yaml

    - name: summarize
      stage_ref: configs/stages/hello_summarize.yaml

  inputs:
    required:
      - topic

  outputs:
    - name: insights
      description: "Key insights from analysis"
      source: analyze.insights

    - name: summary
      description: "Brief summary"
      source: summarize.summary

  config:
    timeout_seconds: 600

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 1
    escalation_policy: LogAndContinue

  tags:
    - hello-world
    - beginner
