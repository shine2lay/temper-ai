workflow:
  name: layer1_experiment
  description: |
    Layer 1 validation: Can a single agent with tools reliably build
    a small Expo React Native app over 15+ tool-calling iterations?
  defaults:
    provider: vllm
    model: qwen3-next
  safety:
    policies:
      - type: budget
        max_tokens: 500000
  nodes:
    - name: build_app
      type: agent
      agent: expo_builder
