workflow:
  name: lifecycle_demo
  description: "Demo workflow for self-modifying lifecycle adaptation"
  product_type: web_app
  lifecycle:
    enabled: true
    profile: lean_small_projects
    auto_classify: true
  stages:
    - name: triage
      stage_ref: configs/stages/decision.yaml
    - name: design
      stage_ref: configs/stages/decision.yaml
    - name: implement
      stage_ref: configs/stages/decision.yaml
    - name: test
      stage_ref: configs/stages/decision.yaml
  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: temper_ai.safety.action_policy_engine.ActionPolicyEngine
    enable_rollback: true
  config:
    max_iterations: 10
    timeout_seconds: 1800
