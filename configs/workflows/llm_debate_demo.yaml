# LLM-Powered Debate Workflow
# Purpose: Real LLM-powered multi-round debate with mind-changing
# Features: Actual LLM calls, autonomous decision-making, convergence detection

workflow:
  name: llm_debate_demo
  description: "Real LLM agents debating with multi-round convergence"
  version: "2.0"
  product_type: data_product

  stages:
    - name: llm_debate
      stage_ref: configs/stages/quick_debate.yaml
      inputs:
        topic: "{{ workflow.inputs.topic }}"
        context: "{{ workflow.inputs.context }}"

      on_success:
        action: continue
      on_failure:
        action: escalate

  error_handling:
    on_stage_failure: retry
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: false

  inputs:
    required:
      - topic
    optional:
      - context

  outputs:
    - name: final_decision
      description: "Consensus decision after LLM debate"
      source: llm_debate.decision

    - name: debate_transcript
      description: "Complete debate with LLM prompts and responses"
      source: llm_debate.debate_history

    - name: convergence_metrics
      description: "Convergence and performance metrics"
      source: llm_debate.convergence_info

  execution:
    timeout_seconds: 3000
    parallel_execution: false
    allow_early_termination: true

  observability:
    trace_all_decisions: true
    track_collaboration_events: true
    log_level: DEBUG

  tags:
    - decision-making
    - debate
    - llm-powered
    - convergence

  use_cases:
    - "Product launch timing decisions"
    - "Architecture decisions with real reasoning"
    - "Strategic planning with autonomous agents"
