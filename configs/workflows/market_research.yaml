# Market Research Workflow Configuration
# Purpose: End-to-end market research with web search capabilities

workflow:
  name: market_research
  description: "Market research workflow with web search tools for real-time data gathering"
  version: "1.0"
  product_type: data_product

  # Workflow stages
  stages:
    - name: market_research
      stage_ref: configs/stages/market_research.yaml

  # Error handling configuration
  error_handling:
    on_stage_failure: retry
    max_stage_retries: 2
    escalation_policy: "default"
    enable_rollback: false

  # Workflow inputs
  inputs:
    required:
      - topic
    optional:
      - focus_areas

  # Workflow outputs
  outputs:
    - name: findings
      description: "Market research findings and analysis"
      source: market_research.findings

    - name: sources
      description: "Sources referenced during research"
      source: market_research.sources

    - name: metadata
      description: "Workflow execution metadata"
      fields:
        - execution_time
        - confidence_score
        - stages_completed

  # Workflow-level safety
  safety:
    mode: execute
    risk_level: low
    require_approval: false

  # Execution settings
  execution:
    timeout_seconds: 3600
    max_stages: 10
    parallel_execution: false

  # Observability settings
  observability:
    trace_all_decisions: true
    log_level: INFO
    metrics_enabled: true

  # Metadata
  tags:
    - market-research
    - web-search

  use_cases:
    - "Market size and growth analysis"
    - "Competitive landscape research"
    - "Technology trend evaluation"
    - "Pricing model analysis"
