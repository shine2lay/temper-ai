workflow:
  name: multi_stage_decision_pipeline
  description: "Multi-stage decision pipeline with research, design, and evaluation phases"
  version: "1.0"

  inputs:
    required:
      - problem_statement
      - context
    optional:
      - constraints
      - timeline

  stages:
    - stage_ref: configs/stages/research_analysis.yaml
      name: research_analysis
      description: "Gather information and analyze the problem"

    - stage_ref: configs/stages/design_planning.yaml
      name: design_planning
      description: "Generate and plan solution options"
      depends_on:
        - research_analysis

    - stage_ref: configs/stages/evaluation_decision.yaml
      name: evaluation_decision
      description: "Evaluate options and make final decision"
      depends_on:
        - design_planning

  outputs:
    primary:
      - final_decision
      - rationale
    secondary:
      - research_findings
      - solution_options
      - risk_assessment

  config:
    timeout_seconds: 3000

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true
