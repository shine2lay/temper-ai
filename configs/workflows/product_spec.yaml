workflow:
  name: product_spec
  description: |
    Full product spec pipeline with multi-stage collaboration and memory.
    Demonstrates: parallel research, leader-pattern design, cross-stage memory,
    structured output, and input_map wiring.

    Stage 1 — Research (parallel): market researcher + technical researcher run independently
    Stage 2 — Design (leader): product architect proposes, UX researcher critiques, architect finalizes
    Stage 3 — Spec: writer produces PRD using design output + recalled memories from research
  defaults:
    provider: vllm          # change to match your .env (openai, ollama, etc.)
    model: qwen3-next       # change to your model
  safety:
    policies:
      - type: budget
        max_cost_usd: 5.00
  nodes:
    # Stage 1: Parallel research — market and technical run simultaneously
    - name: research
      type: stage
      strategy: parallel
      agents:
        - market_researcher
        - technical_researcher

    # Stage 2: Design with leader pattern
    # Architect proposes design using research, UX researcher critiques,
    # architect synthesizes into final design
    - name: design
      type: stage
      strategy: leader
      depends_on: [research]
      agents:
        - agent: product_architect
          role: leader
          task_template: |
            Product idea: {{ task }}

            Market research:
            {{ other_agents }}

            Design the product with features, user flows, and architecture.
            Output as JSON with: value_proposition, features, user_flows, architecture
        - ux_researcher

    # Stage 3: Spec writer uses design + recalls memories stored by researchers
    - name: spec
      type: agent
      agent: spec_writer
      depends_on: [design]
      input_map:
        design: design.output
