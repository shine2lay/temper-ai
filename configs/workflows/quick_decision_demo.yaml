workflow:
  name: quick_decision_demo
  description: "Fast 3-agent decision making for everyday choices"
  version: "1.0"
  # product_type is optional - omitted for decision support workflows

  # Simple workflow with one decision stage
  stages:
    - name: decision
      stage_ref: configs/stages/decision.yaml

  # Easy to use inputs
  inputs:
    required:
      - question  # e.g., "Should we launch the product now or wait?"
      - options   # e.g., ["Launch Now", "Wait 1 Month", "Beta Release"]
    optional:
      - context   # Additional context for the decision

  # Clear outputs
  outputs:
    - name: decision
      description: "The recommended choice"
      source: decision.final_decision

    - name: confidence
      description: "Confidence score (0-1)"
      source: decision.confidence

    - name: reasoning
      description: "Why this decision was made"
      source: decision.reasoning

  # Fast execution
  config:
    timeout_seconds: 3000
    convergence_detection: false

  # Error handling
  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  # Full observability
  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true

  tags:
    - demo
    - quick
    - decision-making
    - beginner-friendly

  use_cases:
    - "Product launch timing"
    - "Feature prioritization"
    - "Technology selection"
    - "Hiring decisions"
