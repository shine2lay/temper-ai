workflow:
  name: refinement_decision_demo
  description: "Decision workflow with refinement — critique loop improves each iteration"
  version: "1.0"

  stages:
    - name: decision
      stage_ref: configs/stages/decision.yaml

  inputs:
    required:
      - question
      - options
    optional:
      - context

  outputs:
    - name: decision
      description: "The recommended choice"
      source: decision.final_decision

    - name: confidence
      description: "Confidence score (0-1)"
      source: decision.confidence

    - name: reasoning
      description: "Why this decision was made"
      source: decision.reasoning

  # Refinement optimizer: run → evaluate → LLM critique → re-run with feedback.
  # The critique is injected as "_optimization_critique" into workflow_inputs,
  # which agents see as "## Optimization Critique" in their prompt context.
  # max_iterations=2 means: initial run + up to 2 refinement attempts.
  optimization:
    enabled: true
    evaluators:
      quality_check:
        type: criteria
        checks:
          - name: has_decision
            method: programmatic
            command: "python3 scripts/checks/has_decision.py"
            timeout: 30
          - name: has_detailed_reasoning
            method: programmatic
            command: "python3 scripts/checks/has_detailed_reasoning.py"
            timeout: 30
          - name: has_agent_agreement
            method: programmatic
            command: "python3 scripts/checks/has_agent_agreement.py"
            timeout: 30
          - name: has_high_confidence
            method: programmatic
            command: "python3 scripts/checks/has_high_confidence.py"
            timeout: 30
    pipeline:
      - optimizer: refinement
        evaluator: quality_check
        max_iterations: 2

  config:
    timeout_seconds: 3000
    convergence_detection: false

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  observability:
    console_mode: standard
    trace_everything: true
    export_format: ["json"]
    generate_dag_visualization: false
    waterfall_in_console: true

  tags:
    - demo
    - optimization
    - refinement
    - decision-making
