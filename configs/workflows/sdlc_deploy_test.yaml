# SDLC Deploy Pipeline — Validate, Plan, Code, Verify, Push
#
# Pipeline (10 nodes):
#   sdlc_validate → sdlc_duplicate_check → sdlc_git_clone → sdlc_plan → sdlc_code
#   → sdlc_static_checks → sdlc_quality_review → sdlc_test_runner → sdlc_git_push
#   → sdlc_verify_deploy → sdlc_cleanup
#
#   Pre-checkout gates (no workspace needed):
#     sdlc_validate: collaborative stage (content + safety agents → decider) — halts on REJECT
#     sdlc_duplicate_check: checks against recent runs — halts on FAIL
#   Checks loop back to sdlc_plan on FAIL (max 3 iterations)
#   git_push only runs if test_runner passes; cleanup always runs
#
# Usage:
#   curl -X POST localhost:8420/api/runs -H "Content-Type: application/json" \
#     -d '{"workflow": "configs/workflows/sdlc_deploy_test.yaml", "inputs": {"repo_url": "git@github.com:shine2lay/agentic-sdlc-demo.git", "task_description": "...", "recent_runs": "..."}}'

workflow:
  name: sdlc_deploy_test
  description: "Validate → Dedup → Clone → Plan → Code → Static Checks → Quality Review → Test → Push"

  defaults:
    provider: vllm
    model: qwen3-next

  safety:
    policies:
      - type: budget
        max_cost_usd: 10.00

  nodes:
    - name: sdlc_validate
      type: stage
      strategy: leader
      agents: [sdlc_validate_content, sdlc_validate_safety, sdlc_validate_decider]
      input_map:
        task_description: workflow.task_description

    - name: sdlc_duplicate_check
      type: agent
      agent: sdlc_duplicate_check
      depends_on: [sdlc_validate]
      condition:
        source: sdlc_validate.structured.validation_result
        operator: equals
        value: ACCEPT
      input_map:
        task_description: workflow.task_description
        recent_runs: workflow.recent_runs

    - name: sdlc_git_clone
      type: agent
      agent: sdlc_git_clone
      depends_on: [sdlc_duplicate_check]
      condition:
        source: sdlc_duplicate_check.structured.duplicate_check
        operator: equals
        value: PASS
      input_map:
        repo_url: workflow.repo_url

    - name: sdlc_plan
      type: agent
      agent: sdlc_plan
      depends_on: [sdlc_git_clone]
      condition:
        source: sdlc_duplicate_check.structured.duplicate_check
        operator: equals
        value: PASS
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path
        task_description: workflow.task_description
        static_check_output: sdlc_static_checks.structured.check_details
        quality_review_output: sdlc_quality_review.output
        test_runner_output: sdlc_test_runner.structured.test_details
        deploy_errors: sdlc_verify_deploy.structured.deploy_errors

    - name: sdlc_code
      type: agent
      agent: sdlc_code
      depends_on: [sdlc_plan]
      condition:
        source: sdlc_duplicate_check.structured.duplicate_check
        operator: equals
        value: PASS
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path
        implementation_plan: sdlc_plan.output

    - name: sdlc_static_checks
      type: agent
      agent: sdlc_static_checks
      depends_on: [sdlc_code]
      condition:
        source: sdlc_duplicate_check.structured.duplicate_check
        operator: equals
        value: PASS
      loop_to: sdlc_plan
      max_loops: 3
      loop_condition:
        source: sdlc_static_checks.structured.check_result
        operator: equals
        value: FAIL
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path

    - name: sdlc_quality_review
      type: agent
      agent: sdlc_quality_review
      depends_on: [sdlc_static_checks]
      condition:
        source: sdlc_static_checks.structured.check_result
        operator: equals
        value: PASS
      loop_to: sdlc_plan
      max_loops: 3
      loop_condition:
        source: sdlc_quality_review.output
        operator: contains
        value: "OVERALL: FAIL"
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path
        task_description: workflow.task_description
        implementation_plan: sdlc_plan.output

    - name: sdlc_test_runner
      type: agent
      agent: sdlc_test_runner
      depends_on: [sdlc_quality_review]
      condition:
        source: sdlc_static_checks.structured.check_result
        operator: equals
        value: PASS
      loop_to: sdlc_plan
      max_loops: 3
      loop_condition:
        source: sdlc_test_runner.structured.test_result
        operator: equals
        value: FAIL
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path

    - name: sdlc_git_push
      type: agent
      agent: sdlc_git_push
      depends_on: [sdlc_test_runner]
      condition:
        source: sdlc_test_runner.structured.test_result
        operator: equals
        value: PASS
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path
        commit_message: sdlc_plan.structured.commit_message
        heroku_git_url: workflow.heroku_git_url

    - name: sdlc_verify_deploy
      type: agent
      agent: sdlc_verify_deploy
      depends_on: [sdlc_git_push]
      condition:
        source: sdlc_git_push.structured.push_status
        operator: equals
        value: success
      loop_to: sdlc_plan
      max_loops: 2
      loop_condition:
        source: sdlc_verify_deploy.structured.verify_result
        operator: equals
        value: FAIL
      input_map:
        app_url: workflow.app_url
        heroku_api_key: workflow.heroku_api_key
        heroku_app_name: workflow.heroku_app_name
        commit_hash: sdlc_git_push.structured.commit_hash
        workspace_path: sdlc_git_clone.structured.workspace_path

    - name: sdlc_cleanup
      type: agent
      agent: sdlc_cleanup
      depends_on: [sdlc_verify_deploy]
      input_map:
        workspace_path: sdlc_git_clone.structured.workspace_path
