# SDLC Deploy Pipeline v2 — Multi-perspective, Test-First
#
# 11 stages, 19 agents, 3 strategies (leader, parallel, sequential)
#
# Gate 1: validate (leader: feasibility + safety → decider)
# Gate 2: plan (leader: architect + critic → decider)
# Gate 3: review (leader: syntax + tests + diff → decider)
#
# Pipeline:
#   validate → dedup → clone → analyze(parallel) → plan(leader) → build(sequential) → review(leader)
#                                                                    ↑                        |
#                                                                    └────── loop_to ─────────┘
#   → push → verify_deploy(parallel) → cleanup

workflow:
  name: sdlc_deploy_test
  description: |
    Multi-perspective SDLC pipeline with test-first development.
    Three quality gates with independent reviewers at each stage.
  defaults:
    provider: vllm
    model: qwen3-next
  safety:
    policies:
      - type: budget
        max_cost_usd: 10.00

  nodes:
    # ═══ GATE 1: Should we build this? ═══
    - name: validate
      type: stage
      strategy: leader
      agents:
        - sdlc_feasibility_analyst
        - sdlc_safety_reviewer
        - agent: sdlc_product_decider
          role: leader

    - name: dedup
      type: agent
      agent: sdlc_dedup_checker
      depends_on: [validate]
      condition:
        source: validate.structured.validation_result
        operator: equals
        value: ACCEPT
      input_map:
        task_description: workflow.task_description
        recent_runs: workflow.recent_runs

    # ═══ PREPARE: Understand the codebase ═══
    - name: clone
      type: agent
      agent: sdlc_clone
      depends_on: [dedup]
      condition:
        source: dedup.structured.duplicate_check
        operator: equals
        value: PASS
      input_map:
        repo_url: workflow.repo_url

    - name: analyze
      type: stage
      strategy: parallel
      depends_on: [clone]
      condition:
        source: dedup.structured.duplicate_check
        operator: equals
        value: PASS
      agents:
        - sdlc_code_analyzer
        - sdlc_test_analyzer

    # ═══ GATE 2: Is the plan sound? ═══
    - name: plan
      type: stage
      strategy: leader
      depends_on: [analyze]
      condition:
        source: dedup.structured.duplicate_check
        operator: equals
        value: PASS
      agents:
        - sdlc_architect
        - sdlc_plan_critic
        - agent: sdlc_plan_decider
          role: leader
      input_map:
        task_description: workflow.task_description
        code_analysis: analyze.output
        workspace_path: clone.structured.workspace_path

    # ═══ BUILD: Test-first, then implement ═══
    - name: build
      type: stage
      strategy: sequential
      depends_on: [plan]
      condition:
        source: dedup.structured.duplicate_check
        operator: equals
        value: PASS
      agents:
        - sdlc_test_writer
        - sdlc_implementer
      input_map:
        workspace_path: clone.structured.workspace_path
        final_plan: plan.output

    # ═══ GATE 3: Did we build it right? ═══
    - name: review
      type: stage
      strategy: leader
      depends_on: [build]
      condition:
        source: dedup.structured.duplicate_check
        operator: equals
        value: PASS
      agents:
        - sdlc_syntax_checker
        - sdlc_test_runner_agent
        - sdlc_diff_reviewer
        - agent: sdlc_review_decider
          role: leader
      loop_to: build
      max_loops: 3
      input_map:
        workspace_path: clone.structured.workspace_path
        final_plan: plan.output
        test_file: build.structured.test_file

    # ═══ SHIP: Deploy and verify ═══
    - name: push
      type: agent
      agent: sdlc_push
      depends_on: [review]
      condition:
        source: review.structured.verdict
        operator: equals
        value: PASS
      input_map:
        workspace_path: clone.structured.workspace_path
        commit_message: plan.structured.commit_message
        heroku_git_url: workflow.heroku_git_url

    - name: verify_deploy
      type: stage
      strategy: parallel
      depends_on: [push]
      condition:
        source: review.structured.verdict
        operator: equals
        value: PASS
      agents:
        - sdlc_health_checker
        - sdlc_smoke_tester
      input_map:
        app_url: workflow.app_url
        new_endpoint: plan.structured.new_endpoint

    # ═══ CLEANUP: Always runs ═══
    - name: cleanup
      type: agent
      agent: sdlc_cleanup
      depends_on: [verify_deploy]
      input_map:
        workspace_path: clone.structured.workspace_path
