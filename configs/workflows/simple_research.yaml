# Simple Research Workflow Configuration
# Purpose: End-to-end research workflow for testing the framework

workflow:
  name: simple_research
  description: "Basic research workflow that takes a topic and produces insights"
  version: "1.0"
  product_type: data_product  # Produces analysis/research outputs

  # Workflow stages (executed in order)
  stages:
    - name: research
      stage_ref: configs/stages/research_stage.yaml

  # Error handling configuration
  error_handling:
    on_stage_failure: retry
    max_stage_retries: 2
    escalation_policy: "default"
    enable_rollback: false

  # Workflow inputs (what the user provides)
  inputs:
    required:
      - topic  # The topic to research
    optional:
      - focus_areas  # List of specific focus areas
      - depth  # Analysis depth: surface|medium|deep

  # Workflow outputs (what gets returned)
  outputs:
    - name: research_results
      description: "Complete research findings"
      source: research.insights

    - name: recommendations
      description: "Action recommendations"
      source: research.recommendations

    - name: metadata
      description: "Workflow execution metadata"
      fields:
        - execution_time
        - confidence_score
        - stages_completed

  # Workflow-level safety
  safety:
    mode: execute
    risk_level: low
    require_approval: false

  # Execution settings
  execution:
    timeout_seconds: 9000  # 150 minute workflow timeout
    max_stages: 10  # Safety limit
    parallel_execution: false  # Sequential for M1

  # Observability settings
  observability:
    trace_all_decisions: true  # Full tracing for M1
    log_level: INFO
    metrics_enabled: true

  # Metadata
  tags:
    - research
    - simple
    - example

  use_cases:
    - "Market research"
    - "Competitive analysis"
    - "Technology evaluation"
    - "Problem investigation"
