workflow:
  name: technical_problem_solving_parallel
  description: "Systematic technical problem solving with parallel agent execution per stage"
  version: "1.0"

  inputs:
    required:
      - problem_description
      - technical_context
      - success_criteria
    optional:
      - constraints
      - existing_solution
      - performance_requirements
      - technology_preferences

  stages:
    - stage_ref: configs/stages/problem_analysis_parallel.yaml
      name: problem_analysis_parallel
      description: "Analyze and understand the problem deeply"

    - stage_ref: configs/stages/solution_design_parallel.yaml
      name: solution_design_parallel
      description: "Design technical solution approaches"
      depends_on:
        - problem_analysis_parallel

    - stage_ref: configs/stages/implementation_strategy_parallel.yaml
      name: implementation_strategy_parallel
      description: "Plan implementation and testing strategy"
      depends_on:
        - solution_design_parallel

    - stage_ref: configs/stages/validation_documentation_parallel.yaml
      name: validation_documentation_parallel
      description: "Validate solution and create documentation"
      depends_on:
        - implementation_strategy_parallel

  outputs:
    primary:
      - solution_design
      - implementation_plan
      - validation_results
    secondary:
      - problem_analysis
      - architecture_diagrams
      - test_strategy
      - technical_documentation

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true
