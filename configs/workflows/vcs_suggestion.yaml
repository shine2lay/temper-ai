# VCS Suggestion Pipeline v6 — Full Git Workflow
# Purpose: Triage, design, task-plan, git-setup, code, static-check, quality-gate, git-commit
#
# Usage:
#   maf run configs/workflows/vcs_suggestion.yaml --input examples/vcs_suggestion_input.yaml --show-details
#
# Pipeline (8 stages, 19 agents):
#   vcs_triage (leader: 4 perspectives + 1 decider)
#   → vcs_design (leader: arch + impl + safety + decider)       [conditional: APPROVE only]
#   → vcs_task_planning (sequential: foundation → integration)
#   → vcs_git_setup (pull latest + create feature branch)
#   → vcs_code_execute
#   → vcs_static_check (generic: syntax, lint, imports — loops to code_execute)
#   → vcs_quality_gate (leader: correctness + regression + security_runtime + decider — loops to code_execute)
#   → vcs_git_commit (commit + push — conditional on quality gate PASS)

workflow:
  name: vcs_suggestion
  description: "Multi-perspective triage, design, code, and quality-gate pipeline for The Vibe Coding Squad"
  version: "6.0"
  engine: dynamic
  product_type: api

  stages:
    - name: vcs_triage
      stage_ref: configs/stages/vcs_triage.yaml
      description: "4 perspectives + decider evaluate suggestion"

    - name: vcs_design
      stage_ref: configs/stages/vcs_design.yaml
      description: "Architecture + implementation + safety perspectives + decider produce unified design"
      depends_on:
        - vcs_triage
      condition: "{{ 'DECISION: APPROVE' in (stage_outputs.vcs_triage.output | default('') | upper) or 'DECISION:APPROVE' in (stage_outputs.vcs_triage.output | default('') | upper) }}"

    - name: vcs_task_planning
      stage_ref: configs/stages/vcs_task_planning.yaml
      description: "Sequential task decomposition: foundation specs then integration specs"
      depends_on:
        - vcs_design

    - name: vcs_git_setup
      stage_ref: configs/stages/vcs_git_setup.yaml
      description: "Pull latest from default branch and create feature branch"
      depends_on:
        - vcs_task_planning

    - name: vcs_code_execute
      stage_ref: configs/stages/vcs_code_execute.yaml
      description: "Coder writes files following exact task specs"
      depends_on:
        - vcs_git_setup

    - name: vcs_static_check
      stage_ref: configs/stages/vcs_static_check.yaml
      description: "Deterministic static checks (syntax, lint, imports)"
      depends_on:
        - vcs_code_execute
      loops_back_to: vcs_code_execute
      max_loops: 2
      loop_condition: "{{ 'OVERALL: FAIL' in (stage_outputs.vcs_static_check.output | default('') | upper) or 'OVERALL:FAIL' in (stage_outputs.vcs_static_check.output | default('') | upper) }}"

    - name: vcs_quality_gate
      stage_ref: configs/stages/vcs_quality_gate.yaml
      description: "Correctness + regression + security/runtime perspectives + decider"
      depends_on:
        - vcs_static_check
      loops_back_to: vcs_code_execute
      max_loops: 3
      loop_condition: "{{ 'OVERALL: FAIL' in (stage_outputs.vcs_quality_gate.output | default('') | upper) or 'OVERALL:FAIL' in (stage_outputs.vcs_quality_gate.output | default('') | upper) }}"

    - name: vcs_git_commit
      stage_ref: configs/stages/vcs_git_commit.yaml
      description: "Commit and push feature branch (only on quality gate PASS)"
      depends_on:
        - vcs_quality_gate
      condition: "{{ 'OVERALL: PASS' in (stage_outputs.vcs_quality_gate.output | default('') | upper) or 'OVERALL:PASS' in (stage_outputs.vcs_quality_gate.output | default('') | upper) }}"

  inputs:
    required:
      - suggestion_text
      - workspace_path
    optional: []

  outputs:
    - name: triage_output
      description: "Triage decision"
      source: vcs_triage.triage_output
    - name: design_output
      description: "Unified design (spec + plan)"
      source: vcs_design.design_output
    - name: coder_output
      description: "Files created"
      source: vcs_code_execute.coder_output
    - name: gate_output
      description: "Quality gate verdict"
      source: vcs_quality_gate.gate_output
    - name: git_commit_output
      description: "Git commit and push result"
      source: vcs_git_commit.git_commit_output

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: true

  execution:
    timeout_seconds: 14400
    max_stages: 16
    parallel_execution: true

  context_management:
    extraction:
      enabled: true
      provider: vllm
      model: qwen3-next
      timeout_seconds: 30

  autonomous_loop:
    enabled: false
    learning_enabled: true
    goals_enabled: true
    portfolio_enabled: true
    auto_apply_learning: false
    auto_apply_goals: false

  observability:
    trace_all_decisions: true
    log_level: INFO
    metrics_enabled: true

  tags:
    - vcs
    - suggestion
    - triage
    - code-generation
    - leader-strategy

  use_cases:
    - "Process user suggestion for The Vibe Coding Squad"
    - "Triage and build product features from suggestions"
    - "Multi-perspective analysis with regression safety"
