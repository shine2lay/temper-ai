# VCS Suggestion Pipeline v5 — P0+P1 Optimized
# Purpose: Triage, design, task-plan, git-snapshot, code, static-check, quality-gate
#
# Usage:
#   maf run configs/workflows/vcs_suggestion.yaml --input examples/vcs_suggestion_input.yaml --show-details
#
# Pipeline (7 stages, 18 agents — down from 8/25 via merge):
#   vcs_triage (leader: 4 perspectives + 1 decider)
#   → vcs_design (leader: arch + impl + safety + decider)       [conditional: APPROVE only]
#   → vcs_task_planning (sequential: foundation → integration)
#   → vcs_git_snapshot (snapshot before code writes)
#   → vcs_code_execute
#   → vcs_static_check (generic: syntax, lint, imports — loops to code_execute)
#   → vcs_quality_gate (leader: correctness + regression + security_runtime + decider — loops to code_execute)

workflow:
  name: vcs_suggestion
  description: "Multi-perspective triage, design, code, and quality-gate pipeline for The Vibe Coding Squad"
  version: "5.0"
  engine: native
  product_type: api

  stages:
    - name: vcs_triage
      stage_ref: configs/stages/vcs_triage.yaml
      description: "4 perspectives + decider evaluate suggestion"

    - name: vcs_design
      stage_ref: configs/stages/vcs_design.yaml
      description: "Architecture + implementation + safety perspectives + decider produce unified design"
      depends_on:
        - vcs_triage
      # conditional: true  # TEMP BYPASS for Fix 2 testing
      # condition: "{{ 'DECISION: APPROVE' in (stage_outputs.vcs_triage.decision | default('')) }}"
      # skip_to: end

    - name: vcs_task_planning
      stage_ref: configs/stages/vcs_task_planning.yaml
      description: "Sequential task decomposition: foundation specs then integration specs"
      depends_on:
        - vcs_design

    - name: vcs_git_snapshot
      stage_ref: configs/stages/vcs_git_snapshot.yaml
      description: "Create git snapshot for rollback safety"
      depends_on:
        - vcs_task_planning

    - name: vcs_code_execute
      stage_ref: configs/stages/vcs_code_execute.yaml
      description: "Coder writes files following exact task specs"
      depends_on:
        - vcs_git_snapshot

    - name: vcs_static_check
      stage_ref: configs/stages/vcs_static_check.yaml
      description: "Deterministic static checks (syntax, lint, imports)"
      depends_on:
        - vcs_code_execute
      loops_back_to: vcs_code_execute
      max_loops: 2
      loop_condition: "{{ 'OVERALL: FAIL' in (stage_outputs.vcs_static_check.output | default('')) }}"

    - name: vcs_quality_gate
      stage_ref: configs/stages/vcs_quality_gate.yaml
      description: "Correctness + regression + security/runtime perspectives + decider"
      depends_on:
        - vcs_static_check
      loops_back_to: vcs_code_execute
      max_loops: 3
      loop_condition: "{{ 'OVERALL: FAIL' in (stage_outputs.vcs_quality_gate.decision | default('')) }}"

  inputs:
    required:
      - suggestion_text
      - workspace_path
    optional: []

  outputs:
    - name: triage_output
      description: "Triage decision"
      source: vcs_triage.triage_output
    - name: design_output
      description: "Unified design (spec + plan)"
      source: vcs_design.design_output
    - name: coder_output
      description: "Files created"
      source: vcs_code_execute.coder_output
    - name: gate_output
      description: "Quality gate verdict"
      source: vcs_quality_gate.gate_output

  error_handling:
    on_stage_failure: halt
    max_stage_retries: 2
    escalation_policy: GracefulDegradation
    enable_rollback: false

  execution:
    timeout_seconds: 14400
    max_stages: 16
    parallel_execution: true

  context_management:
    extraction:
      enabled: true
      provider: vllm
      model: qwen3-next
      timeout_seconds: 30

  observability:
    trace_all_decisions: true
    log_level: INFO
    metrics_enabled: true

  tags:
    - vcs
    - suggestion
    - triage
    - code-generation
    - leader-strategy

  use_cases:
    - "Process user suggestion for The Vibe Coding Squad"
    - "Triage and build product features from suggestions"
    - "Multi-perspective analysis with regression safety"
