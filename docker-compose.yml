services:
  temper-ai-server:
    build:
      context: .
      target: server
    ports:
      - "8420:8420"
    volumes:
      - ./configs:/app/configs:ro
      - temper-ai-data:/app/.temper-ai
    environment:
      - MAF_CONFIG_ROOT=/app/configs
      - MAF_DB_PATH=/app/.temper-ai/observability.db
    restart: unless-stopped

volumes:
  temper-ai-data:
