services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: temper_ai
      POSTGRES_USER: temper_ai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temper_dev}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temper_ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Redis: used by the worker protocol (phase 4+) for live LLM chunk streaming.
  # Stream `chunks:{execution_id}` is bounded via XADD MAXLEN; chunks expire on TTL.
  # Server is fine without redis until phase 4; service runs ahead of need so
  # local-dev compose stays one command.
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly no --save ""
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  server:
    build:
      context: .
      target: server
    restart: unless-stopped
    ports:
      - "8420:8420"
    volumes:
      # Hot reload: mount source code over the installed package
      - ./temper_ai:/app/temper_ai
      - ./configs:/app/configs:ro
      - ${WORKSPACE_DIR:-./workspaces}:/app/workspaces
    environment:
      HOME: /app
      PYTHONDONTWRITEBYTECODE: "1"
      TEMPER_DATABASE_URL: postgresql://temper_ai:${POSTGRES_PASSWORD:-temper_dev}@postgres:5432/temper_ai
      # Redis: live chunk streaming (worker_protocol_v1 phase 4+).
      # Server runs without it pre-phase-4; URL set up early so config doesn't
      # have to change later.
      TEMPER_REDIS_URL: redis://redis:6379/0
      TEMPER_LOG_LEVEL: ${TEMPER_LOG_LEVEL:-INFO}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      VLLM_BASE_URL: ${VLLM_BASE_URL:-}
      VLLM_MODEL: ${VLLM_MODEL:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
      TEMPER_MEMORY_BACKEND: ${TEMPER_MEMORY_BACKEND:-in_memory}
    env_file:
      - path: .env
        required: false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    command: >
      .venv/bin/python -m uvicorn temper_ai.server:app
      --host 0.0.0.0
      --port 8420

volumes:
  postgres-data:
