# SearXNG Settings for MAF (Meta-Autonomous Framework)
# Documentation: https://docs.searxng.org/admin/settings.html

use_default_settings: true

server:
  secret_key: "maf-searxng-dev-key-change-in-production"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false  # Disable rate limiting for local dev

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "en"
  formats:
    - html
    - json  # Required for API access

engines:
  # DuckDuckGo - reliable, no API key needed
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  # Brave Search - good quality, no API key for basic
  - name: brave
    engine: brave
    shortcut: br
    disabled: false

  # Wikipedia - factual reference data
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  # NOTE: Google is intentionally excluded due to rate limiting issues
  # in automated/high-volume usage scenarios.

outgoing:
  request_timeout: 10.0
  max_request_timeout: 15.0
