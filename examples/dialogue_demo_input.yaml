topic: "Design a caching strategy for our high-traffic API"
context: |
  Our REST API serves 50K requests/minute with average response time of 200ms.
  Database queries account for 60% of latency. We use PostgreSQL.
  Some endpoints serve personalized data, others serve shared/public data.
  We have Redis available but not yet integrated.
constraints: |
  Budget: $500/month for caching infrastructure.
  Must maintain data freshness within 5 minutes for most endpoints.
  Real-time data (user notifications, live feeds) must have < 30 second staleness.
