name: "Simple Dialogue Example"
description: "Three agents discuss and converge on a decision through multi-round dialogue"

# This example demonstrates basic dialogue orchestration where agents
# can respond to each other's positions across multiple rounds.
# The dialogue continues until convergence or max_rounds is reached.

stages:
  - name: "collaborative_decision"
    type: sequential
    agents:
      - researcher
      - analyst
      - critic

    collaboration:
      strategy: dialogue
      config:
        # Maximum number of dialogue rounds
        max_rounds: 3

        # Convergence threshold (0.0-1.0): percentage of agents whose positions
        # must remain unchanged between rounds to trigger early stopping
        convergence_threshold: 0.85

        # Cost budget in USD (optional): stops dialogue if exceeded
        cost_budget_usd: 10.0

        # Minimum rounds before allowing convergence (prevents premature stopping)
        min_rounds: 2

# Expected behavior:
# - Round 1: All agents execute independently and provide initial positions
# - Round 2+: Agents receive dialogue_history showing prior outputs
# - Early stop: If >= 85% of agents maintain positions (converged)
# - Cost stop: If cumulative cost exceeds $10.00
# - Max stop: After 3 rounds regardless of convergence
#
# Final synthesis: Uses consensus strategy on last round's outputs
