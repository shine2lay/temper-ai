problem_description: |
  Design and implement a distributed rate limiter for a high-traffic API service
  that needs to handle 1 million requests per second across multiple data centers.

  Current situation:
  - Monolithic rate limiter causing bottlenecks
  - Inconsistent rate limiting across regions
  - Memory issues during traffic spikes
  - No visibility into rate limit violations

  Problem requirements:
  - Support 1M+ requests/second globally
  - Sub-millisecond latency overhead
  - Consistent rate limiting across all regions
  - Support multiple rate limit tiers (free, premium, enterprise)
  - Real-time visibility and monitoring
  - Graceful degradation under high load

technical_context: |
  Current architecture:
  - Microservices architecture on Kubernetes
  - Multi-region deployment (5 regions: US-East, US-West, EU, Asia, AU)
  - API Gateway: Kong
  - Backend services: Node.js + Python
  - Database: PostgreSQL (primary) + Redis (cache)
  - Message queue: Apache Kafka
  - Monitoring: Prometheus + Grafana

  Technology stack preferences:
  - Prefer Redis/Valkey for caching layer
  - Open to distributed coordination (etcd, Consul, etc.)
  - Must integrate with existing Kong gateway
  - Prefer cloud-agnostic solutions
  - Python or Go for implementation

  Traffic patterns:
  - Peak: 1.5M requests/second
  - Average: 600K requests/second
  - 70% read operations, 30% write operations
  - Bursty traffic from mobile apps
  - Geographic distribution: 40% US, 30% EU, 20% Asia, 10% AU

success_criteria: |
  Performance metrics:
  - P99 latency: < 5ms overhead
  - P50 latency: < 1ms overhead
  - Throughput: 1M+ requests/second sustained
  - Availability: 99.99% uptime

  Functional requirements:
  - Accurate rate limiting (< 1% error rate)
  - Support sliding window algorithm
  - Per-user, per-endpoint, and global limits
  - Dynamic limit updates without downtime
  - Graceful handling of distributed clock skew

  Operational requirements:
  - Easy to deploy and operate
  - Self-healing and auto-scaling
  - Comprehensive monitoring and alerting
  - Low operational overhead

constraints: |
  Budget constraints:
  - Infrastructure budget: $10K/month
  - Development timeline: 2-3 months
  - No additional headcount

  Technical constraints:
  - Cannot modify existing Kong gateway configuration significantly
  - Must maintain backward compatibility with current API contracts
  - Cannot introduce new database systems (must use Redis/PostgreSQL)
  - Must comply with data residency regulations (EU, Asia)

  Operational constraints:
  - Zero-downtime deployment required
  - Must support gradual rollout (canary/blue-green)
  - Rollback capability within 5 minutes
  - No breaking changes to existing clients

performance_requirements: |
  Latency requirements:
  - Rate limit check: < 1ms (P50), < 5ms (P99)
  - Limit update propagation: < 100ms globally
  - Counter synchronization: < 500ms across regions

  Scalability requirements:
  - Horizontal scaling for 10x traffic growth
  - Handle traffic spikes (5x normal) gracefully
  - Support 100M+ unique users
  - Store 1 billion+ rate limit records

  Reliability requirements:
  - No single point of failure
  - Automatic failover < 30 seconds
  - Data consistency guarantees
  - Disaster recovery: RPO < 5 minutes, RTO < 15 minutes

existing_solution: |
  Current implementation issues:
  - In-memory rate limiter in each API gateway instance
  - No synchronization between instances
  - Memory leaks during high traffic
  - Rate limits reset on pod restarts
  - No historical data or analytics

  What works:
  - Basic sliding window algorithm
  - Integration with Kong plugins
  - Configuration via environment variables
  - Basic Prometheus metrics

  What doesn't work:
  - Distributed consistency
  - Memory management
  - Cross-region synchronization
  - Dynamic limit updates
  - Visibility and debugging
