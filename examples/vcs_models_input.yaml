# VCS Suggestion - Add Suggestion model and database setup
# The models.py is empty and there's no routes.py — this is the foundation.

suggestion_text: |
  The models.py file is empty and routes.py doesn't exist yet.
  We need the database foundation before anything else works.

  1. In models.py, create:
     - A SQLite engine using SQLModel (database file: vcs.db)
     - A Suggestion model with fields:
       id (int, primary key)
       text (str, required)
       category (str, optional, default "general")
       status (str, default "pending") — values: pending, approved, rejected, building, done
       priority (str, optional) — values: P0, P1, P2, P3
       created_at (datetime, auto-set to now)
       updated_at (datetime, auto-set to now, update on change)
     - A create_db_and_tables() function that creates all tables

  2. Create routes.py with a FastAPI APIRouter containing:
     - POST /api/suggestions — create a new suggestion (accepts text and optional category)
     - GET /api/suggestions — list all suggestions, newest first
     - GET /api/suggestions/{id} — get a single suggestion by ID (404 if not found)
     - All endpoints return JSON

  3. Update main.py to:
     - Call create_db_and_tables() on startup using a lifespan event
     - Keep the existing /health and /about endpoints working
     - Serve static files from the static/ directory

