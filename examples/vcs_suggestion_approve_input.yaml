suggestion_text: |
  Add suggestion categories/tags system:
  - New Tag model (id, name str unique, color str default '#666', created_at datetime)
  - New SuggestionTag association table (suggestion_id FK, tag_id FK, primary key composite)
  - POST /api/tags — create a new tag
    Request body: { "name": "string", "color": "#hex" }
    Response: the created Tag object (201)
  - GET /api/tags — list all available tags
  - POST /api/suggestions/:id/tags — add a tag to a suggestion
    Request body: { "tag_id": integer }
    Response: 204 No Content
  - DELETE /api/suggestions/:id/tags/:tag_id — remove a tag from a suggestion
    Response: 204 No Content
  - GET /api/suggestions/:id/tags — list all tags for a suggestion
  - This lets users categorize suggestions with reusable tags like "ui", "backend", "bug", "enhancement"

