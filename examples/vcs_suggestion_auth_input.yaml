# VCS Suggestion Input — user authentication (completely new, no overlap)
# Usage: maf run configs/workflows/vcs_suggestion.yaml --input examples/vcs_suggestion_auth_input.yaml --show-details

suggestion_text: |
  Add user authentication with JWT tokens:
  - New User model in a new file auth_models.py (id, username str unique, hashed_password str, is_active bool, created_at datetime)
  - POST /api/auth/register — register a new user (accepts username + password, returns user object without password)
  - POST /api/auth/login — authenticate user (accepts username + password, returns JWT access token)
  - GET /api/auth/me — return current user profile (requires valid JWT in Authorization header)
  - Use python-jose for JWT encoding/decoding and passlib[bcrypt] for password hashing
  - Store JWT secret in environment variable JWT_SECRET with a sensible default for development
  - Token expiry should be 24 hours

