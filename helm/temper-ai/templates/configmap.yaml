apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "temper-ai.fullname" . }}-config
  labels:
    {{- include "temper-ai.labels" . | nindent 4 }}
data:
  TEMPER_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  TEMPER_MAX_WORKERS: {{ .Values.config.maxWorkers | quote }}
  TEMPER_CONFIG_ROOT: {{ .Values.config.configRoot | quote }}
