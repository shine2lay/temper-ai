apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temper-ai.fullname" . }}
  labels:
    {{- include "temper-ai.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "temper-ai.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "temper-ai.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8420
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "temper-ai.fullname" . }}-config
            - secretRef:
                name: {{ include "temper-ai.fullname" . }}-secret
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8420
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8420
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
