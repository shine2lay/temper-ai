apiVersion: v1
kind: Secret
metadata:
  name: {{ include "temper-ai.fullname" . }}-secret
  labels:
    {{- include "temper-ai.labels" . | nindent 4 }}
type: Opaque
data:
  TEMPER_DATABASE_URL: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username .Values.postgresql.auth.password (include "temper-ai.fullname" .) .Values.postgresql.auth.database | b64enc | quote }}
