# Default values for temper-ai

replicaCount: 1

image:
  repository: temper-ai/temper-ai-server
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8420

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: temper-ai.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources:
  limits:
    cpu: "1"
    memory: 1Gi
  requests:
    cpu: 250m
    memory: 256Mi

postgresql:
  enabled: true
  auth:
    username: temper_ai
    # REQUIRED: Override before deployment with --set postgresql.auth.password=<secret>
    # Using the default value in production is a security risk.
    password: ""
    database: temper_ai

worker:
  enabled: true
  replicaCount: 1
  image:
    repository: temper-ai/temper-ai-worker
    pullPolicy: IfNotPresent
    tag: "latest"
  resources:
    limits:
      cpu: "2"
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

config:
  logLevel: INFO
  configRoot: /app/configs
  workerConcurrency: 4
