# Project Context Configuration
# Provides context to spec-creator agent for project-aware specifications

project:
  name: "Meta Autonomous Framework"
  description: "Multi-agent coordination framework with task management and file locking"
  repository: "https://github.com/user/meta-autonomous-framework"

technology:
  language: "Python"
  version: "3.11+"
  framework: "None (pure Python service with Unix sockets)"
  database: "SQLite"
  orm: "Raw SQL with transaction support"
  testing: "pytest"

  additional:
    - "Unix domain sockets for daemon IPC"
    - "YAML for configuration"
    - "Markdown for documentation and specs"
    - "Bash for CLI and skills"

structure:
  coord_dir: ".claude-coord"

  directories:
    service: ".claude-coord/coord_service"
    specs: ".claude-coord/task-specs"
    skills: ".claude-coord/skills"
    agents: ".claude-coord/agents"
    bin: ".claude-coord/bin"
    tests: "tests/"

  key_files:
    - path: ".claude-coord/coord_service/database.py"
      description: "Database layer with ACID transaction support"

    - path: ".claude-coord/coord_service/validator.py"
      description: "Validation rules with structured error messages"

    - path: ".claude-coord/coord_service/operations.py"
      description: "Operation handlers for daemon requests"

    - path: ".claude-coord/bin/coord"
      description: "CLI for coordination system operations"

    - path: ".claude-coord/coord_service/schema.sql"
      description: "SQLite schema with agents, tasks, file locks"

patterns:
  validation:
    approach: "Centralized validator with structured errors and hints"
    example: |
      def validate_task_create(task_id, subject, description):
          errors = []
          if not task_id:
              errors.append(ValidationError(
                  code="MISSING_TASK_ID",
                  message="Task ID is required",
                  hint="Provide task ID in format: prefix-category-identifier"
              ))
          if errors:
              raise ValidationErrors(errors)

  database:
    approach: "Transaction wrapper with context manager for ACID guarantees"
    example: |
      with self.db.transaction() as conn:
          conn.execute("INSERT INTO tasks (...) VALUES (?)", ...)
          conn.execute("INSERT INTO dependencies (...) VALUES (?)", ...)
          # Both or neither - ACID transaction

  error_handling:
    approach: "Structured error types with error codes and helpful hints"
    example: |
      raise ValidationError(
          code="INVALID_CATEGORY",
          message="Invalid task category 'foo'",
          hint="Valid categories: crit, high, med, low, quick"
      )

  testing:
    approach: "Pytest with fixtures and realistic test data (not over-mocked)"
    location: "tests/"
    example: |
      def test_task_claim(coord_service, sample_task):
          # Use realistic fixtures, not excessive mocks
          result = coord_service.claim_task(agent_id, sample_task.id)
          assert result.success
          assert result.data.claimed_by == agent_id

  daemon_communication:
    approach: "Unix domain socket with JSON protocol"
    example: |
      # Client sends JSON request
      {"operation": "task-claim", "agent_id": "agent-1", "task_id": "task-1"}

      # Daemon responds with JSON
      {"success": true, "data": {...}}

conventions:
  naming:
    files: "snake_case.py"
    classes: "PascalCase"
    functions: "snake_case"
    constants: "UPPER_SNAKE_CASE"
    bash_scripts: "kebab-case.sh"

  documentation:
    docstrings: "Google style for Python"
    comments: "Explain why, not what"
    specs: "Markdown with standard sections (Problem, Context, Implementation, Tests)"

  commits:
    format: "type(scope): message"
    types: ["feat", "fix", "refactor", "test", "docs", "perf", "chore"]
    examples:
      - "feat(tasks): Add task dependency system"
      - "fix(locks): Prevent deadlock in multi-file lock"
      - "test(fixtures): Add realistic test data"

requirements:
  security:
    - "Validate all inputs at system boundaries (CLI, daemon socket)"
    - "Use parameterized queries - no SQL injection"
    - "No secrets in code, logs, or error messages"
    - "Proper file permissions (0600 for database, 0700 for socket)"
    - "Verify agent ownership before operations"

  reliability:
    - "ACID transactions for all state changes"
    - "Graceful error handling with recovery hints"
    - "Idempotent operations where possible"
    - "Comprehensive test coverage (>80% for critical paths)"
    - "Corruption detection and recovery"

  observability:
    - "Structured logging with context (agent_id, task_id, operation)"
    - "Metrics for critical operations (task velocity, file hotspots)"
    - "Clear error messages with actionable hints"
    - "Performance tracking for bottleneck identification"

  data_integrity:
    - "Foreign key constraints enforced"
    - "Check constraints for valid states"
    - "Atomic operations (no partial updates)"
    - "Validation before database writes"

architecture:
  principles:
    - "Single responsibility per module"
    - "Dependency injection for testability"
    - "Fail fast with clear, actionable errors"
    - "Pure functions where possible (avoid side effects)"
    - "Separation of concerns (validation → database → response)"

  priorities:
    P0: ["Security", "Reliability", "Data Integrity"]
    P1: ["Testing", "Modularity"]
    P2: ["Scalability", "Observability", "Performance"]
    P3: ["Ease of Use", "Tech Debt Reduction"]

  anti_patterns:
    - "❌ Bash redirection for file operations (use Write/Edit tools)"
    - "❌ Over-mocking in tests (use realistic fixtures)"
    - "❌ Silent failures (always surface errors)"
    - "❌ Mixing concerns (validation + business logic + database)"
    - "❌ Global state (use dependency injection)"

task_management:
  categories:
    crit:
      priority: 0
      requires_spec: true
      description: "Critical tasks requiring detailed planning"
    high:
      priority: 1
      requires_spec: true
      description: "Important tasks needing specifications"
    med:
      priority: 2
      requires_spec: false
      description: "Standard tasks"
    low:
      priority: 3
      requires_spec: false
      description: "Backlog items"
    quick:
      priority: 2
      requires_spec: false
      description: "Simple tasks, skips validation"

  task_id_format: "prefix-category-identifier"
  valid_prefixes: ["test", "code", "docs", "gap", "refactor", "perf"]

  dependencies:
    approach: "Explicit task dependencies with automatic blocking"
    example: "task-2 depends on task-1 → task-2 won't appear in task-list until task-1 completes"

file_locking:
  approach: "Agent-based file locks to prevent concurrent edits"
  operations:
    - "lock <agent_id> <file_path> - Acquire lock"
    - "unlock <agent_id> <file_path> - Release lock"
    - "lock-all <agent_id> <file1> <file2> ... - Atomic multi-file lock"
    - "unlock-all <agent_id> - Release all agent's locks"

specialist_usage:
  when_to_call:
    - "OAuth/auth tasks → security-engineer, integration-specialist"
    - "API endpoints → api-designer, backend-engineer, database-architect"
    - "Database changes → database-architect"
    - "Payment integration → security-engineer, integration-specialist"
    - "Performance work → performance-engineer, database-architect"
    - "Security concerns → security-engineer"

  specialist_outputs:
    format: "Markdown with specific recommendations"
    sections:
      - "Analysis of requirements"
      - "Recommended approach"
      - "Security/performance/quality considerations"
      - "Code examples or patterns to follow"
      - "Test strategy"
