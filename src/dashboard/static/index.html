<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAF Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/panels.css">
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
    <script src="https://unpkg.com/marked@15.0.7/marked.min.js"></script>
    <script src="https://unpkg.com/dompurify@3.2.4/dist/purify.min.js"></script>
</head>
<body>
    <header id="dashboard-header">
        <div class="header-left">
            <a href="list.html" style="text-decoration:none;color:inherit"><h1>MAF Dashboard</h1></a>
            <span id="workflow-name" class="workflow-name"></span>
        </div>
        <div class="header-center">
            <span id="workflow-status" class="status-badge"></span>
            <span id="workflow-duration" class="duration"></span>
        </div>
        <div class="header-right">
            <span id="connection-status" class="connection-indicator">Disconnected</span>
        </div>
    </header>

    <main id="dashboard-main">
        <aside id="sidebar">
            <div id="panel-workflow-overview" class="panel">
                <div class="panel-header">Workflow Overview</div>
                <div class="panel-content"></div>
            </div>
        </aside>

        <section id="content-area">
            <div id="visualization-area" class="panel panel-full-width">
                <div class="panel-header viz-tabs">
                    <button class="viz-tab active" data-view="timeline">Timeline</button>
                    <button class="viz-tab" data-view="flowchart">Flowchart</button>
                </div>
                <div class="panel-content">
                    <div id="panel-timeline" class="viz-view active"></div>
                    <div id="panel-flowchart" class="viz-view"></div>
                </div>
            </div>

            <div id="detail-area">
                <div id="panel-stage-detail" class="panel">
                    <div class="panel-header">Stage Detail</div>
                    <div class="panel-content"></div>
                </div>
                <div id="panel-agent-detail" class="panel">
                    <div class="panel-header">Agent Detail</div>
                    <div class="panel-content"></div>
                </div>
                <div id="panel-llm-inspector" class="panel">
                    <div class="panel-header">Inspector</div>
                    <div class="panel-content"></div>
                </div>
            </div>
        </section>
    </main>

    <footer id="event-log" class="panel">
        <div class="panel-header" onclick="this.parentElement.classList.toggle('collapsed')">
            Event Log <span class="toggle-icon">&#9650;</span>
        </div>
        <div class="panel-content">
            <div id="event-log-entries"></div>
        </div>
    </footer>

    <script type="module" src="js/app.js"></script>
</body>
</html>
