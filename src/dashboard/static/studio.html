<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAF Studio - Workflow Builder</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/studio.css">
    
    <!-- Cytoscape and plugins -->
    <script src="https://unpkg.com/lodash@4.17.21/lodash.min.js"></script>
    <script src="https://unpkg.com/dagre@0.8.5/dist/dagre.min.js"></script>
    <script src="https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js"></script>
    <script src="https://unpkg.com/cytoscape-dagre@2.5.0/cytoscape-dagre.js"></script>
    <script src="https://unpkg.com/cytoscape-node-html-label@1.2.2/dist/cytoscape-node-html-label.min.js"></script>
    <script src="https://unpkg.com/cytoscape-edgehandles@4.0.1/cytoscape-edgehandles.js"></script>
    <script src="https://unpkg.com/cytoscape-cxtmenu@3.5.0/cytoscape-cxtmenu.js"></script>
    <script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
</head>
<body>
    <!-- Header with nav -->
    <header id="dashboard-header">
        <div class="header-left">
            <a href="list.html" style="text-decoration:none;color:inherit"><h1>MAF Dashboard</h1></a>
            <span class="workflow-name">Workflow Studio</span>
        </div>
        <div class="header-right">
            <a href="list.html" class="studio-nav-link">Runs</a>
            <a href="demos.html" class="studio-nav-link">Demos</a>
        </div>
    </header>

    <!-- Toolbar -->
    <div id="studio-toolbar">
        <!-- Toolbar buttons rendered by toolbar.js -->
    </div>

    <!-- Main three-panel layout -->
    <main id="studio-main">
        <aside id="studio-palette">
            <div class="palette-search">
                <input type="text" id="palette-search-input" placeholder="Search configs..." class="search-input">
            </div>
            <div id="palette-sections">
                <!-- Populated by palette.js -->
            </div>
        </aside>

        <section id="studio-canvas">
            <div id="cy-studio"></div>
        </section>

        <aside id="studio-properties">
            <div class="panel-header">Properties</div>
            <div id="property-panel-content" class="panel-content">
                <div class="empty-state">Select an element to view properties</div>
            </div>
        </aside>
    </main>

    <!-- Validation bar -->
    <footer id="studio-validation-bar">
        <span id="validation-summary">Ready</span>
        <div id="validation-details" class="hidden"></div>
    </footer>

    <!-- YAML Preview Modal -->
    <div id="yaml-modal" class="modal-backdrop hidden">
        <div class="modal-content">
            <div class="modal-header">
                <span>YAML Preview</span>
                <button id="yaml-modal-close" class="modal-close-btn">&times;</button>
            </div>
            <textarea id="yaml-modal-editor" class="yaml-editor" spellcheck="false"></textarea>
            <div class="modal-footer">
                <button id="yaml-modal-apply" class="btn-primary">Apply</button>
                <button id="yaml-modal-cancel" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/studio/studio-app.js"></script>
</body>
</html>
