<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAF - Progressive Autonomy</title>
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
  h1 { color: #4fc3f7; margin-bottom: 5px; }
  .subtitle { color: #888; margin-bottom: 20px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .card { background: #16213e; border-radius: 8px; padding: 20px; border: 1px solid #0f3460; }
  .card h2 { color: #4fc3f7; margin-top: 0; font-size: 1.1em; }
  .emergency-active { background: #3e1616; border-color: #f44336; }
  .emergency-badge { background: #f44336; color: white; padding: 4px 12px; border-radius: 4px; font-weight: bold; }
  .safe-badge { background: #4caf50; color: white; padding: 4px 12px; border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #0f3460; }
  th { color: #4fc3f7; font-size: 0.9em; }
  .level-0 { color: #f44336; } .level-1 { color: #ff9800; } .level-2 { color: #00bcd4; }
  .level-3 { color: #4caf50; } .level-4 { color: #2196f3; }
  .budget-bar { background: #0f3460; border-radius: 4px; height: 20px; overflow: hidden; }
  .budget-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .budget-ok { background: #4caf50; } .budget-warn { background: #ff9800; } .budget-exhaust { background: #f44336; }
  .btn { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; margin: 4px; font-size: 0.9em; }
  .btn-danger { background: #f44336; color: white; } .btn-success { background: #4caf50; color: white; }
  #chart { height: 300px; }
  nav { margin-bottom: 20px; }
  nav a { color: #4fc3f7; margin-right: 15px; text-decoration: none; }
  nav a:hover { text-decoration: underline; }
</style>
</head>
<body>
<nav><a href="/dashboard/list.html">Workflows</a> <a href="/dashboard/learning.html">Learning</a> <a href="/dashboard/autonomy.html"><b>Autonomy</b></a></nav>
<h1>Progressive Autonomy</h1>
<p class="subtitle">Trust-based agent autonomy management</p>

<div class="grid">
  <div class="card" id="emergency-card">
    <h2>Emergency Stop</h2>
    <div id="emergency-status">Loading...</div>
    <div style="margin-top:10px">
      <button class="btn btn-danger" onclick="activateStop()">Activate Stop</button>
      <button class="btn btn-success" onclick="deactivateStop()">Resume</button>
    </div>
  </div>
  <div class="card">
    <h2>Agent Levels</h2>
    <div id="agent-count">-</div>
    <div id="chart"></div>
  </div>
</div>

<div class="card" style="margin-bottom:20px">
  <h2>Agent Autonomy Status</h2>
  <table><thead><tr><th>Agent</th><th>Domain</th><th>Level</th><th>Shadow</th><th>Shadow Rate</th><th>Updated</th></tr></thead>
  <tbody id="status-body"></tbody></table>
</div>

<div class="grid">
  <div class="card">
    <h2>Budget Overview</h2>
    <div id="budget-body">Loading...</div>
  </div>
  <div class="card">
    <h2>Recent Transitions</h2>
    <table><thead><tr><th>Agent</th><th>From</th><th>To</th><th>Trigger</th><th>Time</th></tr></thead>
    <tbody id="transitions-body"></tbody></table>
  </div>
</div>

<script>
const LEVELS = ['SUPERVISED','SPOT_CHECKED','RISK_GATED','AUTONOMOUS','STRATEGIC'];
const COLORS = ['#f44336','#ff9800','#00bcd4','#4caf50','#2196f3'];

function levelSpan(lv) { return `<span class="level-${lv}">${LEVELS[lv] || lv}</span>`; }

async function fetchJSON(url) { const r = await fetch(url); return r.json(); }

async function loadStatus() {
  const data = await fetchJSON('/api/autonomy/status');
  document.getElementById('agent-count').textContent = `${data.total_agents} agent(s)`;
  const tbody = document.getElementById('status-body');
  tbody.innerHTML = data.agents.map(a => {
    const rate = a.shadow_runs > 0 ? (a.shadow_agreements/a.shadow_runs*100).toFixed(1)+'%' : '-';
    return `<tr><td>${a.agent_name}</td><td>${a.domain}</td><td>${levelSpan(a.current_level)}</td>
    <td>${a.shadow_level !== null ? levelSpan(a.shadow_level) : '-'}</td>
    <td>${rate}</td><td>${(a.updated_at||'').slice(0,19)}</td></tr>`;
  }).join('');

  // Level distribution chart
  const counts = [0,0,0,0,0];
  data.agents.forEach(a => { if(a.current_level>=0 && a.current_level<=4) counts[a.current_level]++; });
  Plotly.newPlot('chart', [{x:LEVELS, y:counts, type:'bar', marker:{color:COLORS}}],
    {paper_bgcolor:'transparent', plot_bgcolor:'transparent', font:{color:'#e0e0e0'},
     margin:{t:10,b:40,l:40,r:10}, yaxis:{dtick:1}}, {displayModeBar:false});
}

async function loadEmergency() {
  const data = await fetchJSON('/api/autonomy/emergency');
  const card = document.getElementById('emergency-card');
  const el = document.getElementById('emergency-status');
  if (data.is_active) {
    card.className = 'card emergency-active';
    el.innerHTML = '<span class="emergency-badge">ACTIVE</span>';
  } else {
    card.className = 'card';
    el.innerHTML = '<span class="safe-badge">NORMAL</span>';
  }
}

async function loadBudgets() {
  const data = await fetchJSON('/api/autonomy/budget');
  const el = document.getElementById('budget-body');
  if (!data.length) { el.innerHTML = '<p>No budgets configured</p>'; return; }
  el.innerHTML = data.map(b => {
    const pct = Math.min(b.utilization*100, 100);
    const cls = b.status==='exhausted'?'budget-exhaust':b.status==='warning'?'budget-warn':'budget-ok';
    return `<div style="margin-bottom:12px"><b>${b.scope}</b> $${b.spent_usd.toFixed(2)} / $${b.budget_usd.toFixed(2)}
    <div class="budget-bar"><div class="budget-fill ${cls}" style="width:${pct}%"></div></div></div>`;
  }).join('');
}

async function loadTransitions() {
  const data = await fetchJSON('/api/autonomy/transitions?limit=10');
  document.getElementById('transitions-body').innerHTML = data.map(t =>
    `<tr><td>${t.agent_name}</td><td>${levelSpan(t.from_level)}</td><td>${levelSpan(t.to_level)}</td>
    <td>${t.trigger}</td><td>${(t.created_at||'').slice(0,19)}</td></tr>`
  ).join('');
}

async function activateStop() {
  const reason = prompt('Reason for emergency stop:');
  if (!reason) return;
  await fetch('/api/autonomy/emergency-stop', {method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({reason,triggered_by:'dashboard'})});
  loadEmergency();
}

async function deactivateStop() {
  const reason = prompt('Reason for resuming:');
  if (!reason) return;
  await fetch('/api/autonomy/resume', {method:'POST',
    headers:{'Content-Type':'application/json'}, body:JSON.stringify({reason})});
  loadEmergency();
}

loadStatus(); loadEmergency(); loadBudgets(); loadTransitions();
</script>
</body>
</html>
