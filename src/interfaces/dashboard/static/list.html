<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAF Dashboard - Workflows</title>
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/panels.css">
    <style>
        /* Override dashboard layout for list page */
        html, body {
            overflow: auto;
        }

        #list-main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 24px;
            width: 100%;
        }

        .list-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 4px;
        }

        .filter-btn {
            padding: 5px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: background var(--transition), color var(--transition), border-color var(--transition);
            font-family: var(--font-sans);
        }

        .filter-btn:hover {
            background: var(--bg-panel);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: rgba(79, 195, 247, 0.15);
            color: var(--accent);
            border-color: var(--accent-dim);
        }

        .search-input {
            padding: 5px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-primary);
            font-size: 13px;
            font-family: var(--font-sans);
            outline: none;
            transition: border-color var(--transition);
            min-width: 200px;
            margin-left: auto;
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-input:focus {
            border-color: var(--accent-dim);
        }

        #workflow-table-container .panel-content {
            padding: 0;
        }

        .data-table tbody tr {
            cursor: pointer;
        }

        .data-table tbody tr:hover td {
            background: rgba(79, 195, 247, 0.08);
        }

        .data-table .col-mono {
            font-family: var(--font-mono);
            font-size: 11px;
        }

        .data-table .workflow-name-cell {
            font-weight: 500;
        }

        #pagination-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 12px;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .page-info {
            font-family: var(--font-mono);
            font-size: 11px;
        }

        .page-buttons {
            display: flex;
            gap: 8px;
        }

        .page-btn {
            padding: 4px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            background: var(--bg-input);
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: background var(--transition), color var(--transition);
            font-family: var(--font-sans);
        }

        .page-btn:hover:not(:disabled) {
            background: var(--bg-panel);
            color: var(--text-primary);
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .error-banner {
            padding: 12px 16px;
            background: rgba(239, 83, 80, 0.1);
            border: 1px solid rgba(239, 83, 80, 0.3);
            border-radius: var(--radius-sm);
            color: var(--error);
            font-size: 13px;
            margin-bottom: 16px;
        }

        .env-tag {
            display: inline-block;
            padding: 1px 6px;
            border-radius: 3px;
            font-size: 10px;
            font-weight: 500;
            background: rgba(160, 160, 176, 0.12);
            color: var(--text-muted);
        }

        .demo-link-btn {
            display: inline-block;
            padding: 4px 12px;
            border: 1px solid var(--accent-dim);
            border-radius: var(--radius-sm);
            background: rgba(79, 195, 247, 0.1);
            color: var(--accent);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            transition: background var(--transition), border-color var(--transition);
            font-family: var(--font-sans);
        }

        .demo-link-btn:hover {
            background: rgba(79, 195, 247, 0.2);
            border-color: var(--accent);
        }
    </style>
</head>
<body>
    <header id="dashboard-header">
        <div class="header-left">
            <a href="list.html" style="text-decoration:none;color:inherit"><h1>MAF Dashboard</h1></a>
            <span class="workflow-name">Workflow Runs</span>
        </div>
        <div class="header-right">
            <a href="demos.html" class="demo-link-btn">Run Demo</a>
            <a href="studio.html" class="demo-link-btn">Studio</a>
        </div>
    </header>

    <main id="list-main">
        <div class="list-controls" id="list-controls"></div>
        <div id="error-container"></div>
        <div id="workflow-table-container" class="panel">
            <div class="panel-content">
                <div class="loading-spinner"></div>
            </div>
        </div>
        <div id="pagination-controls"></div>
    </main>

    <script type="module" src="js/workflow-list.js"></script>
</body>
</html>
